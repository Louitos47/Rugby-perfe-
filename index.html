<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Rugby Perf</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rugby Perf"/>
<meta name="theme-color" content="#0D0F14"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0D0F14;color:#E8ECF0;font-family:-apple-system,'Inter',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:600px;margin:0 auto;position:relative}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#2A3040;border-radius:2px}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,textarea,select{outline:none;font-family:inherit}
*{-webkit-tap-highlight-color:transparent}

/* HEADER */
.header{background:#161A23;border-bottom:1px solid #2A3040;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:calc(14px + env(safe-area-inset-top))}
.logo{font-size:21px;font-weight:900;letter-spacing:2px}
.logo span{color:#C8FF00}
.logo em{color:#E8ECF0;font-style:normal}
.phase-badge{font-size:11px;font-weight:600;margin-left:8px}
.btn-add{background:#C8FF00;color:#000;border-radius:8px;padding:8px 14px;font-weight:800;font-size:13px;letter-spacing:1px}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:90px}

/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#161A23;border-top:1px solid #2A3040;display:flex;justify-content:space-around;padding:10px 0;padding-bottom:calc(10px + env(safe-area-inset-bottom));z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;letter-spacing:.5px;padding:4px 8px;color:#6B7385;transition:color .15s;background:none;border:none}
.nav-btn.active{color:#C8FF00}
.nav-icon{font-size:19px}

/* CARDS */
.card{background:#1E2330;border:1px solid #2A3040;border-radius:12px;padding:18px;margin-bottom:12px}
.sec-title{font-size:12px;color:#6B7385;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.stat-box{background:#161A23;border:1px solid #2A3040;border-radius:10px;padding:14px 16px;flex:1;min-width:85px}
.stat-val{font-size:26px;font-weight:900;line-height:1}
.stat-lbl{font-size:11px;color:#6B7385;margin-top:3px}

/* TAGS */
.tag{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:600;margin:2px}

/* FORM */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0D0F14;border:1px solid #2A3040;border-radius:20px 20px 0 0;padding:24px 18px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.modal-title{font-size:19px;font-weight:900;letter-spacing:1px;margin-bottom:18px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-size:11px;color:#6B7385;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.input{background:#161A23;border:1px solid #2A3040;border-radius:8px;color:#E8ECF0;padding:10px 13px;font-size:14px;width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.type-btn{border-radius:10px;padding:8px 2px;font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;border:2px solid #2A3040;background:#161A23;color:#6B7385}
.ressenti-row{display:flex;gap:5px}
.res-btn{flex:1;border-radius:8px;padding:7px 2px;font-size:10px;font-weight:700;transition:all .15s;border:2px solid #2A3040;background:#161A23;color:#6B7385}
.btn-save{width:100%;border-radius:10px;padding:13px;font-weight:800;font-size:15px;letter-spacing:1px;border:none;margin-top:6px}
.btn-cancel{background:#161A23;border:1px solid #2A3040;border-radius:10px;padding:13px 16px;color:#6B7385;font-weight:600;margin-left:8px}

/* SESSION CARD */
.session-card{background:#1E2330;border:1px solid #2A3040;border-radius:12px;overflow:hidden;margin-bottom:10px}
.session-card-inner{padding:13px 15px}
.session-header{display:flex;justify-content:space-between;align-items:flex-start}
.session-info{display:flex;gap:10px;align-items:center}
.session-icon{font-size:18px}
.session-meta{font-size:11px;color:#6B7385;margin-top:3px}
.session-actions{display:flex;gap:6px}
.prog-expand{background:#1E2330;border:1px solid #2A3040;border-radius:6px;padding:3px 8px;color:#6B7385;font-size:11px}
.prog-detail{border-top:1px solid #2A3040;padding:12px 15px;background:#161A23}
.prog-step{display:flex;gap:8px;align-items:flex-start;margin-bottom:7px;font-size:12px;line-height:1.5}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{font-size:22px;color:#6B7385;background:none;border:none;padding:4px 8px}
.cal-title{font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center}
.cal-dow{font-size:10px;color:#6B7385;font-weight:700;padding:4px 0}
.cal-day{border-radius:7px;padding:5px 1px;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:3px;border:1px solid transparent;transition:all .1s}
.cal-day.has-events{background:#161A23;border-color:#2A3040;cursor:pointer}
.cal-day.is-today{background:rgba(200,255,0,.12);border-color:#C8FF00}
.cal-day.has-match{background:rgba(255,70,85,.12);border-color:rgba(255,70,85,.4)}
.cal-day.has-kine{background:rgba(233,30,140,.12);border-color:rgba(233,30,140,.3)}
.cal-day.has-forme{background:rgba(255,107,157,.12);border-color:rgba(255,107,157,.4)}
.cal-day-num{font-size:12px}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.cal-leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#6B7385}
.cal-leg-dot{width:7px;height:7px;border-radius:50%}

/* PHASE BANNER */
.phase-banner{border-radius:12px;padding:14px 16px;margin-bottom:14px}
.phase-restriction{font-size:12px;color:#6B7385;line-height:1.6;background:rgba(13,15,20,.6);border-radius:8px;padding:8px 12px;margin-top:8px}

/* ROADMAP */
.roadmap-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.roadmap-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:2px solid}

/* BARS */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-track{flex:1;height:8px;background:#161A23;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}

/* NEXT MATCH BANNER */
.match-banner{border-radius:12px;padding:14px 16px;margin-bottom:12px}

/* ICS EXPORT BTN */
.ics-btn{width:100%;background:#161A23;border:1px solid rgba(200,255,0,.3);border-radius:10px;padding:12px;color:#C8FF00;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}

/* SEASON */
.period-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.period-btn{border-radius:12px;padding:12px 8px;text-align:center;border:2px solid #2A3040;background:#161A23;cursor:pointer;transition:all .15s}
.period-btn.active{border-width:2px}
.period-icon{font-size:24px;margin-bottom:4px}
.period-label{font-size:11px;font-weight:700;line-height:1.3}
.week-card{background:#1E2330;border:1px solid #2A3040;border-radius:12px;overflow:hidden;margin-bottom:10px}
.week-day{padding:12px 15px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2A3040}
.week-day:last-child{border-bottom:none}
.week-day-label{font-size:12px;font-weight:700;color:#6B7385;width:70px;flex-shrink:0}
.week-day-info{flex:1}
.week-day-title{font-size:13px;font-weight:600}
.week-day-desc{font-size:11px;color:#6B7385;margin-top:2px}
.week-day-btn{background:none;border:1px solid #2A3040;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;color:#6B7385}

/* CHARGES */
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.ex-btn{background:#161A23;border:1px solid #2A3040;border-radius:10px;padding:12px 10px;text-align:left;transition:all .15s;cursor:pointer}
.ex-btn.active{border-color:#4A90E2;background:#4A90E280 !important}
.ex-btn-icon{font-size:18px;margin-bottom:4px}
.ex-btn-label{font-size:12px;font-weight:600;color:#E8ECF0;line-height:1.3}
.ex-btn-last{font-size:11px;color:#6B7385;margin-top:3px}
.set-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.set-num{width:24px;height:24px;border-radius:50%;background:#4A90E222;color:#4A90E2;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.set-input{background:#0D0F14;border:1px solid #2A3040;border-radius:8px;color:#E8ECF0;padding:8px 10px;font-size:14px;text-align:center}
.set-label{font-size:11px;color:#6B7385;text-align:center;margin-top:3px}
.prog-chart{height:80px;display:flex;align-items:flex-end;gap:4px;margin-top:10px}
.prog-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.prog-bar-inner{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .3s}
.prog-bar-lbl{font-size:9px;color:#6B7385;text-align:center}

/* COACH VIEW */
.coach-view{display:flex;flex-direction:column;height:calc(100vh - 140px)}
.coach-messages{flex:1;overflow-y:auto;padding-bottom:10px;display:flex;flex-direction:column;gap:10px}
.coach-msg{padding:12px 15px;border-radius:14px;font-size:14px;line-height:1.6;max-width:90%}
.coach-msg.user{background:#C8FF0022;color:#C8FF00;align-self:flex-end;border:1px solid #C8FF0044;border-radius:14px 14px 4px 14px}
.coach-msg.assistant{background:#1E2330;color:#E8ECF0;align-self:flex-start;border:1px solid #2A3040;border-radius:14px 14px 14px 4px}
.coach-msg.loading{color:#6B7385;font-style:italic}
.coach-input-wrap{background:#161A23;border-top:1px solid #2A3040;padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:8px;align-items:flex-end}
.coach-textarea{flex:1;background:#0D0F14;border:1px solid #2A3040;border-radius:12px;color:#E8ECF0;padding:10px 13px;font-size:14px;resize:none;min-height:44px;max-height:120px;line-height:1.4}
.coach-send{background:#C8FF00;color:#000;border:none;border-radius:10px;padding:10px 14px;font-weight:800;font-size:18px;height:44px;flex-shrink:0}
.coach-send:disabled{background:#2A3040;color:#6B7385}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.quick-btn{background:#1E2330;border:1px solid #2A3040;border-radius:20px;padding:6px 12px;font-size:12px;color:#6B7385;font-weight:600;white-space:nowrap}

/* AI ASSISTANT */
.ai-fab{position:fixed;bottom:80px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#C8FF00,#8BB000);border:none;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(200,255,0,.4);z-index:99;cursor:pointer;transition:transform .15s}
.ai-fab:active{transform:scale(.92)}
.ai-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:#161A23;border-top:1px solid #2A3040;border-radius:20px 20px 0 0;padding:16px;z-index:150;transition:transform .3s;padding-bottom:calc(16px + env(safe-area-inset-bottom))}
.ai-panel.hidden{transform:translateY(100%)}
.ai-messages{max-height:280px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.ai-msg{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.5;max-width:88%}
.ai-msg.user{background:#C8FF0022;color:#C8FF00;align-self:flex-end;border:1px solid #C8FF0044}
.ai-msg.assistant{background:#1E2330;color:#E8ECF0;align-self:flex-start;border:1px solid #2A3040}
.ai-msg.loading{color:#6B7385;font-style:italic}
.ai-input-row{display:flex;gap:8px;align-items:flex-end}
.ai-input{flex:1;background:#0D0F14;border:1px solid #2A3040;border-radius:12px;color:#E8ECF0;padding:10px 13px;font-size:14px;resize:none;min-height:44px;max-height:100px;line-height:1.4}
.ai-send{background:#C8FF00;color:#000;border:none;border-radius:10px;padding:10px 14px;font-weight:800;font-size:15px;flex-shrink:0;height:44px}
.ai-send:disabled{background:#2A3040;color:#6B7385}
.ai-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ai-title{font-size:14px;font-weight:700;color:#C8FF00}
.ai-close{color:#6B7385;font-size:18px;background:none;border:none}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <span class="logo"><span>RUGBY</span><em> PERF</em></span>
      <span class="phase-badge" id="phase-badge"></span>
    </div>
    <button class="btn-add" onclick="openSessionForm()">+ SÉANCE</button>
  </div>
  <div class="content" id="content"></div>
  <nav class="nav" id="nav"></nav>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<!-- AI FAB -->
<button class="ai-fab" onclick="toggleAI()" id="ai-fab">🤖</button>

<!-- AI PANEL -->
<div class="ai-panel hidden" id="ai-panel">
  <div class="ai-header">
    <div class="ai-title">🤖 Assistant Rugby Perf</div>
    <button class="ai-close" onclick="toggleAI()">✕</button>
  </div>
  <div class="ai-messages" id="ai-messages">
    <div class="ai-msg assistant">Salut Louis ! 👋 Dis-moi ce que tu veux ajouter — séance, match, kiné... Je m'occupe de tout !</div>
  </div>
  <div class="ai-input-row">
    <textarea class="ai-input" id="ai-input" placeholder="Ex: Kiné lundi 29 juin à 11h avec Guillaume" rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI()}"></textarea>
    <button class="ai-send" id="ai-send" onclick="sendAI()">↑</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const C = {
  accent:"#C8FF00",red:"#FF4655",blue:"#4A90E2",purple:"#9B59B6",
  teal:"#1ABC9C",orange:"#F39C12",pink:"#E91E8C",muted:"#6B7385",forme:"#FF6B9D"
};

const SESSION_TYPES = {
  terrain:{label:"Terrain",icon:"🏉",color:C.accent},
  muscu:{label:"Muscu",icon:"🏋️",color:C.blue},
  match:{label:"Match",icon:"⚔️",color:C.red},
  recup:{label:"Récup",icon:"💤",color:C.teal},
  kine:{label:"Kiné",icon:"🩺",color:C.pink},
  forme:{label:"Forme",icon:"❤️",color:C.forme},
};

const RESSENTI = ["😴 Épuisé","😐 Moyen","🙂 Bien","💪 Super","🔥 En feu"];
const POSITIONS = ["Pilier G","Talonneur","Pilier D","2ème ligne","Flanker","N°8","Demi de mêlée","Demi d'ouverture","Centre","Ailier","Arrière"];
const COMPETITIONS = ["Championnat","Coupe","Amical","Tournoi","Autre"];

const EXERCISES = [
  {id:"squat",         label:"Squat barre",              cat:"force",      icon:"🦵"},
  {id:"hipthrust",     label:"Hip Thrust",               cat:"force",      icon:"🍑"},
  {id:"fentes",        label:"Fentes bulgares",           cat:"force",      icon:"🦵"},
  {id:"legpress",      label:"Leg Press",                cat:"force",      icon:"🦵"},
  {id:"rdl",           label:"Romanian Deadlift",         cat:"force",      icon:"💪"},
  {id:"jumpsquat",     label:"Squat sauté",              cat:"explosif",   icon:"⚡"},
  {id:"foulee",        label:"Foulées bondissantes",      cat:"explosif",   icon:"🏃"},
  {id:"boxjump",       label:"Box Jump",                 cat:"explosif",   icon:"📦"},
  {id:"dc",            label:"Développé couché",          cat:"haut",       icon:"💪"},
  {id:"dm",            label:"Développé militaire",       cat:"haut",       icon:"🏋️"},
  {id:"tirageh",       label:"Tirage horizontal",         cat:"haut",       icon:"🔙"},
  {id:"tiragev",       label:"Tirage vertical",           cat:"haut",       icon:"⬇️"},
  {id:"gainage",       label:"Gainage planche",           cat:"core",       icon:"🧱"},
  {id:"abwheel",       label:"Ab Wheel",                 cat:"core",       icon:"⚙️"},
  {id:"goodmorning",   label:"Good Morning",             cat:"core",       icon:"🌅"},
];

const EX_CATS = {force:"🦵 Force inf.",explosif:"⚡ Explosivité",haut:"💪 Haut du corps",core:"🧱 Gainage"};

const SEASON_PERIODS = {
  ete:{
    label:"Préparation estivale",icon:"🌞",color:"#F39C12",
    desc:"Pas de match — on tape fort ! Volume élevé, charges lourdes.",
    days:{
      lundi:{key:"ete_force",label:"Force / Puissance",icon:"⚡"},
      mercredi:{key:"ete_cardio",label:"Cardio / Explosivité",icon:"💨"},
      vendredi:{key:"ete_volume",label:"Volume / Hypertrophie",icon:"💪"},
    }
  },
  saison:{
    label:"Pleine saison",icon:"🏉",color:"#C8FF00",
    desc:"Match le weekend — intensité modulée selon le calendrier.",
    days:{
      lundi:{key:"phase3_recup",label:"Récup active",icon:"🌊"},
      mercredi:{key:"phase3_force",label:"Force / Puissance",icon:"⚡"},
      vendredi:{key:"phase3_activation",label:"Activation pré-match",icon:"🔋"},
    }
  },
  basse:{
    label:"Saison basse",icon:"💤",color:"#4A90E2",
    desc:"Coupure — récupération, entretien, mobilité.",
    days:{
      lundi:{key:"phase1_mobilite",label:"Mobilité & gainage",icon:"🧘"},
      mercredi:{key:"recup_volume",label:"Volume entretien",icon:"💪"},
      vendredi:{key:"phase1_mobilite",label:"Mobilité & gainage",icon:"🧘"},
    }
  },
};

const MUSCU_PROGRAMS_ETE = {
  ete_force:{label:"Force / Puissance",icon:"⚡",color:"#F39C12",duree:75,exercices:["Squat barre — 5×5 lourd (charge max semaine)","Hip Thrust — 4×6 explosif","Soulevé de terre — 4×5","Développé militaire — 4×6","Fentes bulgares lestées — 3×8/jambe","Gainage planche — 3×1min"]},
  ete_cardio:{label:"Cardio / Explosivité",icon:"💨",color:"#1ABC9C",duree:60,exercices:["Sprints 10m/20m/30m — 4 séries chaque","Squat jump — 4×8 explosif","Changements direction 5-10-5 — 8 reps","Box Jump — 4×8","Foulées bondissantes lestées — 4×20m","Vélo HIIT 10min finisher"]},
  ete_volume:{label:"Volume / Hypertrophie",icon:"💪",color:"#4A90E2",duree:70,exercices:["Développé couché — 4×10","Tirage horizontal — 4×12","Leg Press — 4×12","Romanian Deadlift — 4×10","Tirage vertical — 4×12","Ab Wheel — 4×12","Good Morning — 3×12"]},
};

// MUSCU_PROGRAMS_ETE merged below via spread

const INJURY_PHASES = {
  phase1:{label:"Phase 1 — Immobilisation",sublabel:"Bas du corps + bras gauche uniquement",color:C.red,icon:"🩹",endDate:"2025-06-26"},
  phase2:{label:"Phase 2 — Rééducation",sublabel:"Kiné intensif + reprise progressive",color:C.orange,icon:"🔄",endDate:"2025-07-06"},
  phase3:{label:"Phase 3 — Reprise terrain",sublabel:"Course + cardio, pas de contact ni passes",color:C.accent,icon:"🏃",endDate:null},
};

const MUSCU_PROGRAMS = {

// ── HELPERS ───────────────────────────────────────────────────────────────────
function today(){ return new Date().toISOString().slice(0,10); }
function addDays(d,n){ const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
function weekKey(d){ const dt=new Date(d); const day=dt.getDay()||7; dt.setDate(dt.getDate()+1-day); return dt.toISOString().slice(0,10); }
function fmt(d){ return new Date(d).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}); }
function fmtFull(d){ return new Date(d).toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"}); }
function fmtMonth(d){ return new Date(d+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"}); }
function diffDays(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function getPhase(d){
  if(d<=INJURY_PHASES.phase1.endDate) return "phase1";
  if(d<=INJURY_PHASES.phase2.endDate) return "phase2";
  return "phase3";
}
function tag(color,text){ return `<span class="tag" style="background:${color}22;color:${color}">${text}</span>`; }

// ── MUSCU GENERATOR ───────────────────────────────────────────────────────────
function generateMuscu(){
  const gen=[], reserved=new Set();
  const sorted=[...matches].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(m=>{
    const j4=addDays(m.date,-4), j2=addDays(m.date,-2), j1=addDays(m.date,1);
    const ph4=getPhase(j4), ph2=getPhase(j2), ph1=getPhase(j1);
    const fk = ph4==="phase1"?"phase1_force":ph4==="phase2"?"phase2_kinemix":"phase3_force";
    const ak = ph2==="phase1"?"phase1_cardio":ph2==="phase2"?"phase2_cardio":"phase3_activation";
    const rk = ph1==="phase1"?"phase1_mobilite":ph1==="phase2"?"phase2_cardio":"phase3_recup";
    [[j4,fk,`Prépa match vs ${m.adversaire}`],[j2,ak,`J-2 avant ${m.adversaire}`],[j1,rk,`Post-match vs ${m.adversaire}`]].forEach(([date,pk,note])=>{
      reserved.add(date);
      const p=MUSCU_PROGRAMS[pk];
      gen.push({id:`auto_${m.id}_${date}`,type:"muscu",date,duree:p.duree,ressenti:2,notes:note,exercices:p.exercices,muscuProgKey:pk,fromMatchId:m.id,auto:true});
    });
  });
  if(sorted.length>=2){
    for(let i=0;i<sorted.length-1;i++){
      let cur=addDays(sorted[i].date,2);
      const end=addDays(sorted[i+1].date,-5);
      while(cur<=end){
        const dow=new Date(cur).getDay();
        if((dow===2||dow===4)&&!reserved.has(cur)){
          const ph=getPhase(cur);
          const pk=ph==="phase1"?(dow===2?"phase1_force":"phase1_cardio"):ph==="phase2"?(dow===2?"phase2_kinemix":"phase2_cardio"):"recup_volume";
          const p=MUSCU_PROGRAMS[pk];
          gen.push({id:`auto_vol_${cur}`,type:"muscu",date:cur,duree:p.duree,ressenti:2,notes:p.exercices[0],exercices:p.exercices,muscuProgKey:pk,auto:true});
          reserved.add(cur);
        }
        cur=addDays(cur,1);
      }
    }
  }
  autoSessions=gen; save("rp_auto",autoSessions); render();
}

// ── ICS EXPORT ────────────────────────────────────────────────────────────────
function exportICS(events,filename){
  const f8=d=>d.replace(/-/g,"");
  const stamp=new Date().toISOString().replace(/[-:]/g,"").slice(0,15)+"Z";
  let s="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//RugbyPerf//FR\r\nCALSCALE:GREGORIAN\r\n";
  events.forEach((e,i)=>{
    const title=e.type==="kine"?`🩺 Kiné ${e.kineZone||""}`:e.type==="match"?`⚔️ Match vs ${e.adversaire||""}`:e.muscuProgKey?`🏋️ ${MUSCU_PROGRAMS[e.muscuProgKey]?.label||"Muscu"}`:`🏉 ${e.type}`;
    const desc=Array.isArray(e.exercices)?e.exercices.join("\\n"):(e.notes||"");
    s+=`BEGIN:VEVENT\r\nUID:rp-${e.id||i}\r\nDTSTAMP:${stamp}\r\nDTSTART;VALUE=DATE:${f8(e.date)}\r\nDTEND;VALUE=DATE:${f8(addDays(e.date,1))}\r\nSUMMARY:${title}\r\n`;
    if(desc) s+=`DESCRIPTION:${desc}\r\n`;
    s+="END:VEVENT\r\n";
  });
  s+="END:VCALENDAR";
  const blob=new Blob([s],{type:"text/calendar;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}

function saveSessionCharges(sessionId){
  const s = sessions.find(x=>x.id==sessionId) || autoSessions.find(x=>x.id==sessionId);
  if(!s) return;

  const exArr = Array.isArray(s.exercices) ? s.exercices : (s.exercices ? s.exercices.split("|") : []);
  let savedCount = 0;

  exArr.forEach((ex, ei) => {
    const exKey = "sess_"+sessionId+"_ex"+ei;
    const exName = ex.trim().split("—")[0].trim().split("(")[0].trim();

    // Find matching EXERCISES entry for proper tracking
    const exEntry = EXERCISES.find(e => exName.toLowerCase().includes(e.label.toLowerCase().split(" ")[0].toLowerCase()));

    const sets = [];
    for(let si=0; si<4; si++){
      const kgEl = document.getElementById(exKey+"_kg"+si);
      const repsEl = document.getElementById(exKey+"_reps"+si);
      if(kgEl && repsEl){
        const kg = parseFloat(kgEl.value);
        const reps = parseInt(repsEl.value);
        if(kg && reps) sets.push({kg, reps});
      }
    }

    if(sets.length > 0){
      // Remove existing entry for this exKey
      chargesLog = chargesLog.filter(c=>c.exKey!==exKey);
      chargesLog.push({
        id: Date.now() + ei,
        exId: exEntry ? exEntry.id : "custom_"+ei,
        exKey: exKey,
        exName: exName,
        sessionId: sessionId,
        date: s.date,
        notes: s.notes || "",
        sets,
      });
      savedCount++;
    }
  });

  save("rp_charges", chargesLog);
  closeModal();

  // Show confirmation
  const btn = document.querySelector(`[onclick="openChargesLog('${sessionId}')"]`);
  render();
  alert(savedCount + " exercices enregistrés dans le suivi des charges !");
}

function getNextWeekday(dayName){
  const days={lundi:1,mercredi:3,vendredi:5};
  const target=days[dayName]||1;
  const now=new Date();
  const current=now.getDay()===0?7:now.getDay();
  let diff=target-current;
  if(diff<=0) diff+=7;
  return addDays(today(),diff);
}

function generateWeekSession(progKey,dayName){
  const prog = MUSCU_PROGRAMS[progKey] || MUSCU_PROGRAMS_ETE[progKey];
  if(!prog){ alert("Programme introuvable !"); return; }
  const date=getNextWeekday(dayName);
  const s={
    id:Date.now(), type:"muscu", date, heure:"", duree:prog.duree,
    ressenti:2, notes:"Généré — "+prog.label,
    exercices:prog.exercices, muscuProgKey:progKey, auto:false,
  };
  sessions=[...sessions,s];
  save("rp_sessions",sessions);
  render();
  alert("Séance "+prog.label+" créée pour le "+fmt(date)+" !");
}

function generateFullWeek(){
  const phase=getPhase(today());
  const period=SEASON_PERIODS[seasonPeriod];
  const injDays={
    lundi:{key:phase==="phase1"?"phase1_force":"phase2_kinemix"},
    mercredi:{key:phase==="phase1"?"phase1_cardio":"phase2_cardio"},
    vendredi:{key:"phase1_mobilite"},
  };
  const days=phase==="phase3"?period.days:injDays;
  let count=0;
  Object.entries(days).forEach(([day,info])=>{
    const prog={...MUSCU_PROGRAMS,...MUSCU_PROGRAMS_ETE}[info.key];
    if(!prog) return;
    const date=getNextWeekday(day);
    // Don't duplicate
    const exists=sessions.find(s=>s.date===date&&s.type==="muscu");
    if(!exists){
      sessions=[...sessions,{id:Date.now()+Math.random(),type:"muscu",date,heure:"",duree:prog.duree,ressenti:2,notes:"Généré — "+prog.label,exercices:prog.exercices,muscuProgKey:info.key,auto:false}];
      count++;
    }
  });
  save("rp_sessions",sessions);
  render();
  if(count>0) alert(count+" séances créées pour la semaine prochaine !");
  else alert("Les séances existent déjà pour cette semaine !");
}

  const allEvents=[...sessions.map(s=>({...s,_kind:"session"})),...autoSessions.map(s=>({...s,_kind:"auto"})),...matches.map(m=>({...m,type:"match_planned",_kind:"planned"}))].sort((a,b)=>a.date.localeCompare(b.date));
  const upcoming=allEvents.filter(e=>e.date>=today());
  const past=allEvents.filter(e=>e.date<today()).reverse().slice(0,10);
  let html=`<div class="sec-title">A venir (${upcoming.length})</div>`;
  if(!upcoming.length) html+=`<div class="card" style="text-align:center;padding:30px"><div style="font-size:40px">📅</div><div style="color:#6B7385;margin-top:10px">Aucun evenement.<br>Ajoute des seances ou des matchs !</div></div>`;
  const byDate={};
  upcoming.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  Object.entries(byDate).slice(0,30).forEach(([date,events])=>{
    const isToday=date===today(),isTomorrow=date===addDays(today(),1);
    const dayLabel=isToday?"Aujourd\'hui":isTomorrow?"Demain":fmtFull(date);
    const days=diffDays(today(),date);
    html+=`<div style="margin-bottom:14px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:${isToday?C.accent:"#E8ECF0"}">${dayLabel}</div>${days>0?`<div style="font-size:11px;color:#6B7385">dans ${days}j</div>`:""}<div style="flex:1;height:1px;background:#2A3040"></div></div>`;
    events.forEach(e=>{
      if(e._kind==="planned"){
        const ll={D:"🏠",E:"✈️",N:"⚖️"};
        html+=`<div style="background:#FF465518;border:1px solid #FF465544;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px"><span style="font-size:20px">⚔️</span><div style="flex:1"><div style="font-weight:700;color:#FF4655">vs ${e.adversaire}</div><div style="font-size:12px;color:#6B7385">${e.heure||"15:00"} · ${ll[e.lieu]||""} · ${e.competition}</div></div>${tag(days<=3?C.red:days<=7?C.orange:C.teal,"J-"+days)}</div>`;
      } else {
        const t=SESSION_TYPES[e.type]||SESSION_TYPES.muscu,prog=e.muscuProgKey?MUSCU_PROGRAMS[e.muscuProgKey]:null;
        const color=prog?prog.color:t.color,icon=prog?prog.icon:t.icon,label=prog?prog.label:t.label;
        const exArrAg=Array.isArray(e.exercices)?e.exercices:(e.exercices?e.exercices.split("|"):[]);
        const hasChargesAg=chargesLog.some(c=>c.sessionId==e.id);
        html+=`<div onclick="openSessionDetail('${e.id}','${e._kind}')" style="background:#1E2330;border:1px solid ${color}33;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer">
          <span style="font-size:20px">${icon}</span>
          <div style="flex:1">
            <div style="font-weight:600;font-size:13px">${label}${e.auto?` <span style="font-size:10px;color:#6B7385">(auto)</span>`:""}</div>
            <div style="font-size:12px;color:#6B7385;margin-top:2px">${e.heure?e.heure+" · ":""}${e.duree?e.duree+" min":""}${e.type==="kine"&&e.kinePraticien?" · "+e.kinePraticien:""}${e.type==="terrain"&&e.focus?" · "+e.focus:""}</div>
            ${e.notes?`<div style="font-size:11px;color:#6B7385;margin-top:2px;font-style:italic">${e.notes}</div>`:""}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span style="font-size:16px;color:#6B7385">›</span>
            ${exArrAg.length?`<div style="font-size:10px;color:${hasChargesAg?"#1ABC9C":"#4A90E2"}">${hasChargesAg?"✅":"📋 "+exArrAg.length+"ex"}</div>`:""}
          </div>
        </div>`;
      }
    });
    html+=`</div>`;
  });
  if(past.length){
    html+=`<div class="sec-title">Recent</div>`;
    past.filter(e=>e._kind!=="planned").forEach(e=>{
      const t=SESSION_TYPES[e.type]||SESSION_TYPES.muscu,prog=e.muscuProgKey?MUSCU_PROGRAMS[e.muscuProgKey]:null;
      const color=prog?prog.color:t.color,icon=prog?prog.icon:t.icon,label=prog?prog.label:t.label;
      html+=`<div onclick="openSessionDetail('${e.id}','${e._kind}')" style="background:#1E2330;border:1px solid #2A3040;border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;opacity:.75;cursor:pointer"><span style="font-size:16px">${icon}</span><div style="flex:1"><div style="font-size:13px;font-weight:600">${label}</div><div style="font-size:11px;color:#6B7385">${fmt(e.date)}${e.heure?" · "+e.heure:""}${e.duree?" · "+e.duree+"min":""}</div></div><div style="font-size:11px;color:#6B7385">›</div></div>`;
    });
  }
  return html;
}

  let html=`<div class="card" style="border-color:${C.blue}44;background:${C.blue}08">
  <div style="font-size:13px;font-weight:700;color:${C.blue};margin-bottom:8px">🏋️ Programme muscu intelligent</div>
  <div style="font-size:12px;color:#6B7385;line-height:1.7;margin-bottom:14px">
    Adapté : <span style="color:${C.accent}">Demi de mêlée · 28 ans</span><br>
    <span style="color:${C.red}">Phase 1</span> bas du corps + bras G · <span style="color:${C.orange}">Phase 2</span> kiné+renfo · <span style="color:${C.accent}">Phase 3</span> complet<br>
    <span style="color:${C.orange}">⚡ J-4</span> Force · <span style="color:${C.purple}">🔋 J-2</span> Activation · <span style="color:${C.teal}">🌊 J+1</span> Récup

  <button onclick="generateMuscu()" style="width:100%;background:${C.blue};color:#fff;border:none;border-radius:10px;padding:12px;font-weight:800;font-size:14px;letter-spacing:1px">
    ${autoSessions.length?"♻️ RÉGÉNÉRER LE PROGRAMME":"⚡ GÉNÉRER LE PROGRAMME MUSCU"}
  </button>
  ${autoSessions.length?`<div style="font-size:11px;color:${C.teal};margin-top:8px;text-align:center">✅ ${autoSessions.length} séances générées</div>`:""}
  </div>`;

  if(matches.length>0||autoSessions.length>0){
    html+=`<button class="ics-btn" onclick="exportICS([...matches.map(m=>({...m,type:'match'})),...autoSessions],'planning-rugby.ics')">📱 Exporter tout → Apple Calendar</button>`;
  }

  html+=`<button onclick="openMatchForm()" style="width:100%;background:${C.red};color:#fff;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:15px;letter-spacing:1px;margin-bottom:14px">+ AJOUTER UN MATCH</button>`;

  if(upcoming.length){
    html+=`<div class="sec-title">À venir (${upcoming.length})</div>`;
    upcoming.forEach(m=>{
      const days=diffDays(today(),m.date);
      const dc=days<=3?C.red:days<=7?C.orange:C.teal;
      const linked=autoSessions.filter(s=>s.fromMatchId===m.id);
      html+=`<div style="background:#1E2330;border:1px solid #2A3040;border-radius:12px;overflow:hidden;margin-bottom:10px">
        <div style="padding:14px 16px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-weight:700;font-size:15px">⚔️ vs ${m.adversaire}</div>
              <div style="font-size:12px;color:#6B7385;margin-top:3px">${fmtFull(m.date)} · ${m.heure||""} · ${lieuL[m.lieu]}</div>
              <div style="margin-top:6px">${tag(dc,days===0?"Auj.":days===1?"Demain":"J-"+days)}${tag(C.muted,m.competition)}</div>
            </div>
            <div style="display:flex;gap:8px">
              <button onclick="editMatch('${m.id}')" style="color:#6B7385;font-size:15px">✏️</button>
              <button onclick="deleteMatch('${m.id}')" style="color:#FF4655;font-size:15px">🗑️</button>

        </div>
        ${linked.length?`<div style="border-top:1px solid #2A3040;padding:10px 16px;background:#161A23">
          <div style="font-size:11px;color:#6B7385;font-weight:700;letter-spacing:1px;margin-bottom:8px">SÉANCES MUSCU PLANIFIÉES</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${linked.map(s=>{const p=MUSCU_PROGRAMS[s.muscuProgKey];return p?`<div style="background:${p.color}18;border:1px solid ${p.color}44;border-radius:8px;padding:5px 10px;font-size:12px"><span style="color:${p.color}">${p.icon}</span> <strong>${fmt(s.date)}</strong> <span style="color:#6B7385">· ${p.label}</span></div>`:""}).join("")}

      </div>`;

  if(!matches.length) html+=`<div class="card" style="text-align:center;padding:40px"><div style="font-size:48px">📅</div><div style="color:#6B7385;margin-top:12px;line-height:1.6">Aucun match planifié.<br>Ajoute tes matchs !</div></div>`;
  return html;

// ── CHARGES ───────────────────────────────────────────────────────────────────
let selectedEx = null;

function renderCharges(){
  let html = `<div class="sec-title">Suivi des charges — sélectionne un exercice</div>`;

  // Cat groups
  Object.entries(EX_CATS).forEach(([cat, catLabel]) => {
    html += `<div style="font-size:11px;color:#6B7385;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">${catLabel}</div>`;
    html += `<div class="ex-grid">`;
    EXERCISES.filter(e=>e.cat===cat).forEach(ex => {
      const logs = chargesLog.filter(l=>l.exId===ex.id);
      const last = logs[logs.length-1];
      const maxKg = last ? Math.max(...last.sets.map(s=>s.kg||0)) : null;
      const isActive = selectedEx === ex.id;
      html += `<button class="ex-btn ${isActive?"active":""}" onclick="selectEx('${ex.id}')" style="${isActive?"border-color:#4A90E2;background:#4A90E214":""}">
        <div class="ex-btn-icon">${ex.icon}</div>
        <div class="ex-btn-label">${ex.label}</div>
        <div class="ex-btn-last">${maxKg ? maxKg+"kg · "+fmt(last.date) : "Aucune donnée"}</div>
      </button>`;
    });
    html += `</div>`;
  });

  if(selectedEx){
    const ex = EXERCISES.find(e=>e.id===selectedEx);
    const logs = chargesLog.filter(l=>l.exId===selectedEx).slice(-8);
    html += `<div class="card" style="border-color:#4A90E244;margin-top:4px">
      <div style="font-size:15px;font-weight:700;color:#4A90E2;margin-bottom:14px">${ex.icon} ${ex.label}</div>`;

    // Mini graph if history
    if(logs.length > 1){
      const maxVals = logs.map(l=>Math.max(...l.sets.map(s=>s.kg||0)));
      const maxAll = Math.max(...maxVals, 1);
      html += `<div class="sec-title">Progression charge max</div>
      <div class="prog-chart">`;
      logs.forEach((l,i) => {
        const h = Math.round((maxVals[i]/maxAll)*100);
        html += `<div class="prog-bar-wrap">
          <div class="prog-bar-inner" style="height:${h}%;background:#4A90E2;width:100%"></div>
          <div class="prog-bar-lbl">${maxVals[i]}kg</div>
          <div class="prog-bar-lbl">${fmt(l.date)}</div>
        </div>`;
      });
      html += `</div>`;
    }

    // Add new entry form
    html += `<div class="sec-title" style="margin-top:16px">Nouvelle séance — ${today()}</div>
    <div id="sets-container">`;
    for(let i=1;i<=4;i++){
      html += renderSetRow(i);
    }
    html += `</div>
    <button onclick="addSetRow()" style="width:100%;background:#161A23;border:1px solid #2A3040;border-radius:8px;padding:10px;color:#6B7385;font-size:13px;font-weight:600;margin-bottom:12px">+ Ajouter une série</button>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Date</label><input class="input" type="date" id="ch_date" value="${today()}"/></div>
      <div class="field"><label>Notes</label><input class="input" id="ch_notes" placeholder="Sensations..."/></div>
    </div>
    <button onclick="saveCharges()" style="width:100%;background:#4A90E2;color:#fff;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:15px;letter-spacing:1px">💾 ENREGISTRER LA SÉANCE</button>`;

    // Last sessions history
    if(logs.length){
      html += `<div class="sec-title" style="margin-top:18px">Historique</div>`;
      [...logs].reverse().forEach(l => {
        const maxKg = Math.max(...l.sets.map(s=>s.kg||0));
        const totalVol = l.sets.reduce((a,s)=>(s.kg&&s.reps?a+(s.kg*s.reps):a),0);
        html += `<div style="background:#161A23;border:1px solid #2A3040;border-radius:10px;padding:12px 14px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="font-size:13px;font-weight:600">${fmt(l.date)}</div>
            <div style="display:flex;gap:8px;align-items:center">
              <span style="font-size:12px;color:#4A90E2;font-weight:700">${maxKg}kg max</span>
              <span style="font-size:11px;color:#6B7385">vol:${totalVol}kg</span>
              <button onclick="deleteCharge('${l.id}')" style="color:#FF4655;font-size:13px;background:none;border:none">🗑️</button>
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${l.sets.map((s,i)=>`<div style="background:#1E2330;border:1px solid #2A3040;border-radius:8px;padding:5px 10px;font-size:12px;color:#E8ECF0">S${i+1} · <strong style="color:#4A90E2">${s.kg}kg</strong> × ${s.reps}</div>`).join("")}
          </div>
        </div>`;
      });
    }

    html += `</div>`;
  }

  return html;
}

let _setCount = 4;

function renderSetRow(i, kg="", reps=""){
  return `<div class="set-row" id="set_${i}">
    <div class="set-num">${i}</div>
    <div style="flex:1">
      <input class="input set-input" type="number" id="kg_${i}" placeholder="kg" value="${kg}" style="width:100%"/>
      <div class="set-label">kg</div>
    </div>
    <div style="color:#6B7385;font-size:16px">×</div>
    <div style="flex:1">
      <input class="input set-input" type="number" id="reps_${i}" placeholder="reps" value="${reps}" style="width:100%"/>
      <div class="set-label">reps</div>
    </div>
  </div>`;
}

function addSetRow(){
  _setCount++;
  const container = document.getElementById("sets-container");
  if(container){
    const div = document.createElement("div");
    div.innerHTML = renderSetRow(_setCount);
    container.appendChild(div.firstChild);
  }
}

function selectEx(id){
  selectedEx = id;
  _setCount = 4;
  render();
  // Scroll to selected card
  setTimeout(()=>{
    const card = document.querySelector(".card");
    if(card) card.scrollIntoView({behavior:"smooth"});
  },100);
}

function saveCharges(){
  const date = document.getElementById("ch_date")?.value || today();
  const notes = document.getElementById("ch_notes")?.value || "";
  const sets = [];
  for(let i=1;i<=_setCount;i++){
    const kg = parseFloat(document.getElementById("kg_"+i)?.value);
    const reps = parseInt(document.getElementById("reps_"+i)?.value);
    if(kg && reps) sets.push({kg, reps});
  }
  if(!sets.length){ alert("Entre au moins une série !"); return; }
  const entry = {id:Date.now(), exId:selectedEx, date, notes, sets};
  chargesLog = [...chargesLog, entry];
  save("rp_charges", chargesLog);
  selectedEx = null;
  _setCount = 4;
  render();
}

function deleteCharge(id){
  if(confirm("Supprimer cette entrée ?")){
    chargesLog = chargesLog.filter(c=>c.id!=id);
    save("rp_charges", chargesLog);
    render();
  }
}

  let html=`<div class="phase-banner" style="background:${ph.color}18;border:1px solid ${ph.color}44">

    ${phase==="phase2"?`<div style="font-size:12px;color:${ph.color};font-weight:600;margin-top:10px">🏃 Reprise collective dans ${diffDays(today(),INJURY_PHASES.phase2.endDate)} jours</div>`:""}

  if(kineSess.length) html+=`<button class="ics-btn" onclick="exportICS(kineSess,'kine-rugby.ics')">📱 Exporter séances kiné → Apple Calendar</button>`;

  html+=`<button onclick="openKineForm()" style="width:100%;background:${C.pink};color:#fff;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:15px;letter-spacing:1px;margin-bottom:14px">+ AJOUTER UNE SÉANCE KINÉ</button>`;

  }
  return html;

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCalendar(){
  const [y,m]=calMonth.split("-").map(Number);
  const offset=(new Date(y,m-1,1).getDay()+6)%7;
  const dim=new Date(y,m,0).getDate();

  // Build events map
  const byDay={};
  const addEv=(d,e)=>{ if(!byDay[d])byDay[d]=[]; byDay[d].push(e); };
  sessions.forEach(s=>addEv(s.date,{...s,_k:"session"}));
  autoSessions.forEach(s=>addEv(s.date,{...s,_k:"auto"}));
  matches.forEach(m=>addEv(m.date,{...m,_k:"planned"}));

  const dotColor=e=>{
    if(e._k==="planned")return C.red;
    if(e.type==="kine")return C.pink;
    if(e.muscuProgKey&&MUSCU_PROGRAMS[e.muscuProgKey])return MUSCU_PROGRAMS[e.muscuProgKey].color;
    return SESSION_TYPES[e.type]?.color||C.muted;
  };

  let html=`<div class="card">
  <div class="cal-header">
    <button class="cal-nav" onclick="calPrev()">‹</button>
    <div class="cal-title">${fmtMonth(calMonth)}</div>
    <button class="cal-nav" onclick="calNext()">›</button>
  </div>
  <div class="cal-grid">
    ${["L","M","M","J","V","S","D"].map(d=>`<div class="cal-dow">${d}</div>`).join("")}
    ${Array(offset).fill('<div></div>').join("")}`;

  for(let day=1;day<=dim;day++){
    const ds=`${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    const evts=byDay[ds]||[];
    const isToday=ds===today();
    const hasMatch=evts.some(e=>e._k==="planned");
    const hasKine=evts.some(e=>e.type==="kine");
    const hasForme=evts.some(e=>e.type==="forme");
    const cls=["cal-day",evts.length?"has-events":"",isToday?"is-today":"",hasMatch?"has-match":hasKine?"has-kine":hasForme?"has-forme":""].filter(Boolean).join(" ");
    const numColor=hasMatch?C.red:hasKine?C.pink:hasForme?C.forme:isToday?C.accent:"#E8ECF0";
    html+=`<div class="${cls}" ${evts.length?`onclick="showDayModal('${ds}')"`:""}">

      <div class="cal-dots">${evts.slice(0,4).map(e=>`<div class="cal-dot" style="background:${dotColor(e)}"></div>`).join("")}</div>

  }

  html+=`</div>

}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const matchSess=sessions.filter(s=>s.type==="match");
  const V=matchSess.filter(m=>m.resultat==="V").length;
  const D=matchSess.filter(m=>m.resultat==="D").length;
  const avgTps=matchSess.length?Math.round(matchSess.reduce((a,m)=>a+(m.tpsJeu||0),0)/matchSess.length):0;

  // Weekly volume last 8 weeks
  const all=[...sessions,...autoSessions.filter(s=>s.date<=today())];
  const wkMap={};
  all.forEach(s=>{ const w=weekKey(s.date); if(!wkMap[w])wkMap[w]={terrain:0,muscu:0,match:0,recup:0,kine:0,total:0}; wkMap[w][s.type]=(wkMap[w][s.type]||0)+1; wkMap[w].total++; });
  const weeks=Object.entries(wkMap).sort((a,b)=>a[0].localeCompare(b[0])).slice(-8);
  const maxTotal=Math.max(...weeks.map(([,v])=>v.total),1);

  let html="";

  if(sessions.length===0&&autoSessions.length===0){
    return `<div class="card" style="text-align:center;padding:40px"><div style="font-size:40px">📊</div><div style="color:#6B7385;margin-top:12px">Enregistre ta première séance !</div></div>`;
  }

  if(matchSess.length){
    html+=`<div class="card"><div class="sec-title">Bilan matchs</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" style="color:${C.accent}">${V}</div><div class="stat-lbl">Victoires</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${C.red}">${D}</div><div class="stat-lbl">Défaites</div></div>
      <div class="stat-box"><div class="stat-val" style="color:${C.blue}">${avgTps}'</div><div class="stat-lbl">Tps moy.</div></div>
    </div></div>`;
  }

  if(weeks.length){
    html+=`<div class="card"><div class="sec-title">Volume hebdomadaire</div>`;
    weeks.forEach(([w,v])=>{
      const pct=v.total/maxTotal*100;
      html+=`<div class="bar-row">
        <span style="font-size:11px;color:#6B7385;width:50px">${fmt(w)}</span>
        <div class="bar-track" style="position:relative">
          <div style="display:flex;height:100%;border-radius:4px;overflow:hidden">
            <div style="width:${v.terrain/maxTotal*100}%;background:${C.accent}"></div>
            <div style="width:${v.muscu/maxTotal*100}%;background:${C.blue}"></div>
            <div style="width:${v.match/maxTotal*100}%;background:${C.red}"></div>
            <div style="width:${v.kine/maxTotal*100}%;background:${C.pink}"></div>
            <div style="width:${v.recup/maxTotal*100}%;background:${C.teal}"></div>
          </div>
        </div>
        <span style="font-size:12px;font-weight:700;color:#E8ECF0;width:16px;text-align:right">${v.total}</span>
      </div>`;
    });
    html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
      ${[{c:C.accent,l:"Terrain"},{c:C.blue,l:"Muscu"},{c:C.red,l:"Match"},{c:C.pink,l:"Kiné"},{c:C.teal,l:"Récup"}].map(x=>`<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#6B7385"><div style="width:8px;height:8px;border-radius:2px;background:${x.c}"></div>${x.l}</div>`).join("")}
    </div></div>`;
  }

  // Ressenti trend
  const resData=[...sessions].sort((a,b)=>a.date.localeCompare(b.date)).slice(-10);
  if(resData.length>2){
    html+=`<div class="card"><div class="sec-title">Ressenti récent</div>`;
    resData.forEach(s=>{
      const pct=s.ressenti/4*100;
      const color=s.ressenti<=1?C.red:s.ressenti<=2?C.orange:s.ressenti<=3?C.teal:C.accent;
      html+=`<div class="bar-row">
        <span style="font-size:11px;color:#6B7385;width:50px">${fmt(s.date)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        <span style="font-size:13px;width:20px;text-align:right">${RESSENTI[s.ressenti].split(" ")[0]}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  return html;
}

  if(type==="recup") return `<div class="field"><label>Type</label><input class="input" id="f_recuptype" placeholder="Étirements, bain froid..." value="${s.recupType||""}"/></div>`;

let _currentType="terrain", _currentRessenti=2;

function switchType(type){
  _currentType=type;
  document.getElementById("type_fields").innerHTML=renderTypeFields(type);
  const color=SESSION_TYPES[type].color;
  Object.entries(SESSION_TYPES).forEach(([k,v])=>{
    const b=document.getElementById("tb_"+k);
    b.style.borderColor=k===type?v.color:"#2A3040";
    b.style.background=k===type?v.color+"22":"#161A23";
    b.style.color=k===type?v.color:"#6B7385";
  });
  document.getElementById("btn_save").style.background=color;
  document.getElementById("btn_save").style.color=type==="kine"?"#fff":"#000";
  RESSENTI.forEach((_,i)=>{
    const b=document.getElementById("rb_"+i);
    b.style.borderColor=i===_currentRessenti?color:"#2A3040";
    b.style.background=i===_currentRessenti?color+"33":"#161A23";
    b.style.color=i===_currentRessenti?color:"#6B7385";
  });
}

function switchRessenti(i){
  _currentRessenti=i;
  const color=SESSION_TYPES[_currentType].color;
  RESSENTI.forEach((_,j)=>{
    const b=document.getElementById("rb_"+j);
    b.style.borderColor=j===i?color:"#2A3040";
    b.style.background=j===i?color+"33":"#161A23";
    b.style.color=j===i?color:"#6B7385";
  });
}

function submitSession(){
  const type=_currentType;
  const date=document.getElementById("f_date").value;
  if(!date) return;
  const base={
    id:editingItem?.id||Date.now(),
    type, date,
    duree:Number(document.getElementById("f_duree").value)||0,
    ressenti:_currentRessenti,
    notes:document.getElementById("f_notes").value,
  };
  let extra={};
  if(type==="terrain") extra={focus:document.getElementById("f_focus").value};
  else if(type==="muscu") extra={exercices:document.getElementById("f_exercices").value.split("\n").filter(Boolean),chargesMax:document.getElementById("f_charges").value};
  else if(type==="match") extra={adversaire:document.getElementById("f_adversaire").value,score:document.getElementById("f_score").value,resultat:document.getElementById("f_resultat").value,tpsJeu:Number(document.getElementById("f_tpsjeu").value)||0,poste:document.getElementById("f_poste").value};
  else if(type==="kine") extra={kineZone:document.getElementById("f_kinezone").value,kinePraticien:document.getElementById("f_kineprat").value};
  else if(type==="recup") extra={recupType:document.getElementById("f_recuptype").value};
  else if(type==="forme") extra={formeNote:document.getElementById("f_formenote").value};
  const session={...base,...extra};
  const existsInArray=sessions.some(s=>s.id==session.id);
  if(editingItem?.id||existsInArray) sessions=sessions.map(s=>s.id==session.id?session:s);
  else sessions=[...sessions,session];
  save("rp_sessions",sessions);
  closeModal(); render();
}

function editSession(id){
  const s=sessions.find(x=>x.id==id)||autoSessions.find(x=>x.id==id);
  if(s&&!s.auto){ _currentType=s.type; _currentRessenti=s.ressenti??2; openSessionForm(s); }
}

function deleteSession(id){
  if(confirm("Supprimer cette séance ?")){ sessions=sessions.filter(s=>s.id!=id); save("rp_sessions",sessions); render(); }

function deleteAnySession(id, kind){

        const s = {
          id: Date.now(),
          type: "muscu",
          date: result.data.date || todayStr,
          heure: result.data.heure || "",
          duree: prog.duree,
          ressenti: 2,
          notes: "Généré par l'assistant",
          exercices: prog.exercices,
          muscuProgKey: pk,
          auto: false,
        };
        sessions = [...sessions, s];
        save("rp_sessions", sessions);
        render();
      }
    }

    if(result.action === "modify_session" && result.data){
      const d = result.data;
      let modified = false;

      // Try sessions first
      const newSessions = sessions.map(s=>{
        if(s.date===d.date && s.type===d.type){
          modified = true;
          const prog = d.muscuProgKey ? ({...MUSCU_PROGRAMS,...MUSCU_PROGRAMS_ETE}[d.muscuProgKey]) : null;
          return {
            ...s,
            muscuProgKey: d.muscuProgKey || s.muscuProgKey,
            exercices: d.exercices || (prog ? prog.exercices : s.exercices),
            duree: prog ? prog.duree : s.duree,
            notes: d.notes || s.notes,
          };
        }
        return s;
      });

      // Try autoSessions if not found
      const newAuto = autoSessions.map(s=>{
        if(s.date===d.date && s.type===d.type){
          modified = true;
          const prog = d.muscuProgKey ? ({...MUSCU_PROGRAMS,...MUSCU_PROGRAMS_ETE}[d.muscuProgKey]) : null;
          return {
            ...s,
            muscuProgKey: d.muscuProgKey || s.muscuProgKey,
            exercices: d.exercices || (prog ? prog.exercices : s.exercices),
            duree: prog ? prog.duree : s.duree,
            notes: d.notes || s.notes,
            auto: false, // no longer auto since modified
          };
        }
        return s;
      });

      sessions = newSessions;
      autoSessions = newAuto;
      save("rp_sessions", sessions);
      save("rp_auto", autoSessions);
      render();
    }

    if(result.action === "delete_session" && result.data){
      const d = result.data;
      const before = sessions.length + autoSessions.length;
      sessions = sessions.filter(s=>!(s.date===d.date && s.type===d.type));
      autoSessions = autoSessions.filter(s=>!(s.date===d.date && s.type===d.type));
      save("rp_sessions", sessions);
      save("rp_auto", autoSessions);
      render();
    }

    if(result.action === "move_session" && result.data){
      const d = result.data;
      sessions = sessions.map(s=>{
        if(s.date===d.fromDate && s.type===d.type) return {...s, date:d.toDate};
        return s;
      });
      autoSessions = autoSessions.map(s=>{
        if(s.date===d.fromDate && s.type===d.type) return {...s, date:d.toDate};
        return s;
      });
      save("rp_sessions", sessions);
      save("rp_auto", autoSessions);
      render();
    }

    if(result.action === "add_match" && result.data){
      const m = {
        id: Date.now(),
        date: result.data.date,
        adversaire: result.data.adversaire || "Inconnu",
        heure: result.data.heure || "15:00",
        lieu: result.data.lieu || "D",
        competition: result.data.competition || "Championnat"
      };
      matches = [...matches, m];
      save("rp_matches", matches);
      render();
    }

  } catch(err) {
    loadingDiv.classList.remove("loading");
    loadingDiv.textContent = "Erreur de connexion. Réessaie !";
  }

  btn.disabled = false;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
