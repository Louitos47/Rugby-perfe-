// ── CALENDAR ──────────────────────────────────────────────────────────────────
function renderCalendar(){
  const [yr,mo] = calMonth.split('-').map(Number);
  const firstDay = new Date(yr,mo-1,1).getDay()||7;
  const daysInMonth = new Date(yr,mo,0).getDate();
  const allEvents = [...sessions,...autoSessions,...matches.map(m=>({...m,type:"match"}))];

  let html = `<div class="cal-header">
    <button class="cal-nav" onclick="calPrev()">‹</button>
    <div class="cal-title">${fmtMonth(calMonth)}</div>
    <button class="cal-nav" onclick="calNext()">›</button>
  </div>
  <div class="cal-grid">
    ${['L','M','M','J','V','S','D'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}`;

  for(let i=1;i<firstDay;i++) html+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calMonth}-${String(d).padStart(2,'0')}`;
    const dayEvents=allEvents.filter(e=>e.date===dateStr);
    const isToday=dateStr===today();
    const hasMatch=dayEvents.some(e=>e.type==="match");
    const hasKine=dayEvents.some(e=>e.type==="kine");
    let cls='cal-day';
    if(dayEvents.length) cls+=' has-events';
    if(isToday) cls+=' is-today';
    if(hasMatch) cls+=' has-match';
    if(hasKine) cls+=' has-kine';
    const dots=dayEvents.map(e=>{
      const t=SESSION_TYPES[e.type]||SESSION_TYPES.muscu;
      return `<div class="cal-dot" style="background:${t.color}"></div>`;
    }).join('');
    const clickAttr = dayEvents.length ? `onclick="openCalDayDetail('${dateStr}')"` : '';
    html+=`<div class="${cls}" ${clickAttr}><div class="cal-day-num" style="${isToday?'color:#8B1A1A;font-weight:700':''}">${d}</div><div class="cal-dots">${dots}</div></div>`;
  }
  html+=`</div>
  <div class="cal-legend">
    ${Object.entries(SESSION_TYPES).map(([,v])=>`<div class="cal-leg-item"><div class="cal-leg-dot" style="background:${v.color}"></div>${v.label}</div>`).join('')}
  </div>`;
  return html;
}

      <div style="font-size:12px;font-weight:800;color:#9A7A70;margin-bottom:10px">🎯 TESTS PHYSIQUES</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${testVals.map(([key, val]) => `<div style="background:#F5EEE8;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#9A7A70;margin-bottom:4px">${testLabels[key]||key}</div>
          <div style="font-size:16px;font-weight:800;color:#2E86AB">${val}${key.includes('sprint')||key==='bronco_temps'?'s':key==='detente'?'cm':'kg'}</div>
        </div>`).join('')}
      </div>
      <button onclick="setView('athlete')" style="width:100%;background:#F5EEE8;border:1px solid #E8D8D0;border-radius:8px;padding:8px;font-size:12px;font-weight:700;color:#8B1A1A;margin-top:10px">🎯 Voir mes tests & ajouter un nouveau</button>
    </div>`;
  } else {
    html += `<div class="card" style="margin-top:10px;text-align:center;padding:20px">
      <div style="font-size:28px">🎯</div>
      <div style="font-size:13px;font-weight:700;margin-top:8px">Tests physiques</div>
      <div style="font-size:12px;color:#9A7A70;margin-top:4px">Bronco, Squat, Développé couché, Soulevé de terre</div>
      <button onclick="setView('athlete')" style="margin-top:12px;background:#8B1A1A;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700">Renseigner un test</button>
    </div>`;
  }

  // ── JEU AU PIED ──
  if(totalButs > 0 || totalBK > 0 || piedSessions.length > 0){
    const butPct = totalButs ? Math.round(totalButsR/totalButs*100) : 0;
    const totalSorties = piedSessions.reduce((a,s)=>a+(s.pied_stats?.sorties_total||0),0);
    const totalSortiesDirect = piedSessions.reduce((a,s)=>a+(s.pied_stats?.sorties_direct||0),0);
    const echecsD = piedSessions.reduce((a,s)=>a+(s.pied_stats?.echecs_droite||0),0);
    const echecsG = piedSessions.reduce((a,s)=>a+(s.pied_stats?.echecs_gauche||0),0);
    const echecsC = piedSessions.reduce((a,s)=>a+(s.pied_stats?.echecs_court||0),0);
    const totalEchecs = echecsD + echecsG + echecsC;

    html += `<div class="card" style="margin-top:10px">
      <div style="font-size:12px;font-weight:800;color:#9A7A70;margin-bottom:10px">🦵 JEU AU PIED</div>

      <!-- 4 chiffres clés -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        ${totalButs ? `<div style="background:#27AE6010;border:1px solid #27AE6033;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:#27AE60">${butPct}%</div>
          <div style="font-size:10px;color:#9A7A70">Buts (${totalButsR}/${totalButs})</div>
        </div>` : ''}
        ${totalBK ? `<div style="background:#2E86AB10;border:1px solid #2E86AB33;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:#2E86AB">${avgDistBK}m</div>
          <div style="font-size:10px;color:#9A7A70">Box kick moy. (${totalBK})</div>
        </div>` : ''}
        ${totalSorties ? `<div style="background:#D4841A10;border:1px solid #D4841A33;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:#D4841A">${totalSorties}</div>
          <div style="font-size:10px;color:#9A7A70">Sorties (${totalSortiesDirect} directes)</div>
        </div>` : ''}
        <div style="background:#8B1A1A10;border:1px solid #8B1A1A33;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:22px;font-weight:900;color:#8B1A1A">${piedSessions.length}</div>
          <div style="font-size:10px;color:#9A7A70">Séances</div>
        </div>
      </div>

      <!-- Répartition entraînement / match -->
      ${(() => {
        const entS = piedSessions.filter(s => (s.pied_stats?.contexte||'entrainement') === 'entrainement');
        const matS = piedSessions.filter(s => s.pied_stats?.contexte === 'match');
        if(!matS.length) return '';
        const agg = list => {
          const t = list.reduce((a,s)=>a+(s.pied_stats?.buts_total||0),0);
          const r = list.reduce((a,s)=>a+(s.pied_stats?.buts_reussis||0),0);
          return {t, r, pct: t?Math.round(r/t*100):null};
        };
        const e = agg(entS), m = agg(matS);
        const cell = (icon, label, color, d) => `<div style="background:${color}10;border:1px solid ${color}33;border-radius:10px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#9A7A70;margin-bottom:2px">${icon} ${label}</div>
          <div style="font-size:18px;font-weight:900;color:${color}">${d.t?d.r+'/'+d.t:'—'}</div>
          ${d.pct!==null?`<div style="font-size:10px;font-weight:700;color:${color}">${d.pct}% réussite</div>`:''}
        </div>`;
        return `<div style="margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:#9A7A70;margin-bottom:8px">BUTS : ENTRAÎNEMENT VS MATCH</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            ${cell('🏋️','Entraînement','#2E86AB',e)}
            ${cell('⚔️','Match','#C0392B',m)}
          </div>
        </div>`;
      })()}

      <!-- Analyse échecs -->
      ${totalEchecs > 0 ? `<div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:#9A7A70;margin-bottom:8px">ANALYSE DES ÉCHECS</div>
        ${[
          {label:'→ Droite', val:echecsD, color:'#C0392B'},
          {label:'← Gauche', val:echecsG, color:'#E67E22'},
          {label:'↓ Court', val:echecsC, color:'#9A7A70'},
        ].filter(e=>e.val>0).map(e => `<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px">
            <span>${e.label}</span><span style="font-weight:800;color:${e.color}">${e.val}</span>
          </div>
          <div style="background:#E8D8D0;border-radius:6px;height:5px">
            <div style="background:${e.color};border-radius:6px;height:5px;width:${Math.round(e.val/totalEchecs*100)}%"></div>
          </div>
        </div>`).join('')}
      </div>` : ''}

      <!-- Dernières séances -->
      ${piedSessions.length > 0 ? `<div>
        <div style="font-size:11px;font-weight:700;color:#9A7A70;margin-bottom:8px">DERNIÈRES SÉANCES</div>
        ${piedSessions.slice(-3).reverse().map(s => {
          const ps = s.pied_stats;
          const pct = ps.buts_total ? Math.round(ps.buts_reussis/ps.buts_total*100) : null;
          const color = pct >= 80 ? '#27AE60' : pct >= 50 ? '#E67E22' : '#C0392B';
          return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F5EEE8">
            <span>${ps.contexte==='match'?'⚔️':'🦵'}</span>
            <div style="flex:1">
              <div style="font-size:12px;font-weight:700">${fmt(s.date)}${ps.contexte==='match'?' <span style="font-size:9px;background:#C0392B18;color:#C0392B;border-radius:10px;padding:1px 6px;font-weight:700">MATCH</span>':''}</div>
              <div style="font-size:10px;color:#9A7A70">${ps.buts_total?ps.buts_total+' buts':''}${ps.boxkicks_total?' · '+ps.boxkicks_total+' box kicks':''}${ps.commentaire?' · '+ps.commentaire.substring(0,20)+'...':''}</div>
            </div>
            ${pct !== null ? `<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:${color}18;color:${color}">${ps.buts_reussis}/${ps.buts_total}</span>` : ''}
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  }

  return html;
}

function renderStats(){
  // ── Données de base ──
  const totalMin = sessions.reduce((a,s) => a+(s.duree||0), 0);
  const totalH = totalMin >= 60 ? Math.floor(totalMin/60)+'h'+(totalMin%60?totalMin%60+'min':'') : totalMin+'min';
  const matchSess = sessions.filter(s => s.type==='match');
  const wins = matchSess.filter(m => m.resultat==='V').length;
  const losses = matchSess.filter(m => m.resultat==='D').length;
  const sessWithRessenti = sessions.filter(s => s.ressenti != null);
  const avgRessenti = sessWithRessenti.length
    ? (sessWithRessenti.reduce((a,s) => a+s.ressenti, 0)/sessWithRessenti.length).toFixed(1)
    : null;
  const resEmoji = avgRessenti ? RESSENTI[Math.round(avgRessenti)]?.split(' ')[0] : '—';

  // ── Records de charges ──
  const recordsMap = {};
  sessions.filter(s=>s.type==='muscu').forEach(s=>{
    (s.muscuSets||[]).forEach(ms=>{
      const maxKg = Math.max(...(ms.sets||[]).map(set=>parseFloat(set.kg)||0));
      if(maxKg > 0){
        if(!recordsMap[ms.exLabel] || maxKg > recordsMap[ms.exLabel].kg){
          recordsMap[ms.exLabel] = {kg: maxKg, date: s.date, count: (recordsMap[ms.exLabel]?.count||0)+1};
        }
      }
    });
  });
  const records = Object.entries(recordsMap).sort((a,b) => b[1].kg - a[1].kg).slice(0, 5);

  // ── Forme 7 derniers jours ──
  const last7 = formeLog.filter(f => f.date >= addDays(today(), -7));
  const avg = (key) => last7.filter(f=>f[key]).length
    ? (last7.reduce((a,f)=>a+(f[key]||0),0)/last7.filter(f=>f[key]).length).toFixed(1)
    : null;
  const avgSommeil = avg('sommeil');
  const avgEnergie = avg('energie');
  const avgCourbatures = avg('courbatures');

  // ── Stats jeu au pied ──
  const piedSessions = sessions.filter(s => s.pied_stats && s.pied_stats.buts_total > 0);
  const totalButs = piedSessions.reduce((a,s) => a+(s.pied_stats.buts_total||0), 0);
  const totalButsR = piedSessions.reduce((a,s) => a+(s.pied_stats.buts_reussis||0), 0);
  const totalBK = piedSessions.reduce((a,s) => a+(s.pied_stats.boxkicks_total||0), 0);
  const avgDistBK = piedSessions.length && totalBK
    ? Math.round(piedSessions.reduce((a,s)=>a+(s.pied_stats.boxkicks_dist_moy||0)*((s.pied_stats.boxkicks_total||0)),0)/totalBK)
    : 0;
  const hasPied = totalButs > 0 || totalBK > 0;

  let html = '';

  // ── BLOC 1 : Chiffres clés ──
  html += `<div class="card">
    <div class="sec-title" style="margin-bottom:12px">📊 En un coup d'œil</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div style="background:#F5EEE8;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:900;color:#8B1A1A">${sessions.length}</div>
        <div style="font-size:11px;color:#9A7A70;margin-top:2px">Séances total</div>
      </div>
      <div style="background:#F5EEE8;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:900;color:#D4841A">${totalH}</div>
        <div style="font-size:11px;color:#9A7A70;margin-top:2px">Volume total</div>
      </div>
      <div style="background:#F5EEE8;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:22px;font-weight:900;color:#1A8C6E">${matchSess.length ? wins+'V / '+losses+'D' : '—'}</div>
        <div style="font-size:11px;color:#9A7A70;margin-top:2px">Bilan matchs</div>
      </div>
      <div style="background:#F5EEE8;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:28px;font-weight:900;color:#7B2D8B">${avgRessenti ? resEmoji : '—'}</div>
        <div style="font-size:11px;color:#9A7A70;margin-top:2px">Ressenti moy. ${avgRessenti ? avgRessenti+'/4' : ''}</div>
      </div>
    </div>
  </div>`;

  // ── BLOC 2 : Forme 7 jours ──
  html += `<div class="card" style="margin-top:12px">
    <div class="sec-title" style="margin-bottom:12px">❤️ Forme — 7 derniers jours</div>
    ${last7.length === 0
      ? '<div style="text-align:center;color:#9A7A70;font-size:13px;padding:10px">Remplis ton bilan quotidien pour voir tes stats ici</div>'
      : `<div style="display:flex;flex-direction:column;gap:10px">
        ${[
          {key:'sommeil', label:'Sommeil', emoji:'😴', val:avgSommeil, color:'#7B2D8B', max:5},
          {key:'energie', label:'Énergie', emoji:'⚡', val:avgEnergie, color:'#D4841A', max:5},
          {key:'courbatures', label:'Douleurs', emoji:'💪', val:avgCourbatures, color:'#C0392B', max:5},
        ].map(row => row.val ? `<div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <div style="font-size:13px;font-weight:700">${row.emoji} ${row.label}</div>
            <div style="font-size:13px;font-weight:800;color:${row.color}">${row.val}/5</div>
          </div>
          <div style="background:#E8D8D0;border-radius:6px;height:6px">
            <div style="background:${row.color};border-radius:6px;height:6px;width:${Math.round(parseFloat(row.val)/row.max*100)}%"></div>
          </div>
        </div>` : '').join('')}
      </div>`
    }
  </div>`;

  // ── BLOC 3 : Records de charges ──
  if(records.length){
    html += `<div class="card" style="margin-top:12px">
      <div class="sec-title" style="margin-bottom:12px">🏆 Records de charges</div>
      ${records.map(([label, r], i) => {
        const medals = ['🥇','🥈','🥉','💪','💪'];
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F5EEE8">
          <span style="font-size:18px">${medals[i]||'💪'}</span>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700">${label}</div>
            <div style="font-size:11px;color:#9A7A70">${fmt(r.date)}</div>
          </div>
          <div style="font-size:18px;font-weight:900;color:#8B1A1A">${r.kg}<span style="font-size:12px">kg</span></div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // ── BLOC 4 : Jeu au pied (conditionnel) ──
  if(hasPied){
    const butPct = totalButs ? Math.round(totalButsR/totalButs*100) : 0;
    // Répartition entraînement / match
    const entS = piedSessions.filter(s => (s.pied_stats?.contexte||'entrainement') === 'entrainement');
    const matS = piedSessions.filter(s => s.pied_stats?.contexte === 'match');
    const aggPied = list => {
      const t = list.reduce((a,s)=>a+(s.pied_stats?.buts_total||0),0);
      const r = list.reduce((a,s)=>a+(s.pied_stats?.buts_reussis||0),0);
      return {t, r, pct: t?Math.round(r/t*100):null};
    };
    const eStats = aggPied(entS), mStats = aggPied(matS);
    const splitCell = (icon, label, color, d) => `<div style="background:${color}10;border:1px solid ${color}33;border-radius:12px;padding:12px;text-align:center">
      <div style="font-size:10px;color:#9A7A70;margin-bottom:2px">${icon} ${label}</div>
      <div style="font-size:22px;font-weight:900;color:${color}">${d.pct!==null?d.pct+'%':'—'}</div>
      <div style="font-size:10px;color:#9A7A70;margin-top:2px">${d.t?d.r+'/'+d.t+' buts':'aucun but'}</div>
    </div>`;
    html += `<div class="card" style="margin-top:12px">
      <div class="sec-title" style="margin-bottom:12px">🦵 Jeu au pied</div>
      <div style="display:grid;grid-template-columns:1fr 1fr${totalBK?'':''};gap:10px">
        ${totalButs ? `<div style="background:#27AE6010;border:1px solid #27AE6033;border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:26px;font-weight:900;color:#27AE60">${butPct}%</div>
          <div style="font-size:11px;color:#9A7A70;margin-top:2px">Buts (${totalButsR}/${totalButs})</div>
        </div>` : ''}
        ${totalBK ? `<div style="background:#2E86AB10;border:1px solid #2E86AB33;border-radius:12px;padding:14px;text-align:center">
          <div style="font-size:26px;font-weight:900;color:#2E86AB">${avgDistBK}m</div>
          <div style="font-size:11px;color:#9A7A70;margin-top:2px">Box kick moy. (${totalBK})</div>
        </div>` : ''}
      </div>
      ${matS.length ? `<div style="margin-top:10px">
        <div style="font-size:11px;font-weight:700;color:#9A7A70;margin-bottom:8px">ENTRAÎNEMENT VS MATCH</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${splitCell('🏋️','Entraînement','#2E86AB',eStats)}
          ${splitCell('⚔️','Match','#C0392B',mStats)}
        </div>
      </div>` : ''}
    </div>`;
  }

  return html;
}


function setTerrainSub(sub){
  _terrainSub = sub;
  if(sub === 'pied'){
    closeModal();
    if(_sessionMode === 'demarrer'){
      // Mode séance directe — ouvrir directement le module sans formulaire
      submitPiedSession();
    } else if(_sessionMode === 'planifier'){
      // Mode planification — formulaire minimal date/durée
      renderPiedSessionForm(editingItem || {});
    } else {
      // Mode normal depuis le formulaire
      submitPiedSession();
    }
    return;
  }
  saveFormFieldsAndRender();
}

function openPlanifierSession(){
  _sessionMode = 'planifier';
  _currentType = 'muscu';
  editingItem = null;
  sessionSets = {};
  sessionBlocs = [];
  renderSessionForm();
}

function openDemarrerSession(){
  _sessionMode = 'demarrer';
  renderDemarrerModal();
}

function renderDemarrerModal(){
  const planned = sessions.filter(s => s.ressenti === null || s.ressenti === undefined)
    .sort((a,b) => a.date.localeCompare(b.date));

  let html = "<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px\">" +
    "<div style=\"font-size:15px;font-weight:800\">▶ Démarrer une séance</div>" +
    "<span onclick=\"closeModal()\" style=\"font-size:22px;color:#9A7A70;cursor:pointer\">×</span></div>";

  if(planned.length){
    html += "<div style=\"font-size:12px;font-weight:700;color:#9A7A70;margin-bottom:8px\">SÉANCES PLANIFIÉES</div>";
    planned.forEach(s => {
      const t = SESSION_TYPES[s.type] || SESSION_TYPES.muscu;
      html += "<div onclick=\"demarrerSeancePlanifiee(" + s.id + ")\" style=\"background:#F5EEE8;border:1px solid #E8D8D0;border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px\">" +
        "<span style=\"font-size:20px\">" + t.icon + "</span>" +
        "<div><div style=\"font-size:13px;font-weight:700\">" + t.label + "</div>" +
        "<div style=\"font-size:11px;color:#9A7A70\">" + fmt(s.date) + (s.heure ? " · " + s.heure : "") + "</div></div>" +
        "<span style=\"margin-left:auto;font-size:11px;background:#2E86AB18;color:#2E86AB;padding:3px 8px;border-radius:20px;font-weight:700\">📋 Planifiée</span>" +
        "</div>";
    });
    html += "<div style=\"text-align:center;font-size:12px;color:#9A7A70;margin:12px 0 8px\">— ou —</div>";
  }

  html += "<button onclick=\"closeModal();_sessionMode=\'demarrer\';openSessionForm(null)\" style=\"width:100%;background:#8B1A1A;color:#fff;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:14px\">+ NOUVELLE SÉANCE</button>";

  openModal(html);
}

function openSessionForm(initial=null){
  editingItem=initial;
  _currentType=initial?.type||'terrain';
  _currentRessenti=initial?.ressenti??2;
  _currentDifficulte=initial?.difficulte??2;
  _currentSource=initial?.source||'perso';
  _currentMental=initial?.mental??2;
  _currentConfiance=initial?.confiance??3;
  sessionSets = {};
  sessionBlocs = [];
  sessionExTempo = {};
  if(initial?.type==='muscu'){
    const savedBlocs = initial?.blocs || initial?.data?.blocs;
    if(savedBlocs?.length) sessionBlocs = JSON.parse(JSON.stringify(savedBlocs));
    // Cas 1 : séance avec muscuSets (données de charges)
    if(initial?.muscuSets && initial.muscuSets.length){
      initial.muscuSets.forEach(ms => {
        const ex = getAllExercises().find(e=>e.id===ms.exId);
        const label = ex ? ex.label : ms.exLabel || ms.exId;
        const validSets = (ms.sets||[]).filter(s=>s.kg!==''||s.reps!=='');
        sessionSets[label] = validSets.length ? validSets : [{kg:'',reps:''}];
        if(ms.tempo) sessionExTempo[label] = ms.tempo;
      });
    }
    // Cas 2 : séance avec juste des exercices en texte (ancien format)
    if(Object.keys(sessionSets).length === 0){
      const exList = Array.isArray(initial?.exercices)
        ? initial.exercices
        : (initial?.exercices ? initial.exercices.split('\n').filter(Boolean) : []);
      exList.forEach(ex => {
        // Chercher dans chargesLog si on a des données
        const exObj = getAllExercises().find(e=>e.label===ex.split(' — ')[0].trim());
        const logs = exObj ? chargesLog.filter(l=>l.ex_id===exObj.id).slice(-1) : [];
        sessionSets[ex] = logs.length && logs[0].sets?.length
          ? logs[0].sets.map(s=>({kg:s.kg,reps:s.reps,isPdc:s.isPdc,isTimed:s.isTimed}))
          : [{kg:'',reps:''}];
      });
    }
  }
  renderSessionForm();

function loadPosteSeance(seanceKey){
  const group = getPosteGroup(userPoste());
  if(!group) return;
  const seance = group.seances[seanceKey];
  if(!seance) return;
  // Réinitialiser sessionSets avec les exercices du programme
  sessionSets = {};
  seance.exercices.forEach(ex => {
    // Extraire le nom sans les détails (ex: "Squat barre — 4×5 lourd" → "Squat barre")
    const label = ex.split(' — ')[0].trim();
    const found = getAllExercises().find(e => e.label.toLowerCase() === label.toLowerCase());
    const key = found ? found.label : label;
    sessionSets[key] = [{kg:'',reps:''},{kg:'',reps:''},{kg:'',reps:''},{kg:'',reps:''}];
  });
  renderSessionForm();
}

function addExFromLibrary(nom){

function openCreateExerciseFromPicker(ctx){
  const accent = ctx==='prepa' ? '#D4841A' : '#8B1A1A';
  const back = ctx==='prepa' ? 'renderPrepaExerciseModal()' : 'renderExerciseLibraryModal()';
  const html = `<div class="modal-title">➕ NOUVEL EXERCICE</div>
  <div class="field"><label>Nom</label><input class="input" id="cex-label" placeholder="Ex: Tirage nuque poulie" value="${(_libFilter.search||'').replace(/"/g,'&quot;')}"/></div>
  <div class="field"><label>Groupe musculaire</label>

      ${GROUPES.map(g=>`<option value="${g}">${groupeLabel(g)}</option>`).join('')}

  ${ctx==='prepa'&&getPrepaTeam()?`<div style="font-size:11px;color:#9A7A70;margin-bottom:10px">L'exercice sera ajouté aux exercices de l'équipe « ${getPrepaTeam().name} ».</div>`:''}
  <div style="display:flex;gap:8px;margin-top:8px">

async function saveExerciseFromPicker(ctx){
  const label = document.getElementById('cex-label')?.value.trim();
  const groupe = document.getElementById('cex-groupe')?.value;
  const icon = document.getElementById('cex-icon')?.value.trim() || '💪';
  if(!label){ showToast('Entre un nom !', 'error'); return; }
  const exists = getAllExercises().some(e => e.label.toLowerCase() === label.toLowerCase());
  if(exists){ showToast('Cet exercice existe déjà !', 'error'); return; }
  const team = ctx==='prepa' ? getPrepaTeam() : null;
  const ex = team
    ? {label, cat: groupe, icon, user_id: currentUser.id, team_id: team.id}
    : {id: 'c_'+Date.now(), label, cat: groupe, icon, user_id: currentUser.id};
  const {data, error} = await sb.from('custom_exercises').insert(ex).select().single();
  if(error){ showToast('Erreur : '+error.message, 'error'); return; }
  customExercises = [...customExercises, data||ex];
  showToast('Exercice créé et ajouté à la séance', 'success');
  if(ctx==='prepa') addPrepaExerciceFromLib(label);
  else addExFromLibrary(label);
}

const PERF_LABELS = ['','😤 Mauvais','😐 Moyen','🙂 Correct','💪 Bon','🔥 Excellent'];
const PERF_COLORS = ['','#C0392B','#D4841A','#2E86AB','#1A8C6E','#7B2D8B'];

function openPlayerMatchNote(teamEventId, adversaire){
  const existing = playerMatchNotes[teamEventId] || {};
  const currentNote = existing.note || 0;

  const noteButtons = [1,2,3,4,5].map(i =>
    "<button onclick=\"selectMatchNote(" + teamEventId + "," + i + ")\" style=\"flex:1;padding:10px 4px;border-radius:10px;border:2px solid " + (currentNote===i?PERF_COLORS[i]:'#E8D8D0') + ";background:" + (currentNote===i?PERF_COLORS[i]+'18':'#F5EEE8') + ";font-size:18px;cursor:pointer\">" + PERF_LABELS[i].split(' ')[0] + "</button>"
  ).join('');

  const html = "<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px\">" +
    "<div style=\"font-size:15px;font-weight:800\">🏉 Ma performance — vs " + adversaire + "</div>" +
    "<span onclick=\"closePiedModal(" + sid + ")\" style=\"font-size:22px;color:#9A7A70;cursor:pointer\">×</span></div>" +
    "<div style=\"background:#2E86AB08;border:1px solid #2E86AB22;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:11px;color:#2E86AB\">👁️ Ton manager pourra lire cette évaluation.</div>" +
    "<div style=\"font-size:12px;font-weight:700;color:#9A7A70;margin-bottom:8px\">MA NOTE DE PERFORMANCE</div>" +
    "<div style=\"display:flex;gap:6px;margin-bottom:6px\">" + noteButtons + "</div>" +
    "<div style=\"font-size:11px;color:#9A7A70;text-align:center;margin-bottom:14px\">" + (currentNote ? PERF_LABELS[currentNote] : 'Sélectionne ta note') + "</div>" +
    "<div class=\"field\"><label>Mes observations sur ma performance</label>" +
    "<textarea class=\"input\" id=\"pmn-texte\" rows=\"5\" placeholder=\"Comment tu as vécu ce match ? Tes points forts, tes difficultés, ce que tu veux retenir...\">" + (existing.texte||'') + "</textarea></div>" +
    "<button onclick=\"savePlayerMatchNote(" + teamEventId + ")\" style=\"width:100%;background:#8B1A1A;color:#fff;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:14px\">💾 SAUVEGARDER</button>";

  openModal(html);
}

let _selectedMatchNote = 0;
function selectMatchNote(teamEventId, note){
  _selectedMatchNote = note;
  openPlayerMatchNote(teamEventId, '');
  // Mettre à jour juste les boutons sans fermer
  setTimeout(()=>{
    const existing = playerMatchNotes[teamEventId] || {};
    existing.note = note;
    playerMatchNotes[teamEventId] = existing;
  }, 0);
}

async function savePlayerMatchNote(teamEventId){
  const texte = document.getElementById('pmn-texte')?.value || '';
  const existing = playerMatchNotes[teamEventId];
  const note = existing?.note || _selectedMatchNote || 0;
  if(!note){ showToast('Sélectionne une note de performance', 'error'); return; }

  const teamId = teamEvents.find(e => e.id === teamEventId)?.team_id || myTeams[0]?.id;
  const row = {user_id: currentUser.id, team_event_id: teamEventId, team_id: teamId, note, texte};

  let error;
  if(existing?.id){
    const res = await sb.from('player_match_notes').update({note, texte}).eq('id', existing.id);
    error = res.error;
  } else {
    const res = await sb.from('player_match_notes').insert(row);
    error = res.error;
  }
  if(error){ showToast('Erreur : '+error.message, 'error'); return; }
  playerMatchNotes[teamEventId] = {...row, id: existing?.id || Date.now()};
  closeModal();
  showToast('Note sauvegardée ✓', 'success');
  render();
}

    "</select></div>" +

    "<button onclick=\"saveInjuryLog(" + (editId||'null') + ")\" style=\"width:100%;background:#C0392B;color:#fff;border:none;border-radius:10px;padding:13px;font-weight:800;font-size:14px\">💾 SAUVEGARDER</button>";

async function saveInjuryLog(editId){
  const date_debut = document.getElementById('inj-date')?.value;
  const zone = document.getElementById('inj-zone')?.value;
  const cote = document.getElementById('inj-cote')?.value || '';
  const intensite = parseInt(document.getElementById('inj-intensite')?.value) || null;
  const description = document.getElementById('inj-desc')?.value || '';

  if(!date_debut || !zone){ showToast('Date et zone obligatoires', 'error'); return; }

  const row = {user_id: currentUser.id, date_debut, zone, cote, intensite, description, est_resolu: false};
  let error;
  if(editId && editId !== 'null'){
    const res = await sb.from('player_injury_log').update(row).eq('id', editId);
    error = res.error;
    if(!error) playerInjuryLog = playerInjuryLog.map(i => i.id===editId ? {...i,...row} : i);
  } else {
    const res = await sb.from('player_injury_log').insert(row).select().single();
    error = res.error;
    if(!error && res.data) playerInjuryLog = [res.data, ...playerInjuryLog];
  }
  if(error){ showToast('Erreur : '+error.message, 'error'); return; }
  closeModal();
  showToast('Entrée sauvegardée ✓', 'success');
  render();
}

async function resolveInjury(id){
  await sb.from('player_injury_log').update({est_resolu: true, date_fin: today()}).eq('id', id);
  playerInjuryLog = playerInjuryLog.map(i => i.id===id ? {...i, est_resolu:true, date_fin:today()} : i);
  render();
}

function renderInjuryLog(){
  const active = playerInjuryLog.filter(i => !i.est_resolu);
  const resolved = playerInjuryLog.filter(i => i.est_resolu);

  let html = "<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:12px\">" +
    "<div style=\"font-size:15px;font-weight:800\">🩹 Journal de blessures</div>" +
    "<button onclick=\"openInjuryForm()\" style=\"background:#C0392B;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700\">+ Ajouter</button>" +
    "</div>";

  if(!playerInjuryLog.length){
    html += "<div style=\"text-align:center;padding:30px;color:#9A7A70\"><div style=\"font-size:32px\">✅</div><div style=\"margin-top:8px;font-size:13px\">Aucune blessure enregistrée</div></div>";
    return html;
  }

  if(active.length){
    html += "<div style=\"font-size:11px;font-weight:800;color:#C0392B;margin-bottom:8px\">EN COURS</div>";
    active.forEach(inj => {
      html += "<div style=\"background:#C0392B08;border:1px solid #C0392B33;border-radius:12px;padding:14px;margin-bottom:8px\">" +
        "<div style=\"display:flex;justify-content:space-between;align-items:start\">" +
        "<div><div style=\"font-size:13px;font-weight:800\">" + inj.zone + (inj.cote?' · '+inj.cote:'') + "</div>" +
        "<div style=\"font-size:11px;color:#9A7A70;margin-top:2px\">Depuis le " + fmt(inj.date_debut) + " · " + (INTENSITE_LABELS[inj.intensite]||'') + "</div>" +
        (inj.description?"<div style=\"font-size:12px;color:#1A0A0A;margin-top:6px;font-style:italic\">" + inj.description + "</div>":"") +
        "</div>" +
        "<div style=\"display:flex;gap:6px\">" +
        "<button onclick=\"openInjuryForm(" + inj.id + ")\" style=\"background:#F5EEE8;border:1px solid #E8D8D0;border-radius:6px;padding:5px 8px;font-size:11px\">✏️</button>" +
        "<button onclick=\"resolveInjury(" + inj.id + ")\" style=\"background:#1A8C6E18;border:1px solid #1A8C6E33;border-radius:6px;padding:5px 8px;font-size:11px;color:#1A8C6E;font-weight:700\">✓ Résolu</button>" +
        "</div></div></div>";
    });
  }

  if(resolved.length){
    html += "<div style=\"font-size:11px;font-weight:800;color:#1A8C6E;margin-top:12px;margin-bottom:8px\">RÉSOLUES</div>";
    resolved.slice(0,5).forEach(inj => {
      html += "<div style=\"background:#F5EEE8;border-radius:10px;padding:10px 12px;margin-bottom:6px;opacity:0.7\">" +
        "<div style=\"font-size:12px;font-weight:700\">✅ " + inj.zone + (inj.cote?' · '+inj.cote:'') + "</div>" +
        "<div style=\"font-size:10px;color:#9A7A70\">" + fmt(inj.date_debut) + (inj.date_fin?' → '+fmt(inj.date_fin):'') + "</div>" +
        "</div>";
    });
  }

  return html;
}

function renderBlocButtons(exLabel){
  if(!sessionBlocs.length) return '';
  return sessionBlocs.map((b, bi) => {
    const key = exLabel.replace(/"/g, "&quot;");
    return "<button onclick=\"moveToBloc('" + key + "'," + bi + ")\" style=\"background:#8B1A1A18;border:1px solid #8B1A1A33;border-radius:6px;padding:3px 7px;color:#8B1A1A;font-size:10px;font-weight:700;cursor:pointer\">→ " + b.name + "</button>";
  }).join('');
}

function addBloc(){
  sessionBlocs.push({name: 'Bloc ' + (sessionBlocs.length + 1), exercises: []});
  renderSessionForm();
}

function removeBloc(blocIdx){
  // Remettre les exercices du bloc dans la liste principale
  sessionBlocs.splice(blocIdx, 1);
  // Renuméroter les blocs
  sessionBlocs.forEach((b, i) => { if(b.name.startsWith('Bloc ')) b.name = 'Bloc ' + (i+1); });
  renderSessionForm();
}

function moveToBloc(exLabel, blocIdx){
  if(!sessionBlocs[blocIdx]) return;
  // Retirer de tout autre bloc
  sessionBlocs.forEach(b => { b.exercises = b.exercises.filter(e => e !== exLabel); });
  sessionBlocs[blocIdx].exercises.push(exLabel);
  renderSessionForm();
}

function removeFromBloc(exLabel, blocIdx){
  if(!sessionBlocs[blocIdx]) return;
  sessionBlocs[blocIdx].exercises = sessionBlocs[blocIdx].exercises.filter(e => e !== exLabel);
  renderSessionForm();
}

function renderMuscuForm(bycat, selected){
  let html = `<div class="field">
    <label>Ajouter un exercice</label>
    <div style="margin-bottom:12px">
      <button onclick="openExerciseLibraryModal()" style="width:100%;background:#F5EEE8;border:1px solid #E8D8D0;border-radius:10px;padding:12px;font-weight:700;font-size:13px;color:#8B1A1A;text-align:left;display:flex;align-items:center;gap:8px"><span style="font-size:16px">🔍</span> Chercher un exercice...</button>
    </div>`;
  if(selected.length === 0){
    html += `<div style="text-align:center;padding:20px;color:#9A7A70;font-size:13px">Aucun exercice ajouté</div>`;
  } else {
    selected.forEach(exLabel => {
      const sets = sessionSets[exLabel] || [{kg:'',reps:''}];
      const key = exJsKey(exLabel);
      html += `<div style="background:#F5EEE8;border:1px solid #E8D8D0;border-radius:10px;padding:12px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:4px">
          <div style="font-weight:700;font-size:13px;color:#1A0A0A">💪 ${exLabel}</div>
          <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
            ${renderBlocButtons(exLabel)}
            <button onclick="removeExFromSession('${key}')" style="color:#C0392B;font-size:18px;background:none;border:none;cursor:pointer">×</button>
          </div>
        </div>
        ${renderExOptionsBar(exLabel)}
        ${renderMuscuSetHeader(exLabel)}
        ${sets.map((set,i) => renderMuscuSetRow(exLabel, set, i)).join('')}
        <button onclick="addSet('${key}')" style="width:100%;background:none;border:1px dashed #E8D8D0;border-radius:8px;padding:7px;color:#8B1A1A;font-size:12px;font-weight:700;margin-top:4px">+ Série</button>
      </div>`;
    });
  }
  // Affichage des blocs avec leurs exercices
  if(sessionBlocs.length > 0){
    sessionBlocs.forEach((bloc, blocIdx) => {
      html += `<div style="background:#8B1A1A08;border:2px solid #8B1A1A33;border-radius:14px;padding:14px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-size:13px;font-weight:800;color:#8B1A1A">📦 ${bloc.name}</div>
          <button onclick="removeBloc(${blocIdx})" style="background:none;border:none;color:#C0392B;font-size:12px;cursor:pointer">Supprimer</button>
        </div>`;
      if(bloc.exercises.length === 0){
        html += `<div style="font-size:11px;color:#9A7A70;text-align:center;padding:8px">Glisse des exercices ici avec le bouton → Bloc</div>`;
      } else {
        bloc.exercises.forEach(exLabel => {
          const sets = sessionSets[exLabel] || [{kg:'',reps:''}];
          html += renderExerciceBlock(exLabel, sets, blocIdx);
        });
      }
      html += `</div>`;
    });
  }

  // Bouton ajouter un bloc
  html += `<button onclick="addBloc()" style="width:100%;background:none;border:2px dashed #8B1A1A44;border-radius:10px;padding:9px;color:#8B1A1A;font-size:12px;font-weight:700;margin-top:4px;margin-bottom:8px">📦 + Ajouter un bloc</button>`;

  html += `<input type="hidden" id="f_exercices_data" value="${selected.join('|')}"/>`;
  html += `</div>`;
  return html;
}

function renderExerciceBlock(exLabel, sets, blocIdx){
  // Même rendu qu'un exercice normal mais avec bouton "retirer du bloc"
  const ex = getAllExercises().find(e => e.label === exLabel);
  const icon = ex?.icon || '💪';
  const key = exJsKey(exLabel);
  let html = `<div style="background:#FFFFFF;border:1px solid #E8D8D0;border-radius:10px;padding:12px;margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-weight:700;font-size:13px">${icon} ${exLabel}</div>
      <button onclick="removeFromBloc('${key}',${blocIdx})" style="color:#C0392B;font-size:11px;background:none;border:none;cursor:pointer">× Retirer du bloc</button>
    </div>
    ${renderExOptionsBar(exLabel)}
    ${renderMuscuSetHeader(exLabel)}
    ${sets.map((set,i) => renderMuscuSetRow(exLabel, set, i)).join('')}
    <button onclick="addSet('${key}')" style="width:100%;background:none;border:1px dashed #E8D8D0;border-radius:8px;padding:7px;color:#8B1A1A;font-size:12px;font-weight:700;margin-top:4px">+ Série</button>
  </div>`;
  return html;

// ── SÉRIES MUSCU : rendu unifié (formulaire séance + blocs) ──────────────────
function fmtOneSet(st){
  // "80kg × 8" · "PDC × 12" · "PDC × 45 sec" · "60kg × 30 sec"
  const charge = st.isPdc ? 'PDC' : (st.kg ? st.kg+'kg' : '');
  const effort = st.reps ? st.reps + (st.isTimed ? ' sec' : '') : '';
  return charge && effort ? charge+' × '+effort : charge || effort;
}

function fmtMuscuSets(sets){
  if(!sets?.length) return '';
  const strs = sets.map(fmtOneSet).filter(Boolean);
  if(!strs.length) return '';
  // Toutes les séries identiques → "4 séries · PDC × 45 sec"
  if(strs.length > 1 && strs.every(x=>x===strs[0])) return strs.length+' séries · '+strs[0];
  return strs.join(' / ');
}
function exJsKey(exLabel){
  // Échappe le label pour un usage sûr dans un onclick="...('LABEL',...)"
  return exLabel.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

function exMode(exLabel){
  // Le mode (PDC / secondes) est porté par les séries — on lit la première
  const first = (sessionSets[exLabel]||[])[0] || {};
  return {isPdc: !!first.isPdc, isTimed: !!first.isTimed};
}

function setExMode(exLabel, field, on){
  // Applique le mode à toutes les séries de l'exercice
  (sessionSets[exLabel]||[]).forEach(s => { s[field] = on; if(field==='isPdc' && on) s.kg=''; });
  renderSessionForm();
}

function updateExTempo(exLabel, val){
  sessionExTempo[exLabel] = val.trim();
  // Pas de re-render pour ne pas perdre le focus
}

function addSet(exLabel){
  // Sauvegarder les valeurs actuelles avant de re-rendre
  if(!sessionSets[exLabel]) sessionSets[exLabel] = [];
  const currentSets = sessionSets[exLabel];
  for(let i=0; i<currentSets.length; i++){
    const kgEl = document.querySelector(`input[data-ex="${exLabel}"][data-idx="${i}"][data-field="kg"]`);
    const repsEl = document.querySelector(`input[data-ex="${exLabel}"][data-idx="${i}"][data-field="reps"]`);
    if(kgEl) currentSets[i].kg = kgEl.value;
    if(repsEl) currentSets[i].reps = repsEl.value;
  }
  const m = exMode(exLabel);
  sessionSets[exLabel].push({kg:'',reps:'',isPdc:m.isPdc,isTimed:m.isTimed});
  renderSessionForm();
}

function removeSet(exLabel, idx){
  if(!sessionSets[exLabel]) return;
  sessionSets[exLabel].splice(idx, 1);
  if(sessionSets[exLabel].length === 0) sessionSets[exLabel] = [{kg:'',reps:''}];
  renderSessionForm();
}

function updateSet(exLabel, idx, field, val){
  if(!sessionSets[exLabel]) sessionSets[exLabel] = [];
  if(!sessionSets[exLabel][idx]) sessionSets[exLabel][idx] = {};
  sessionSets[exLabel][idx][field] = val;
  // Pas de re-render pour ne pas perdre le focus
}

function demarrerSeancePlanifiee(sessionId){
  const s = sessions.find(x => x.id === sessionId);
  if(!s) return;
  // Pas de chrono pour le jeu au pied
  if(s.terrain_sub === 'pied'){
    _piedShots = s.pied_stats?.shots || [];
    _piedMode = 'but';
    _piedCurrentShot = null;
    editingItem = s;
    openPiedModule(s.id);
    return;
  }
  // Démarrer le chrono pour les autres types
  if(!chronoRunning) chronoToggle();
  // Ouvrir le formulaire en mode normal (avec perfs + ressenti)
  _sessionMode = 'normal';
  _currentType = s.type;
  _currentRessenti = s.ressenti ?? 2;
  _currentDifficulte = s.difficulte ?? 2;
  _currentSource = s.source || 'perso';
  _currentMental = s.mental ?? 2;
  _currentConfiance = s.confiance ?? 3;
  // Pré-remplir les sets si muscu
  sessionSets = {};
  sessionBlocs = [];
  sessionExTempo = {};
  if(s.type === 'muscu' && s.muscuSets?.length){
    s.muscuSets.forEach(ms => {
      sessionSets[ms.exLabel] = ms.sets || [{kg:'',reps:''}];
      if(ms.tempo) sessionExTempo[ms.exLabel] = ms.tempo;
    });
  }
  if(s.blocs?.length) sessionBlocs = JSON.parse(JSON.stringify(s.blocs));
  editingItem = s;
  renderSessionForm();
}

// Distance du tir au but jusqu'aux poteaux (terrain 68m × 100m, zone en but = 9% de la hauteur)
function piedButDistance(s){
  const dx = (s.x - 0.5) * 68;
  const dy = ((s.y - 0.09) / 0.82) * 100;
  return Math.round(Math.sqrt(dx*dx + dy*dy));
}

// Distance d'un coup de pied entre le départ (x,y) et l'atterrissage (x2,y2)
function piedKickDistance(s){
  const dx = (s.x2 - s.x) * 68;
  const dy = ((s.y2 - s.y) / 0.82) * 100;
  return Math.round(Math.sqrt(dx*dx + dy*dy));
}

function renderPiedTerrain(){
  const W = 300, H = 320; // Terrain complet vue du ciel
  const shots = _piedShots.filter(s => s.type === _piedMode);

  // Proportions terrain rugby 100m
  // H = 320px = 100m de jeu + 2 zones en but (~10m chacune)
  // Zone en but haute : 0-10m → 0 à H*0.09
  // Ligne de but : 10m → H*0.09
  // 22m : H*0.09 + H*0.82*0.22 = H*0.27
  // 40m : H*0.09 + H*0.82*0.40 = H*0.42
  // 50m (mi-terrain) : H*0.09 + H*0.82*0.50 = H*0.50
  // 60m : H*0.09 + H*0.82*0.60 = H*0.58
  // 78m (22m adverse) : H*0.09 + H*0.82*0.78 = H*0.73
  // Ligne de but adverse : H*0.91
  // Zone en but basse : H*0.91 à H

  const inGoal = H * 0.09;
  const butY1 = inGoal;                    // ligne de but (haut)
  const m22Y1 = inGoal + H*0.82*0.22;      // 22m haut
  const m40Y  = inGoal + H*0.82*0.40;      // 40m
  const midY  = inGoal + H*0.82*0.50;      // 50m mi-terrain
  const m60Y  = inGoal + H*0.82*0.60;      // 60m
  const m22Y2 = inGoal + H*0.82*0.78;      // 22m bas
  const butY2 = H * 0.91;                   // ligne de but (bas)

  // Poteaux en H dans la zone en but haute
  const pL = W/2 - 22, pR = W/2 + 22;
  const crossY = inGoal * 0.55, postTopY = inGoal * 0.08, postBotY = inGoal * 0.95;

  // Poteaux bas (zone en but basse)
  const pL2 = W/2 - 22, pR2 = W/2 + 22;
  const crossY2 = butY2 + (H-butY2)*0.45, postTopY2 = butY2 + (H-butY2)*0.08, postBotY2 = H - 4;

  // Tirets latéraux à chaque ligne
  const linesTirets = [butY1, m22Y1, m40Y, midY, m60Y, m22Y2, butY2].map(y =>
    '<line x1="4" y1="' + y + '" x2="18" y2="' + y + '" stroke="#fff" stroke-width="1" opacity="0.5"/>' +
    '<line x1="' + (W-18) + '" y1="' + y + '" x2="' + (W-4) + '" y2="' + y + '" stroke="#fff" stroke-width="1" opacity="0.5"/>'
  ).join('');

  // Lignes verticales des 5m et 15m (pointillés, terrain de 68m de large)
  const vLines = [5/68, 15/68, 1 - 15/68, 1 - 5/68].map(r => {
    const x = r * W;
    return '<line x1="' + x + '" y1="' + butY1 + '" x2="' + x + '" y2="' + butY2 + '" stroke="#fff" stroke-width="1" stroke-dasharray="7,7" opacity="0.4"/>';
  }).join('');

  // Position des poteaux (centre, ligne de but haute)
  const postCX = W / 2;
  const postCY = inGoal; // butY1

  let shotsHTML = '';
  shots.forEach((s) => {
    const cx = s.x * W, cy = s.y * H;
    const color = s.result === 'ok' ? '#27AE60' : '#C0392B';
    const label = s.miss_type ? s.miss_type[0].toUpperCase() : '';

    // Calculer la distance jusqu'aux poteaux pour les buts
    let distLabel = '';
    if(s.type === 'but'){
      const inGoalRatio = 0.09; // zone en but = 9% du terrain total
      const playRatio = 0.82;   // terrain de jeu = 82% (100m entre les deux lignes de but)
      // Distance horizontale depuis le centre (poteaux au centre)
      const dx = (s.x - 0.5) * 68;
      // Distance verticale depuis la ligne de but haute
      // s.y = 0 = haut de l'écran, inGoalRatio = position ligne de but
      const distY_ratio = s.y - inGoalRatio; // ratio depuis la ligne de but
      const dy = (distY_ratio / playRatio) * 100; // en mètres (0-100m)
      const dist = Math.round(Math.sqrt(dx*dx + dy*dy));
      distLabel = dist + 'm';
      if(s.distance === undefined) s.distance = dist;
    }

    shotsHTML += '<circle cx="' + cx + '" cy="' + cy + '" r="8" fill="' + color + '" opacity="0.9" stroke="#fff" stroke-width="1"/>';
    shotsHTML += '<text x="' + cx + '" y="' + (cy+4) + '" fill="#fff" font-size="9" text-anchor="middle" font-weight="bold">' + (s.result==='ok'?'✓':label||'✗') + '</text>';

    // Afficher la distance pour les buts
    if(distLabel){
      const bgX = cx + 10, bgY = cy - 10;
      shotsHTML += '<rect x="' + (bgX-2) + '" y="' + (bgY-9) + '" width="28" height="12" rx="4" fill="#1A0A0ACC"/>';
      shotsHTML += '<text x="' + bgX + '" y="' + bgY + '" fill="#FFD700" font-size="9" font-weight="bold">' + distLabel + '</text>';
    }

    if(s.x2 !== undefined && s.y2 !== undefined){
      const cx2 = s.x2 * W, cy2 = s.y2 * H;
      shotsHTML += '<line x1="' + cx + '" y1="' + cy + '" x2="' + cx2 + '" y2="' + cy2 + '" stroke="' + color + '" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>';
      shotsHTML += '<circle cx="' + cx2 + '" cy="' + cy2 + '" r="5" fill="' + color + '" opacity="0.8" stroke="#fff" stroke-width="1"/>';
      const mx = (cx+cx2)/2, my = (cy+cy2)/2;
      if(s.distance) shotsHTML += '<text x="' + mx + '" y="' + (my-6) + '" fill="#FFD700" font-size="9" text-anchor="middle" font-weight="bold">' + s.distance + 'm</text>';
    }
  });

  // Tir EN COURS (pas encore validé) : marqueur jaune pulsant, ajustable aux flèches
  if(_piedCurrentShot && _piedCurrentShot.type === _piedMode){
    const c = _piedCurrentShot;
    const ccx = c.x * W, ccy = c.y * H;
    shotsHTML += '<circle cx="' + ccx + '" cy="' + ccy + '" r="10" fill="none" stroke="#FFD700" stroke-width="2.5"><animate attributeName="r" values="8;13;8" dur="1.2s" repeatCount="indefinite"/></circle>';
    shotsHTML += '<circle cx="' + ccx + '" cy="' + ccy + '" r="5" fill="#FFD700" stroke="#1A0A0A" stroke-width="1"/>';
    if(c.type === 'but'){
      const dist = piedButDistance(c);
      shotsHTML += '<rect x="' + (ccx+12) + '" y="' + (ccy-17) + '" width="36" height="14" rx="4" fill="#1A0A0ACC"/>';
      shotsHTML += '<text x="' + (ccx+15) + '" y="' + (ccy-6) + '" fill="#FFD700" font-size="10" font-weight="bold">' + dist + 'm</text>';
    }
    if(c.x2 !== undefined && c.y2 !== undefined){
      const ccx2 = c.x2 * W, ccy2 = c.y2 * H;
      shotsHTML += '<line x1="' + ccx + '" y1="' + ccy + '" x2="' + ccx2 + '" y2="' + ccy2 + '" stroke="#FFD700" stroke-width="2" stroke-dasharray="5,3"/>';
      shotsHTML += '<circle cx="' + ccx2 + '" cy="' + ccy2 + '" r="9" fill="none" stroke="#FFD700" stroke-width="2.5"><animate attributeName="r" values="7;11;7" dur="1.2s" repeatCount="indefinite"/></circle>';
      shotsHTML += '<circle cx="' + ccx2 + '" cy="' + ccy2 + '" r="4" fill="#FFD700" stroke="#1A0A0A" stroke-width="1"/>';
      if(c.distance) shotsHTML += '<text x="' + ((ccx+ccx2)/2) + '" y="' + ((ccy+ccy2)/2 - 8) + '" fill="#FFD700" font-size="10" text-anchor="middle" font-weight="bold">' + c.distance + 'm</text>';
    }
  }

  return '<div style="position:relative;margin-bottom:8px">' +
    '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="border-radius:10px;cursor:crosshair;touch-action:none" id="pied-terrain" onclick="handlePiedTap(event)">' +
    // Fond pelouse
    '<rect width="' + W + '" height="' + H + '" fill="#2E7D32" rx="8"/>' +
    // Zones en but (foncées)
    '<rect x="0" y="0" width="' + W + '" height="' + butY1 + '" fill="#1B5E20" rx="8"/>' +
    '<rect x="0" y="' + butY2 + '" width="' + W + '" height="' + (H-butY2) + '" fill="#1B5E20"/>' +
    // Bandes alternées terrain
    '<rect x="0" y="' + butY1 + '" width="' + W + '" height="' + (m22Y1-butY1) + '" fill="#256628" opacity="0.4"/>' +
    '<rect x="0" y="' + m40Y + '" width="' + W + '" height="' + (midY-m40Y) + '" fill="#256628" opacity="0.4"/>' +
    '<rect x="0" y="' + m60Y + '" width="' + W + '" height="' + (m22Y2-m60Y) + '" fill="#256628" opacity="0.4"/>' +
    // Bordures latérales
    '<line x1="2" y1="0" x2="2" y2="' + H + '" stroke="#fff" stroke-width="1.5" opacity="0.7"/>' +
    '<line x1="' + (W-2) + '" y1="0" x2="' + (W-2) + '" y2="' + H + '" stroke="#fff" stroke-width="1.5" opacity="0.7"/>' +
    // Ligne de but haute
    '<line x1="0" y1="' + butY1 + '" x2="' + W + '" y2="' + butY1 + '" stroke="#fff" stroke-width="2.5"/>' +
    '<text x="' + (W-4) + '" y="' + (butY1-2) + '" fill="#fff" font-size="7" text-anchor="end" opacity="0.7">en but</text>' +
    // 22m haut
    '<line x1="0" y1="' + m22Y1 + '" x2="' + W + '" y2="' + m22Y1 + '" stroke="#fff" stroke-width="1.5"/>' +
    '<text x="5" y="' + (m22Y1-2) + '" fill="#fff" font-size="7" opacity="0.8">22m</text>' +
    // 40m
    '<line x1="0" y1="' + m40Y + '" x2="' + W + '" y2="' + m40Y + '" stroke="#fff" stroke-width="1" opacity="0.6"/>' +
    '<text x="5" y="' + (m40Y-2) + '" fill="#fff" font-size="7" opacity="0.7">40m</text>' +
    // Mi-terrain 50m
    '<line x1="0" y1="' + midY + '" x2="' + W + '" y2="' + midY + '" stroke="#fff" stroke-width="2.5"/>' +
    '<text x="5" y="' + (midY-2) + '" fill="#FFD700" font-size="7" opacity="0.9">50m</text>' +
    // 60m
    '<line x1="0" y1="' + m60Y + '" x2="' + W + '" y2="' + m60Y + '" stroke="#fff" stroke-width="1" opacity="0.6"/>' +
    '<text x="5" y="' + (m60Y-2) + '" fill="#fff" font-size="7" opacity="0.7">60m</text>' +
    // 22m bas
    '<line x1="0" y1="' + m22Y2 + '" x2="' + W + '" y2="' + m22Y2 + '" stroke="#fff" stroke-width="1.5"/>' +
    '<text x="5" y="' + (m22Y2-2) + '" fill="#fff" font-size="7" opacity="0.8">22m</text>' +
    // Ligne de but basse
    '<line x1="0" y1="' + butY2 + '" x2="' + W + '" y2="' + butY2 + '" stroke="#fff" stroke-width="2.5"/>' +
    '<text x="' + (W-4) + '" y="' + (butY2-2) + '" fill="#fff" font-size="7" text-anchor="end" opacity="0.7">en but</text>' +
    // Tirets latéraux
    linesTirets +
    // Lignes verticales 5m / 15m
    vLines +
    // POTEAUX EN H haut
    '<line x1="' + pL + '" y1="' + postTopY + '" x2="' + pL + '" y2="' + postBotY + '" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>' +
    '<line x1="' + pR + '" y1="' + postTopY + '" x2="' + pR + '" y2="' + postBotY + '" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>' +
    '<line x1="' + pL + '" y1="' + crossY + '" x2="' + pR + '" y2="' + crossY + '" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>' +
    '<line x1="' + W/2 + '" y1="' + crossY + '" x2="' + W/2 + '" y2="' + postBotY + '" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>' +
    // POTEAUX EN H bas (retournés)
    '<line x1="' + pL2 + '" y1="' + postTopY2 + '" x2="' + pL2 + '" y2="' + postBotY2 + '" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>' +
    '<line x1="' + pR2 + '" y1="' + postTopY2 + '" x2="' + pR2 + '" y2="' + postBotY2 + '" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>' +
    '<line x1="' + pL2 + '" y1="' + crossY2 + '" x2="' + pR2 + '" y2="' + crossY2 + '" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>' +
    '<line x1="' + W/2 + '" y1="' + postTopY2 + '" x2="' + W/2 + '" y2="' + crossY2 + '" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>' +
    shotsHTML +
    '</svg></div>';
}

// Pavé de flèches pour ajuster finement la position du ballon (~1m par appui)
function renderPiedDpad(sessionId){
  const btn = (arrow, dx, dy) => "<button onclick=\"movePiedShot(" + dx + "," + dy + "," + sessionId + ")\" style=\"width:46px;height:38px;background:#FFFFFF;border:1.5px solid #E8D8D0;border-radius:10px;font-size:15px\">" + arrow + "</button>";
  return "<div style=\"display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0\">" +
    "<div style=\"display:flex;flex-direction:column;align-items:center;gap:4px\">" +
    btn('⬆️',0,-1) +
    "<div style=\"display:flex;gap:4px\">" + btn('⬅️',-1,0) + btn('⬇️',0,1) + btn('➡️',1,0) + "</div>" +
    "</div>" +
    "<div style=\"font-size:10px;color:#9A7A70;max-width:110px;line-height:1.4\">Ajuste la position du ballon (~1 m par appui)</div>" +
    "</div>";
}

function movePiedShot(dx, dy, sessionId){
  const c = _piedCurrentShot;
  if(!c) return;
  const stepX = 1/68;       // ~1 m en largeur
  const stepY = 0.82/100;   // ~1 m en longueur
  const clamp = v => Math.max(0.01, Math.min(0.99, v));
  if(c.x2 !== undefined){
    // On ajuste le point d'atterrissage (box kick / sortie)
    c.x2 = clamp(c.x2 + dx*stepX);
    c.y2 = clamp(c.y2 + dy*stepY);
    c.distance = piedKickDistance(c);
  } else {
    c.x = clamp(c.x + dx*stepX);
    c.y = clamp(c.y + dy*stepY);
  }
  renderPiedModal(sessionId);
}

  const s = _piedCurrentShot;

      "<div style=\"font-size:12px;font-weight:700\">🏉 Position du ballon — " + piedButDistance(s) + "m des poteaux</div>" +
      renderPiedDpad(sessionId) +
      "<div style=\"font-size:12px;font-weight:700;margin-bottom:8px\">Résultat du tir :</div>" +
      "<div style=\"display:flex;gap:8px\">" +
      "<button onclick=\"validatePiedShot('ok'," + sessionId + ")\" style=\"flex:1;background:#27AE6018;border:2px solid #27AE60;border-radius:8px;padding:10px;font-size:18px\">✅</button>" +
      "<button onclick=\"openMissOptions(" + sessionId + ")\" style=\"flex:1;background:#C0392B18;border:2px solid #C0392B;border-radius:8px;padding:10px;font-size:18px\">❌</button>" +
      "</div>" +
      (s.missOptions ? "<div style=\"display:flex;gap:6px;margin-top:8px\">" +
        "<button onclick=\"validatePiedShot('fail'," + sessionId + ",'droite')\" style=\"flex:1;background:#F5EEE8;border:1px solid #E8D8D0;border-radius:6px;padding:6px;font-size:11px;font-weight:700\">→ Droite</button>" +
        "<button onclick=\"validatePiedShot('fail'," + sessionId + ",'gauche')\" style=\"flex:1;background:#F5EEE8;border:1px solid #E8D8D0;border-radius:6px;padding:6px;font-size:11px;font-weight:700\">← Gauche</button>" +
        "<button onclick=\"validatePiedShot('fail'," + sessionId + ",'court')\" style=\"flex:1;background:#F5EEE8;border:1px solid #E8D8D0;border-radius:6px;padding:6px;font-size:11px;font-weight:700\">↓ Court</button>" +
        "</div>" : '') +
      "<button onclick=\"cancelPiedShot(" + sessionId + ")\" style=\"margin-top:8px;background:none;border:1px solid #E8D8D0;border-radius:6px;padding:6px 12px;font-size:11px;color:#9A7A70\">Annuler</button>" +
      "</div>";
  }
  if((_piedMode === 'boxkick' || _piedMode === 'sortie') && s.step === 2){
    return "<div style=\"background:#1A0A0A0C;border-radius:10px;padding:12px;margin-bottom:8px\">" +
      "<div style=\"font-size:12px;font-weight:700;margin-bottom:6px\">👆 Tap maintenant où " + (_piedMode==='boxkick'?'le ballon atterrit':'le ballon sort en touche') + "</div>" +
      renderPiedDpad(sessionId) +
      "<div style=\"font-size:10px;color:#9A7A70;margin-bottom:6px\">(les flèches ajustent le point de départ)</div>" +
      "<button onclick=\"cancelPiedShot(" + sessionId + ")\" style=\"background:none;border:1px solid #E8D8D0;border-radius:6px;padding:6px 12px;font-size:11px;color:#9A7A70\">Annuler</button>" +
      "</div>";
  }
  if((_piedMode === 'boxkick' || _piedMode === 'sortie') && s.step === 3){
    const extra = _piedMode === 'sortie' ? "<div style=\"display:flex;gap:6px;margin:8px 0\">" +
      "<button onclick=\"setPiedDirect(true," + sessionId + ")\" style=\"flex:1;padding:8px;border-radius:8px;border:2px solid " + (s.direct===true?'#27AE60':'#E8D8D0') + ";background:" + (s.direct===true?'#27AE6018':'#F5EEE8') + ";font-size:12px;font-weight:700;color:" + (s.direct===true?'#27AE60':'#9A7A70') + "\">Direct</button>" +
      "<button onclick=\"setPiedDirect(false," + sessionId + ")\" style=\"flex:1;padding:8px;border-radius:8px;border:2px solid " + (s.direct===false?'#27AE60':'#E8D8D0') + ";background:" + (s.direct===false?'#27AE6018':'#F5EEE8') + ";font-size:12px;font-weight:700;color:" + (s.direct===false?'#27AE60':'#9A7A70') + "\">Indirect</button>" +
      "</div>" : '';
    return "<div style=\"background:#1A0A0A0C;border-radius:10px;padding:12px;margin-bottom:8px\">" +
      "<div style=\"font-size:12px;font-weight:700\">📏 " + (s.distance||0) + "m — ajuste le point " + (_piedMode==='boxkick'?"d'atterrissage":"de sortie en touche") + " si besoin</div>" +
      renderPiedDpad(sessionId) +
      extra +
      "<div style=\"display:flex;gap:8px\">" +
      "<button onclick=\"confirmPiedKick(" + sessionId + ")\" style=\"flex:1;background:#27AE60;color:#fff;border:none;border-radius:8px;padding:10px;font-weight:800;font-size:13px\">✅ VALIDER</button>" +
      "<button onclick=\"cancelPiedShot(" + sessionId + ")\" style=\"background:none;border:1px solid #E8D8D0;border-radius:8px;padding:6px 12px;font-size:11px;color:#9A7A70\">Annuler</button>" +
      "</div>" +
      "</div>";
  }
  return '';
}

function renderPiedHistory(){
  const recent = [..._piedShots].reverse().slice(0, 5);
  let html = "<div style=\"margin-top:10px\"><div style=\"font-size:11px;font-weight:700;color:#9A7A70;margin-bottom:6px\">DERNIERS TIRS</div>";
  recent.forEach((s, i) => {
    const labels = {but:'🦵',boxkick:'📦',sortie:'🏃'};
    const dist = s.distance ? ' · ' + s.distance + 'm' : '';
    const res = s.result==='ok' ? '✅' : s.miss_type ? '❌ '+s.miss_type : '❌';
    const dir = s.direct === true ? ' · Direct' : s.direct === false ? ' · Indirect' : '';
    html += "<div style=\"display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F5EEE8\">" +
      "<span>" + (labels[s.type]||'🦵') + "</span>" +
      "<span style=\"font-size:12px;flex:1\">" + res + dist + dir + "</span>" +
      "<button onclick=\"removePiedShot(" + (_piedShots.length - 1 - i) + "," + (0) + ")\" style=\"background:none;border:none;color:#C0392B;font-size:14px\">×</button>" +
      "</div>";
  });
  return html + "</div>";
}

function setPiedMode(mode, sessionId){
  _piedMode = mode;
  _piedCurrentShot = null;
  renderPiedModal(sessionId);
}

function handlePiedTap(event){
  const svg = document.getElementById('pied-terrain');
  if(!svg) return;
  const rect = svg.getBoundingClientRect();
  const x = (event.clientX - rect.left) / rect.width;
  const y = (event.clientY - rect.top) / rect.height;
  const sid = parseInt(svg.closest('[data-sid]')?.dataset?.sid || 0);

  if(!_piedCurrentShot){
    // Premier tap : placer le ballon
    _piedCurrentShot = {type: _piedMode, x, y, step: 1, result: null};
    if(_piedMode === 'boxkick' || _piedMode === 'sortie'){
      _piedCurrentShot.step = 2;
    }
  } else if(_piedCurrentShot.step === 2){
    // Deuxième tap : placer l'atterrissage — puis étape d'ajustement avant validation
    _piedCurrentShot.x2 = x;
    _piedCurrentShot.y2 = y;
    _piedCurrentShot.distance = piedKickDistance(_piedCurrentShot);
    _piedCurrentShot.step = 3;
  } else if(_piedCurrentShot.step === 3){
    // Re-tap : repositionner l'atterrissage
    _piedCurrentShot.x2 = x;
    _piedCurrentShot.y2 = y;
    _piedCurrentShot.distance = piedKickDistance(_piedCurrentShot);
  } else if(_piedMode === 'but' && _piedCurrentShot.step === 1){
    // Re-tap : repositionner le ballon
    _piedCurrentShot.x = x;
    _piedCurrentShot.y = y;
  }
  renderPiedModal(sid);
}

function confirmPiedKick(sessionId){
  const c = _piedCurrentShot;
  if(!c || c.x2 === undefined) return;
  c.distance = piedKickDistance(c);
  c.result = 'ok';
  delete c.step;
  _piedShots.push({...c});
  _piedCurrentShot = null;
  renderPiedModal(sessionId);
}

function validatePiedShot(result, sessionId, missType){
  if(!_piedCurrentShot) return;
  _piedCurrentShot.result = result;
  if(missType) _piedCurrentShot.miss_type = missType;
  if(_piedCurrentShot.type === 'but') _piedCurrentShot.distance = piedButDistance(_piedCurrentShot);
  delete _piedCurrentShot.step;
  delete _piedCurrentShot.missOptions;
  _piedShots.push({..._piedCurrentShot});
  _piedCurrentShot = null;
  renderPiedModal(sessionId);
}

function openMissOptions(sessionId){
  if(!_piedCurrentShot) return;
  _piedCurrentShot.missOptions = true;
  renderPiedModal(sessionId);
}

function setPiedDirect(direct, sessionId){
  if(!_piedCurrentShot) return;
  _piedCurrentShot.direct = direct;
  renderPiedModal(sessionId);
}

function cancelPiedShot(sessionId){
  _piedCurrentShot = null;
  renderPiedModal(sessionId);
}

function removePiedShot(idx, sessionId){
  _piedShots.splice(idx, 1);
  renderPiedModal(sessionId);
}

async function savePiedSession(sessionId){
  if(!sessionId) { closeModal(); return; }
  const buts = _piedShots.filter(s => s.type === 'but');
  const boxkicks = _piedShots.filter(s => s.type === 'boxkick');
  const sorties = _piedShots.filter(s => s.type === 'sortie');
  const commentaire = document.getElementById('pied-commentaire')?.value || '';
  const ressenti = _currentRessenti || 2;

  // Calcul stats détaillées
  const butsPct = buts.length ? Math.round(buts.filter(s=>s.result==='ok').length/buts.length*100) : 0;
  const echecs = buts.filter(s=>s.result!=='ok');
  const echecsD = echecs.filter(s=>s.miss_type==='droite').length;
  const echecsG = echecs.filter(s=>s.miss_type==='gauche').length;
  const echecsC = echecs.filter(s=>s.miss_type==='court').length;
  const avgDistBK = boxkicks.length ? Math.round(boxkicks.reduce((a,b)=>a+(b.distance||0),0)/boxkicks.length) : 0;

  const stats = {
    shots: _piedShots,
    contexte: _piedContext, // 'entrainement' ou 'match'
    buts_total: buts.length,
    buts_reussis: buts.filter(s=>s.result==='ok').length,
    buts_pct: butsPct,
    echecs_droite: echecsD,
    echecs_gauche: echecsG,
    echecs_court: echecsC,
    boxkicks_total: boxkicks.length,
    boxkicks_dist_moy: avgDistBK,
    sorties_total: sorties.length,
    sorties_direct: sorties.filter(s=>s.direct===true).length,
    commentaire
  };

  const piedId = parseInt(sessionId) || sessionId;
  await sb.from('sessions').update({pied_stats: stats, ressenti, notes: commentaire}).eq('id', piedId);
  sessions = sessions.map(s => s.id == sessionId ? {...s, pied_stats: stats, ressenti} : s);
  // Recharger depuis Supabase pour sync
  try {
    const {data} = await sb.from('sessions').select('*').eq('user_id', currentUser.id).order('date', {ascending:false});
    if(data) sessions = data.map(r => ({...r.data, id: r.id, date: r.date, type: r.type, heure: r.heure, duree: r.duree, ressenti: r.ressenti, difficulte: r.difficulte, notes: r.notes, pied_stats: r.pied_stats, terrain_sub: r.data?.terrain_sub}));
  } catch(e) {}
  _piedShots = [];
  _sessionMode = 'normal';
  editingItem = null;
  closeModal();
  showToast('Séance jeu au pied sauvegardée ✅', 'success');
  render();
}

function cloturerSeance(sessionId){
  // Utiliser editingItem si disponible (séance démarrée via le bouton Séance)
  let s = sessions.find(x => x.id == sessionId);
  if(!s && editingItem) s = editingItem;

async function submitCloture(sessionId){
  // Priorité à editingItem qui a le vrai ID Supabase
  let sid = editingItem?.id || sessionId;
  console.log('submitCloture sid=', sid, 'editingItem?.id=', editingItem?.id, 'sessionId=', sessionId);
  let s = sessions.find(x => x.id == sid) || editingItem;
  console.log('session trouvée:', s?.id, s?.type);
  const notes = document.getElementById('f_notes_cloture')?.value || s?.notes || '';
  const ressenti = _currentRessenti;
  const difficulte = _currentDifficulte;

  if(!s){ showToast('Erreur : séance introuvable', 'error'); return; }

  // Si l'ID est un timestamp (séance jamais sauvegardée en base)
  // Forcer l'ID en integer pour Supabase
  const realId = parseInt(s.id);
  
  if(!realId || isNaN(realId)){
    // Séance jamais sauvegardée — l'insérer maintenant
    const row = {
      user_id: currentUser.id,
      type: s.type,
      date: s.date,
      heure: s.heure || '',
      duree: s.duree || 60,
      ressenti,
      difficulte,
      notes,
      data: {terrain_sub: s.terrain_sub, focus: s.focus}
    };
    const {data, error} = await sb.from('sessions').insert(row).select().single();
    if(error){ showToast('Erreur : '+error.message, 'error'); return; }
    s = {...s, id: data.id, ressenti, difficulte, notes};
    sessions = [...sessions.filter(x => x.id != s.id), s];
  } else {
    console.log('UPDATE session id:', realId, 'ressenti:', ressenti, 'difficulte:', difficulte);
    const {data: updData, error} = await sb.from('sessions').update({ressenti, difficulte, notes}).eq('id', realId).select();
    console.log('UPDATE result:', updData, error);
    if(error){ showToast('Erreur : '+error.message, 'error'); return; }
    s = {...s, ressenti, difficulte, notes};
    sessions = sessions.map(x => parseInt(x.id) === realId ? s : x);
  }

  _sessionMode = 'normal';
  editingItem = null;
  closeModal();
  // Recharger les sessions depuis Supabase pour être sûr
  try {
    const {data} = await sb.from('sessions').select('*').eq('user_id', currentUser.id).order('date', {ascending:false});
    if(data) sessions = data.map(r => ({...r.data, id: r.id, date: r.date, type: r.type, heure: r.heure, duree: r.duree, ressenti: r.ressenti, difficulte: r.difficulte, notes: r.notes, pied_stats: r.pied_stats, terrain_sub: r.data?.terrain_sub}));
  } catch(e) {}
  render();
  showToast('Séance clôturée ✅', 'success');
}

function saveFormFieldsAndRender(){
  // Sauvegarder les valeurs des champs texte fixes AVANT de re-rendre
  const fields = ['f_date','f_heure','f_duree','f_focus','f_notes','f_adversaire',
    'f_score','f_kinezone','f_kineprat','f_recuptype','f_formenote',
    'f_course_format','f_course_reps','f_course_intensite'];
  const saved = {};
  fields.forEach(id => {
    const el = document.getElementById(id);
    if(el) saved[id] = el.value;
  });
  // Sauvegarder aussi les sets muscu dynamiques (kg_1, reps_1, kg_2...)
  for(let i = 1; i <= _setCount; i++){
    const kgEl = document.getElementById('kg_'+i);
    const repsEl = document.getElementById('reps_'+i);
    const pdcEl = document.getElementById('pdc_'+i);
    const timedEl = document.getElementById('timed_'+i);
    if(kgEl !== null || repsEl !== null){
      if(kgEl) saved['kg_'+i] = kgEl.value;
      if(repsEl) saved['reps_'+i] = repsEl.value;
      if(pdcEl) saved['pdc_'+i] = pdcEl.checked;
      if(timedEl) saved['timed_'+i] = timedEl.checked;
    }
  }
  renderSessionForm();
  // Réinjecter toutes les valeurs après le re-rendu
  setTimeout(()=>{
    fields.forEach(id => {
      const el = document.getElementById(id);
      if(el && saved[id] !== undefined) el.value = saved[id];
    });
    // Réinjecter les sets dynamiques
    for(let i = 1; i <= _setCount; i++){
      const kgEl = document.getElementById('kg_'+i);
      const repsEl = document.getElementById('reps_'+i);
      if(kgEl && saved['kg_'+i] !== undefined) kgEl.value = saved['kg_'+i];
      if(repsEl && saved['reps_'+i] !== undefined) repsEl.value = saved['reps_'+i];
    }
  }, 0);
}

async function submitSession(){
  const type=_currentType;
  const date=document.getElementById("f_date").value;
  if(!date) return;
  const dureeVal = parseInt(document.getElementById("f_duree")?.value) || 60;
  let extra={};
  if(type==="terrain") extra={focus:document.getElementById("f_focus")?.value||'', terrain_sub: _terrainSub||'collectif'};
  else if(type==="muscu"){
    const exercices = Object.keys(sessionSets);
    // Sauvegarder aussi dans charges pour les stats
    const muscuSetsToSave = [];
    for(const exLabel of exercices){
      // En mode planifier : sauvegarder même les sets vides pour le pré-remplissage
      const sets = _sessionMode === 'planifier'
        ? (sessionSets[exLabel]||[{kg:'',reps:''}])
        : (sessionSets[exLabel]||[]).filter(s=>s.kg!==''||s.reps!=='');
      const exObj = getAllExercises().find(e=>e.label===exLabel);
      if(exObj) muscuSetsToSave.push({exId: exObj.id, exLabel, sets, tempo: sessionExTempo[exLabel]||undefined});
    }
    extra={exercices, muscuSets: muscuSetsToSave, blocs: sessionBlocs.length ? sessionBlocs : undefined};
  }
  else if(type==="match") extra={adversaire:document.getElementById("f_adversaire")?.value||'',score:document.getElementById("f_score")?.value||'',resultat:document.getElementById("f_resultat")?.value||'',poste:document.getElementById("f_poste")?.value||userPoste()};
  else if(type==="kine") extra={kineZone:document.getElementById("f_kinezone")?.value||'',kinePraticien:document.getElementById("f_kineprat")?.value||''};
  else if(type==="recup") extra={recupType:document.getElementById("f_recuptype")?.value||''};
  else if(type==="forme") extra={formeNote:document.getElementById("f_formenote")?.value||''};

  const session={
    id:editingItem?.id||Date.now(),
    type, date,
    heure:document.getElementById("f_heure")?.value||'',
    duree:Number(document.getElementById("f_duree").value)||0,
    ressenti: _sessionMode === 'planifier' ? null : _currentRessenti,
    planifiee: _sessionMode === 'planifier' ? true : undefined,
    difficulte: _sessionMode === 'planifier' ? null : (['muscu','terrain'].includes(type) ? _currentDifficulte : null),
    source: ['muscu','terrain','recup'].includes(type) ? _currentSource : null,
    mental: ['terrain','match'].includes(type) ? _currentMental : null,
    confiance: type==='match' ? _currentConfiance : null,
    notes:document.getElementById("f_notes")?.value||'',
    ...extra
  };
  const wasEditing = !!editingItem?.id;
  const newId = await saveSession(session);
  if(newId) session.id = newId;
  if(wasEditing) sessions=sessions.map(s=>s.id===session.id?session:s);
  else sessions=[...sessions, session];
  // Sauvegarder les charges dans la table charges pour les stats
  let chargesSavedCount = 0;
  if(type==="muscu" && extra.muscuSets?.length){
    // Si on modifie une séance existante, supprimer ses anciennes entrées de charges pour éviter les doublons
    if(wasEditing){
      const oldCharges = chargesLog.filter(c => c.date === session.date && c._sessionId === session.id);
      for(const oc of oldCharges){
        await sb.from('charges').delete().eq('id', oc.id);
      }
      chargesLog = chargesLog.filter(c => !(c.date === session.date && c._sessionId === session.id));
    }
    for(const ms of extra.muscuSets){
      const entry = {ex_id: ms.exId, date: session.date, sets: ms.sets, user_id: currentUser.id};
      const newChargeId = await saveCharge(entry);
      if(newChargeId){
        chargesLog = [...chargesLog, {id: newChargeId, ...entry, _sessionId: session.id}];
        chargesSavedCount++;
      }
    }
  }
  sessionSets = {};
  sessionBlocs = [];
  sessionExTempo = {};
  // Si mode demarrer : la séance est maintenant en base avec un vrai ID
  // On met à jour editingItem avec le vrai ID pour que la clôture fonctionne
  if(_sessionMode === 'demarrer' && newId){
    const savedSession = sessions.find(s => s.id == newId);
    if(savedSession) editingItem = savedSession;
  } else {
    editingItem = null;
    _sessionMode = 'normal';
  }
  closeModal(); render();
  if(type==="muscu"){
    const attempted = extra.muscuSets?.length || 0;
    if(chargesSavedCount > 0 && chargesSavedCount === attempted){
      showToast(`✓ Sauvegardé · ${chargesSavedCount} exercice${chargesSavedCount>1?'s':''} avec charges enregistrées`, 'success');
    } else if(chargesSavedCount > 0 && chargesSavedCount < attempted){
      showToast(`⚠ Sauvegardé partiellement · ${chargesSavedCount}/${attempted} exercices enregistrés`, 'error');
    } else if(attempted > 0 && chargesSavedCount === 0){
      showToast('Séance sauvegardée mais échec sur les charges — réessaie', 'error');
    } else {
      showToast('Séance sauvegardée — aucun poids/répétition détecté, vérifie tes séries', 'error');
    }
  } else {
    showToast(wasEditing ? 'Séance modifiée' : 'Séance enregistrée', 'success');
  }
}

function editSession(id){
  const s=sessions.find(x=>x.id==id);
  if(s){
    _currentType=s.type; _currentRessenti=s.ressenti??2;
    // Séance jeu au pied — rouvrir le module pied avec les données existantes
    if(s.type === 'pied' || s.terrain_sub === 'pied'){
      _piedShots = s.pied_stats?.shots || [];
      _piedMode = 'but';
      _piedCurrentShot = null;
      openPiedModule(s.id);
      return;
    }
    openSessionForm(s);
    // Avertir si une séance muscu ancienne n'a pas de charges détaillées retrouvées
    if(s.type==='muscu' && !s.muscuSets?.length){
      const hasData = Object.values(sessionSets).some(sets => sets.some(set => set.kg || set.reps));
      if(!hasData){
        setTimeout(()=>showToast('Séance ancienne : vérifie les poids/répétitions avant de sauvegarder', 'error'), 300);
      }
    }
  }
}

// ── CHRONOMÈTRE ──────────────────────────────────────────────────────────────
function chronoFormat(secs){
  const h = Math.floor(secs/3600);
  const m = Math.floor((secs%3600)/60);
  const s = secs%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function chronoToggle(){
  if(chronoRunning){
    // Pause — sauvegarder le temps accumulé
    clearInterval(chronoInterval);
    chronoRunning = false;
    try { localStorage.setItem('rp_chrono_seconds', chronoSeconds); localStorage.removeItem('rp_chrono_start'); } catch(e){}
    document.getElementById('chrono-toggle').className = 'chrono-btn start';
    document.getElementById('chrono-toggle').textContent = '▶ REPRENDRE';
  } else {
    // Start / Reprendre — sauvegarder le timestamp de départ pour résister au background
    chronoRunning = true;
    chronoStartTime = Date.now() - (chronoSeconds * 1000);
    try { localStorage.setItem('rp_chrono_start', chronoStartTime); localStorage.setItem('rp_chrono_seconds', chronoSeconds); } catch(e){}
    document.getElementById('chrono-toggle').className = 'chrono-btn pause';
    document.getElementById('chrono-toggle').textContent = '⏸ PAUSE';
    chronoInterval = setInterval(()=>{
      // Recalculer depuis le timestamp pour corriger les dérives en arrière-plan
      chronoSeconds = Math.floor((Date.now() - chronoStartTime) / 1000);
      const el = document.getElementById('chrono-display');
      if(el) el.textContent = chronoFormat(chronoSeconds);
      const dashEl = document.getElementById('dash-chrono');
      if(dashEl) dashEl.textContent = chronoFormat(chronoSeconds);
    }, 1000);
    // Afficher la barre si cachée
    document.getElementById('chrono-bar').classList.remove('hidden');
    const header = document.querySelector('.header');
    if(header) header.style.marginTop = '60px';
  }
}

function chronoReset(){
  clearInterval(chronoInterval);
  chronoRunning = false;
  chronoSeconds = 0;
  chronoStartTime = null;
  try { localStorage.removeItem('rp_chrono_start'); localStorage.removeItem('rp_chrono_seconds'); } catch(e){}
  const el = document.getElementById('chrono-display');
  if(el) el.textContent = '00:00:00';
  const dashEl = document.getElementById('dash-chrono');
  if(dashEl) dashEl.textContent = '00:00:00';
  const btn = document.getElementById('chrono-toggle');
  if(btn){ btn.className='chrono-btn start'; btn.textContent='▶ START'; }
  document.getElementById('chrono-bar').classList.add('hidden');
  const header = document.querySelector('.header');
  if(header) header.style.marginTop = '0';
}

  document.getElementById('chrono-bar').classList.remove('hidden');
  const header = document.querySelector('.header');
