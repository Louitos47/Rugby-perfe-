async function loadManagerStats(teamId){
  const container = document.getElementById('manager-stats-content');
  if(!container) return;

  const {data: members} = await sb.from('team_members').select('user_id').eq('team_id', teamId).eq('role', 'joueur');
  if(!members?.length){ container.innerHTML = '<div class="card" style="text-align:center;padding:20px;color:#9A7A70">Aucun joueur dans l\'équipe.</div>'; return; }
  const playerIds = members.map(m => m.user_id);

  // Événements des 30 derniers jours
  const since = addDays(today(), -30);
  const {data: events} = await sb.from('team_events').select('*').eq('team_id', teamId).gte('date', since);
  const {data: bilans} = await sb.from('team_event_bilans').select('*').in('team_event_id', (events||[]).map(e=>e.id));

  const totalEvents = (events||[]).length;
  const totalBilans = (bilans||[]).length;
  const participation = totalEvents > 0 ? Math.round((totalBilans / (totalEvents * playerIds.length)) * 100) : 0;

  // Ressenti moyen
  const ressentis = (bilans||[]).filter(b=>b.ressenti!=null).map(b=>b.ressenti);
  const ressMoyen = ressentis.length ? (ressentis.reduce((a,b)=>a+b,0)/ressentis.length).toFixed(1) : '-';
  const RESSENTI_LABELS = ['Épuisé','Moyen','Bien','Super','En feu'];

  // Mental moyen
  const mentals = (bilans||[]).filter(b=>b.mental!=null).map(b=>b.mental);
  const mentalMoyen = mentals.length ? (mentals.reduce((a,b)=>a+b,0)/mentals.length).toFixed(1) : '-';

  let html = '<div class="sec-title">📊 Stats équipe (30 derniers jours)</div>';
  html += '<div class="stat-row">' +
    '<div class="stat-box"><div class="stat-val" style="color:#2E86AB">' + totalEvents + '</div><div class="stat-lbl">Événements</div></div>' +
    '<div class="stat-box"><div class="stat-val" style="color:#1A8C6E">' + participation + '%</div><div class="stat-lbl">Participation bilans</div></div>' +
    '<div class="stat-box"><div class="stat-val" style="color:#D4841A">' + ressMoyen + '/4</div><div class="stat-lbl">Ressenti moyen</div></div>' +
    '</div>';

  html += '<div class="stat-row">' +
    '<div class="stat-box"><div class="stat-val" style="color:#7B2D8B">' + mentalMoyen + '/5</div><div class="stat-lbl">Mental moyen</div></div>' +
    '<div class="stat-box"><div class="stat-val" style="color:#8B1A1A">' + playerIds.length + '</div><div class="stat-lbl">Joueurs</div></div>' +
    '</div>';

  // Participation par joueur
  const bilansByPlayer = {};
  (bilans||[]).forEach(b => { bilansByPlayer[b.user_id] = (bilansByPlayer[b.user_id]||0)+1; });
  const {data: profiles} = await sb.from('profiles').select('id, nom, nom_famille, poste').in('id', playerIds);

  html += '<div class="sec-title">Implication par joueur</div>';
  (profiles||[]).sort((a,b)=>(bilansByPlayer[b.id]||0)-(bilansByPlayer[a.id]||0)).forEach(p => {
    const count = bilansByPlayer[p.id] || 0;
    const pct = totalEvents > 0 ? Math.round(count/totalEvents*100) : 0;
    html += '<div class="card" style="display:flex;align-items:center;gap:10px">' +
      '<div style="flex:1"><div style="font-size:13px;font-weight:700">' + (p.nom||'') + ' ' + (p.nom_famille||'') + '</div>' +
      '<div style="font-size:11px;color:#9A7A70">' + (p.poste||'') + '</div></div>' +
      '<div style="text-align:right"><div style="font-size:13px;font-weight:800;color:' + (pct>=70?'#1A8C6E':pct>=40?'#D4841A':'#C0392B') + '">' + pct + '%</div>' +
      '<div style="font-size:10px;color:#9A7A70">' + count + '/' + totalEvents + '</div></div>' +
      '</div>';
  });

  container.innerHTML = html;
}

let chatChannels = [];        // groupes du chat de l'équipe affichée
let activeChatChannelId = null; // null = canal général « Équipe »
let activeDmUserId = null;    // conversation privée ouverte (user_id) ou null
let _pendingDmUserId = null;  // DM à ouvrir dès que le chat est prêt (navigation inter-onglets)
let _chatTeamId = null;       // équipe dont le chat est ouvert
let _teamMembersCache = {};   // {user_id: {name, role}} pour afficher les noms

function myRolesForTeam(teamId){
  return myTeams.filter(t => t.id === teamId).map(t => t.myRole);
}

function canManageChannels(teamId){
  const roles = myRolesForTeam(teamId);
  return roles.includes('manager') || roles.includes('coach');
}

async function initChatView(teamId){
  _chatTeamId = teamId;
  activeChatChannelId = null;
  activeDmUserId = null;
  await loadChatChannels(teamId);
  if(_pendingDmUserId){
    const uid = _pendingDmUserId; _pendingDmUserId = null;
    return startDm(uid);
  }
  paintChatChannelBar();
  loadChatMessages(teamId);
}

async function loadTeamMembers(teamId){
  const {data: members} = await sb.from('team_members').select('user_id, role').eq('team_id', teamId);
  const ids = [...new Set((members||[]).map(m => m.user_id))];
  if(!ids.length) return [];
  const {data: profiles} = await sb.from('profiles').select('id, nom, nom_famille, poste').in('id', ids);
  const pMap = {}; (profiles||[]).forEach(p => pMap[p.id] = p);
  const seen = new Set();
  const list = [];
  (members||[]).forEach(m => {
    if(m.user_id === currentUser?.id || seen.has(m.user_id)) return; // un compte peut cumuler des rôles
    seen.add(m.user_id);
    const p = pMap[m.user_id] || {};
    const name = ((p.nom||'')+' '+(p.nom_famille||'')).trim() || 'Membre';
    list.push({id: m.user_id, name, role: m.role, poste: p.poste});
    _teamMembersCache[m.user_id] = {name, role: m.role};
  });
  return list.sort((a,b) => a.name.localeCompare(b.name));
}

function openDmWith(userId, chatView){

async function loadChatChannels(teamId){
  try {
    const {data} = await sb.from('chat_channels').select('*').eq('team_id', teamId).order('created_at', {ascending:true});
    const myRoles = myRolesForTeam(teamId);
    // Ne montrer que les groupes auxquels un de mes rôles donne accès
    chatChannels = (data||[]).filter(c => (c.roles||[]).some(r => myRoles.includes(r)));
  } catch(e){ chatChannels = []; }
}

function paintChatChannelBar(){
  const bar = document.getElementById('chat-channels-bar');
  if(!bar) return;
  const chip = (active, label, onclick) =>
    `<button onclick="${onclick}" style="flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid ${active?'#2E86AB':'#E8D8D0'};background:${active?'#2E86AB18':'#FFFFFF'};color:${active?'#2E86AB':'#9A7A70'};font-size:12px;font-weight:700;cursor:pointer">${label}</button>`;
  let html = `<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px;align-items:center">`;
  html += chip(activeChatChannelId===null && !activeDmUserId, '💬 Équipe', 'switchChatChannel(null)');
  chatChannels.forEach(c => {
    html += chip(activeChatChannelId===c.id, escHtml(c.name), `switchChatChannel(${c.id})`);
  });
  const dmName = activeDmUserId && _teamMembersCache[activeDmUserId] ? ' · '+escHtml(_teamMembersCache[activeDmUserId].name.split(' ')[0]) : '';
  html += chip(!!activeDmUserId, '✉️ Privé'+dmName, 'openDmPicker()');
  if(canManageChannels(_chatTeamId)){
    html += `<button onclick="openCreateChannelModal()" style="flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px dashed #1A8C6E66;background:none;color:#1A8C6E;font-size:12px;font-weight:700;cursor:pointer">+ Groupe</button>`;
  }
  html += `</div>`;
  // Bandeau conversation privée
  if(activeDmUserId){
    const m = _teamMembersCache[activeDmUserId];
    html += `<div style="background:#7B2D8B08;border:1px solid #7B2D8B33;border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:10px;color:#7B2D8B">✉️ Conversation privée avec <strong>${escHtml(m?.name||'…')}</strong> — visible uniquement par vous deux</div>`;
  }
  // Bandeau d'infos du groupe actif (membres + suppression)
  const active = chatChannels.find(c => c.id === activeChatChannelId);
  if(active){
    const roleLabels = (active.roles||[]).map(r => TEAM_ROLES[r]?.label || r).join(', ');
    const canDelete = active.created_by === currentUser?.id || myRolesForTeam(_chatTeamId).includes('manager');
    html += `<div style="display:flex;justify-content:space-between;align-items:center;background:#2E86AB08;border:1px solid #2E86AB22;border-radius:8px;padding:6px 10px;margin-bottom:8px">
      <span style="font-size:10px;color:#2E86AB">👥 ${escHtml(roleLabels)}</span>
      ${canDelete?`<button onclick="deleteChatChannel(${active.id})" style="background:none;border:none;color:#C0392B;font-size:11px;font-weight:700;cursor:pointer">🗑️ Supprimer le groupe</button>`:''}
    </div>`;
  }
  bar.innerHTML = html;
}

async function saveChatChannel(){
  const name = document.getElementById('ch-name')?.value.trim();
  const roles = [...document.querySelectorAll('.ch-role:checked')].map(el => el.value);
  if(!name){ showToast('Donne un nom au groupe', 'error'); return; }
  if(!roles.length){ showToast('Choisis au moins un rôle', 'error'); return; }
  const {data, error} = await sb.from('chat_channels').insert({team_id: _chatTeamId, name, roles, created_by: currentUser.id}).select().single();
  if(error){ showToast('Erreur : '+error.message, 'error'); return; }
  closeModal();
  await loadChatChannels(_chatTeamId);
  activeChatChannelId = data?.id || null;
  paintChatChannelBar();
  loadChatMessages(_chatTeamId);
  showToast('Groupe « '+name+' » créé !', 'success');
}

async function deleteChatChannel(id){
  if(!confirm('Supprimer ce groupe et tous ses messages ?')) return;
  const {error} = await sb.from('chat_channels').delete().eq('id', id);
  if(error){ showToast('Erreur : '+error.message, 'error'); return; }
  activeChatChannelId = null;
  await loadChatChannels(_chatTeamId);
  paintChatChannelBar();
  loadChatMessages(_chatTeamId);
  showToast('Groupe supprimé', 'success');
}

async function loadChatMessages(teamId){
  const container = document.getElementById('chat-messages');
  if(!container) return;
  let msgsRaw;
  if(activeDmUserId){
    const me = currentUser.id;
    const {data} = await sb.from('direct_messages').select('*')
      .or(`and(sender_id.eq.${me},recipient_id.eq.${activeDmUserId}),and(sender_id.eq.${activeDmUserId},recipient_id.eq.${me})`)
      .order('created_at', {ascending:true}).limit(50);
    msgsRaw = (data||[]).map(m => ({...m, user_id: m.sender_id}));
  } else {
    let q = sb.from('team_messages').select('*').eq('team_id', teamId);
    q = activeChatChannelId ? q.eq('channel_id', activeChatChannelId) : q.is('channel_id', null);
    const {data} = await q.order('created_at', {ascending:true}).limit(50);
    msgsRaw = data;
  }
  if(!msgsRaw?.length){ container.innerHTML = '<div style="text-align:center;color:#9A7A70;font-size:12px;padding:20px">Aucun message pour l\'instant.<br>Soyez le premier à écrire !</div>'; return; }

  const userIds = [...new Set(msgsRaw.map(m => m.user_id))];
  const {data: profilesData} = await sb.from('profiles').select('id, nom, nom_famille').in('id', userIds);
  const pMap = {}; (profilesData||[]).forEach(p => pMap[p.id] = p);

  container.innerHTML = msgsRaw.map(m => {
    const isMe = m.user_id === currentUser.id;
    const p = pMap[m.user_id];
    const name = p ? (p.nom||'') + ' ' + (p.nom_famille||'') : 'Membre';
    return '<div style="margin-bottom:10px;text-align:' + (isMe?'right':'left') + '">' +
      '<div style="font-size:10px;color:#9A7A70;margin-bottom:3px">' + (isMe?'Moi':name.trim()) + ' · ' + fmt(m.created_at.split('T')[0]) + '</div>' +
      '<div style="display:inline-block;background:' + (isMe?'#2E86AB':'#FFFFFF') + ';color:' + (isMe?'#fff':'#1A0A0A') + ';border-radius:12px;border:1px solid ' + (isMe?'transparent':'#E8D8D0') + ';padding:8px 12px;font-size:13px;max-width:80%;text-align:left;line-height:1.4">' + m.message + '</div>' +
      '</div>';
  }).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendChatMessage(){
  const teamId = _chatTeamId || (getManagerTeam() || myTeams[0])?.id;
  if(!teamId) return;
  const input = document.getElementById('chat-input');
  const message = input?.value.trim();
  if(!message) return;
  if(activeDmUserId){
    // Message privé : table dédiée + notification au destinataire uniquement
    const {error} = await sb.from('direct_messages').insert({team_id: teamId, sender_id: currentUser.id, recipient_id: activeDmUserId, message});
    if(error){ showToast('Erreur : '+error.message, 'error'); return; }
    input.value = '';
    sendPushToTeam(teamId, '✉️ ' + userName(), message.slice(0,120), activeDmUserId);
    loadChatMessages(teamId);
    return;
  }
  const {error} = await sb.from('team_messages').insert({team_id: teamId, user_id: currentUser.id, message, channel_id: activeChatChannelId});
  if(error){ showToast('Erreur : '+error.message, 'error'); return; }
  input.value = '';
  // Notification aux destinataires du message
  const teamName = myTeams.find(t => t.id === teamId)?.name || 'Rugby Perf';
  const preview = userName() + ' : ' + message.slice(0, 120);
  const channel = chatChannels.find(c => c.id === activeChatChannelId);
  if(channel){
    // Groupe : notifier uniquement les membres dont le rôle fait partie du groupe
    const {data: members} = await sb.from('team_members').select('user_id').eq('team_id', teamId).in('role', channel.roles||[]);
    const ids = [...new Set((members||[]).map(m => m.user_id))].filter(id => id !== currentUser.id);
    if(ids.length) sendPushToTeam(teamId, '💬 ' + channel.name + ' — ' + teamName, preview, ids);
  } else {
    // Canal général : toute l'équipe
    sendPushToTeam(teamId, '💬 ' + teamName, preview, null, {chat: true});
  }
  loadChatMessages(teamId);
}

async function importManagerTeampulse(){
  const team = getManagerTeam();
  let url = document.getElementById('manager-ics-url')?.value.trim();
  const status = document.getElementById('mtp-status');
  const btn = document.getElementById('mtp-import-btn');
  if(!url){ status.style.color='#C0392B'; status.textContent='Colle un lien d\'abord !'; return; }

  url = url.replace(/^webcal:\/\//, 'https://');
  btn.disabled = true; btn.textContent = 'Synchronisation...';
  status.style.color = '#9A7A70'; status.textContent = 'Connexion à TeamPulse...';

  try {
    const icsText = await fetchICS(url);
    if(!icsText) throw new Error('Calendrier vide');
    const events = parseICS(icsText);
    if(!events.length){ status.style.color='#C0392B'; status.textContent='Aucun événement trouvé.'; btn.disabled=false; btn.textContent='📥 Synchroniser le calendrier d\'équipe'; return; }

    // Sauvegarder l'URL sur l'équipe pour les prochaines synchronisations
    await sb.from('teams').update({team_ics_url: url}).eq('id', team.id);

    // On repart d'une base propre à chaque synchro : supprime les anciens
    // événements d'équipe avant de réinsérer, pour éviter les doublons
    await sb.from('team_events').delete().eq('team_id', team.id);

    const todayStr = today();
    let added = 0;
    for(const ev of events){
      if(ev.date < addDays(todayStr, -7)) continue; // ignore le passé ancien
      const row = {
        team_id: team.id,
        date: ev.date,
        heure: ev.heure || '',
        type: ev.isMatch ? 'match' : 'entrainement',
        titre: ev.isMatch ? extractAdversaire(ev.summary) : (ev.summary || 'Entraînement collectif')
      };
      const {error} = await sb.from('team_events').insert(row);
      if(!error) added++;
    }

    status.style.color = '#1A8C6E';
    status.textContent = `✓ ${added} événement(s) synchronisé(s) pour toute l'équipe`;
    btn.disabled = false; btn.textContent = '📥 Synchroniser le calendrier d\'équipe';
    const teamIdx = myTeams.findIndex(t => t.id === team.id);
    if(teamIdx >= 0) myTeams[teamIdx].team_ics_url = url;
  } catch(e){
    status.style.color = '#C0392B';
    status.textContent = 'Erreur : ' + e.message;
    btn.disabled = false; btn.textContent = '📥 Synchroniser le calendrier d\'équipe';
  }
}

async function saveCustomTest(id){
  const team = getPrepaTeam();
  const name = document.getElementById('ct-name')?.value.trim();
  const unit = document.getElementById('ct-unit')?.value;
  const icon = document.getElementById('ct-icon')?.value.trim() || '🧪';
  const lower_is_better = document.getElementById('ct-sens')?.value === 'true';
  if(!name){ showToast('Donne un nom au test', 'error'); return; }
  let error;
  if(id){
    ({error} = await sb.from('custom_tests').update({name, unit, icon, lower_is_better}).eq('id', id));
  } else {
    ({error} = await sb.from('custom_tests').insert({team_id: team.id, created_by: currentUser.id, name, unit, icon, lower_is_better}));

  if(error){ showToast('Erreur : '+error.message, 'error'); return; }
  closeModal();
  showToast(id ? 'Test modifié' : 'Test créé ✅', 'success');

}

async function deleteCustomTest(id){
  if(!confirm('Supprimer ce test et tous ses résultats ?')) return;
  const {error} = await sb.from('custom_tests').delete().eq('id', id);
  if(error){ showToast('Erreur : '+error.message, 'error'); return; }
  showToast('Test supprimé', 'success');
  loadPrepaCustomTests(getPrepaTeam()?.id);
}

async function loadPrepaTestSession(){
  const team = getPrepaTeam();
  _prepaTestDate = document.getElementById('prepa-test-date')?.value;
  if(!_prepaTestDate){ showToast('Choisis une date', 'error'); return; }

  const {data: members} = await sb.from('team_members').select('user_id').eq('team_id', team.id).eq('role', 'joueur');
  const playerIds = (members||[]).map(m => m.user_id);
  const {data: profiles} = await sb.from('profiles').select('id, nom, nom_famille, poste').in('id', playerIds);
  _prepaTestPlayers = profiles || [];
  _prepaTestSession = {};
  _prepaTestPlayers.forEach(p => { _prepaTestSession[p.id] = {}; });

  renderPrepaTestForm();
}

  const container = document.getElementById('prepa-test-form');
  if(!container || !_prepaTestPlayers.length) return;

  let html = '<div class="sec-title" style="margin-top:16px">Résultats — ' + _prepaTestDate + '</div>';

  _prepaTestPlayers.forEach(p => {
    const isAbsent = _prepaTestSession[p.id] === null;
    html += '<div class="card" style="border-color:' + (isAbsent ? '#C0392B33' : '#8B1A1A22') + ';opacity:' + (isAbsent ? '0.5' : '1') + '">' +

      '</div>';

    if(!isAbsent){
      PREPA_TESTS.forEach(t => {

          const mins = val ? Math.floor(val/60) : '';
          const secs = val ? val%60 : '';
          html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">' +
            '<span style="font-size:14px">' + t.icon + '</span>' +
            '<span style="font-size:12px;width:110px;color:#9A7A70">' + t.label + '</span>' +
            '<input type="number" min="0" max="10" placeholder="min" value="' + mins + '" class="prepa-test-input" data-player="' + p.id + '" data-key="' + t.key + '" data-unit="min" style="width:54px;padding:6px;border-radius:6px;border:1px solid #E8D8D0;font-size:12px;text-align:center"/>' +
            '<span style="font-size:11px;color:#9A7A70">&#39;</span>' +
            '<input type="number" min="0" max="59" placeholder="sec" value="' + secs + '" class="prepa-test-input" data-player="' + p.id + '" data-key="' + t.key + '" data-unit="sec" style="width:54px;padding:6px;border-radius:6px;border:1px solid #E8D8D0;font-size:12px;text-align:center"/>' +
            '<span style="font-size:11px;color:#9A7A70">"</span></div>';
        } else {

          html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">' +

            '<span style="font-size:12px;width:110px;color:#9A7A70">' + t.label + '</span>' +
            '<input type="number" min="0" placeholder="kg" value="' + val + '" class="prepa-test-input" data-player="' + p.id + '" data-key="' + t.key + '" data-unit="kg" style="width:70px;padding:6px;border-radius:6px;border:1px solid #E8D8D0;font-size:12px;text-align:center"/>' +

  container.innerHTML = html;
  // Brancher les listeners sur tous les inputs de test
  container.querySelectorAll('.prepa-test-input').forEach(inp => {
    inp.addEventListener('input', () => {
      updatePrepaTest(inp.dataset.player, inp.dataset.key, inp.value, inp.dataset.unit);
    });
  });
}

function togglePrepaTestAbsent(playerId){
  _prepaTestSession[playerId] = _prepaTestSession[playerId] === null ? {} : null;
  renderPrepaTestForm();
}

function updatePrepaTest(playerId, key, value, unit){
  if(!_prepaTestSession[playerId]) _prepaTestSession[playerId] = {};
  if(unit === 'min'){
    const prev = _prepaTestSession[playerId][key] || 0;
    const secs = prev % 60;
    _prepaTestSession[playerId][key] = (parseInt(value)||0) * 60 + secs;
  } else if(unit === 'sec'){
    const prev = _prepaTestSession[playerId][key] || 0;
    const mins = Math.floor(prev / 60);
    _prepaTestSession[playerId][key] = mins * 60 + (parseInt(value)||0);
  } else {
    _prepaTestSession[playerId][key] = parseFloat(value) || null;
  }
}

async function savePrepaTestSession(){
  const team = getPrepaTeam();
  let saved = 0, skipped = 0;

  for(const [playerId, data] of Object.entries(_prepaTestSession)){
    if(data === null){ skipped++; continue; } // absent

    // Séparer les tests de base (colonnes athlete_tests) des tests personnalisés (ct_<id>)
    const builtin = {}, customs = {};
    Object.entries(data).forEach(([k, v]) => {
      if(k.startsWith('ct_')) customs[k.slice(3)] = v;
      else builtin[k] = v;
    });
    const hasBuiltin = PREPA_TESTS.some(t => builtin[t.key]);
    const hasCustom = Object.values(customs).some(v => v !== null && v !== '' && v !== undefined);
    if(!hasBuiltin && !hasCustom){ skipped++; continue; }

    let ok = true;
    if(hasBuiltin){
      const row = {
        user_id: playerId, date: _prepaTestDate,
        saisie_par: currentUser.id, team_id: team.id,
        ...builtin
      };
      const {data: existing} = await sb.from('athlete_tests').select('id').eq('user_id', playerId).eq('date', _prepaTestDate).eq('saisie_par', currentUser.id).single();
      let error;
      if(existing?.id){
        const res = await sb.from('athlete_tests').update({...builtin, team_id: team.id}).eq('id', existing.id);
        error = res.error;
      } else {
        const res = await sb.from('athlete_tests').insert(row);
        error = res.error;
      }
      if(error){ ok = false; console.error('Erreur test joueur', playerId, error.message); }
    }
    // Résultats des tests personnalisés
    for(const [testId, value] of Object.entries(customs)){
      if(value === null || value === '' || value === undefined) continue;
      const {data: existingR} = await sb.from('custom_test_results').select('id').eq('test_id', testId).eq('player_id', playerId).eq('date', _prepaTestDate).single();
      let error;
      if(existingR?.id){
        ({error} = await sb.from('custom_test_results').update({value}).eq('id', existingR.id));
      } else {
        ({error} = await sb.from('custom_test_results').insert({test_id: parseInt(testId), team_id: team.id, player_id: playerId, saisie_par: currentUser.id, date: _prepaTestDate, value}));
      }
      if(error){ ok = false; console.error('Erreur test perso', playerId, error.message); }
    }
    if(ok) saved++;
  }

  showToast(saved + ' résultat(s) sauvegardé(s)' + (skipped ? ', ' + skipped + ' absent(s)' : ''), 'success');
  loadPrepaTestsHistory(team.id);
}

async function loadPrepaTestsHistory(teamId){
  const container = document.getElementById('prepa-tests-history');
  if(!container) return;
  const {data} = await sb.from('athlete_tests').select('*, profiles(nom, nom_famille)').eq('team_id', teamId).eq('saisie_par', currentUser.id).order('date', {ascending:false}).limit(20);

  // Deux requêtes séparées
  const {data: testsRaw} = await sb.from('athlete_tests').select('*').eq('team_id', teamId).eq('saisie_par', currentUser.id).order('date', {ascending:false}).limit(20);
  let customResults = [];
  try {
    const {data: cr} = await sb.from('custom_test_results').select('*').eq('team_id', teamId).order('date', {ascending:false}).limit(100);
    customResults = cr || [];
  } catch(e){}
  if(!testsRaw?.length && !customResults.length){ container.innerHTML = '<div style="font-size:12px;color:#9A7A70;text-align:center;padding:12px">Aucun test saisi pour l\'instant.</div>'; return; }

  const pIds = [...new Set([...(testsRaw||[]).map(t => t.user_id), ...customResults.map(r => r.player_id)])];
  const {data: profiles} = await sb.from('profiles').select('id, nom, nom_famille').in('id', pIds);
  const pMap = {}; (profiles||[]).forEach(p => pMap[p.id] = p);
  const ctMap = {}; prepaCustomTests.forEach(t => ctMap[t.id] = t);

  // Résultats personnalisés indexés par date+joueur
  const customByDatePlayer = {};
  customResults.forEach(r => {
    const key = r.date + '|' + r.player_id;
    if(!customByDatePlayer[key]) customByDatePlayer[key] = [];
    const ct = ctMap[r.test_id];
    customByDatePlayer[key].push((ct?.icon||'🧪') + ' ' + r.value + (ct?.unit||''));
  });

  // Grouper par date (tests de base + dates n'ayant que des tests persos)
  const byDate = {};
  (testsRaw||[]).forEach(t => { if(!byDate[t.date]) byDate[t.date] = {}; byDate[t.date][t.user_id] = t; });
  customResults.forEach(r => { if(!byDate[r.date]) byDate[r.date] = {}; if(!byDate[r.date][r.player_id]) byDate[r.date][r.player_id] = {user_id: r.player_id, date: r.date}; });

  container.innerHTML = Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([date, players]) =>
    '<div class="card">' +
    '<div style="font-size:12px;font-weight:800;color:#8B1A1A;margin-bottom:8px">📊 Session du ' + fmt(date) + '</div>' +
    Object.values(players).map(t => {
      const p = pMap[t.user_id];
      const name = p ? (p.nom||'') + ' ' + (p.nom_famille||'') : 'Joueur';
      const builtin = PREPA_TESTS.filter(pt => t[pt.key]).map(pt =>
        pt.isBronco ? pt.icon + ' ' + broncoFormat(t[pt.key]) : pt.icon + ' ' + t[pt.key] + pt.unit
      );
      const customs = customByDatePlayer[date + '|' + t.user_id] || [];
      const results = [...builtin, ...customs].join('  ');
      return '<div style="font-size:12px;padding:4px 0;border-top:1px solid #F5EEE8">' +
        '<strong>' + name + '</strong> — ' + (results || 'Aucun résultat') + '</div>';
    }).join('') +
    '</div>'
  ).join('');
}

async function submitPrepaSession(){
  const team = getPrepaTeam();
  const titre = document.getElementById('ps-titre')?.value.trim();
  const date = document.getElementById('ps-date')?.value;
  let description = document.getElementById('ps-description')?.value || '';

  if(!titre || !date){ showToast('Titre et date obligatoires', 'error'); return; }
  if(!_prepaTargetSelection.length){ showToast('Sélectionne au moins un destinataire', 'error'); return; }

  let pdf_url = null;
  let exercices = null;

  if(_prepaSessionFormat === 'pdf'){
    const fileInput = document.getElementById('ps-pdf-file');
    const file = fileInput?.files[0];
    if(file){
      const path = `${currentUser.id}/${Date.now()}_${file.name}`;
      const {error: uploadError} = await sb.storage.from('session_pdfs').upload(path, file);
      if(uploadError){ showToast('Erreur upload PDF : '+uploadError.message, 'error'); return; }
      const {data} = sb.storage.from('session_pdfs').getPublicUrl(path);
      pdf_url = data.publicUrl;
    }
  } else if(_prepaSessionFormat === 'course'){
    const format = document.getElementById('ps-course-format')?.value || '';
    const reps = document.getElementById('ps-course-reps')?.value || '';
    const intensite = document.getElementById('ps-course-intensite')?.value || '';
    const desc = document.getElementById('ps-description')?.value || '';
    const parts = [format && '🏃 '+format, reps, intensite, desc].filter(Boolean);
    description = parts.join(' — ');
    type = 'course';
  } else if(_prepaSessionFormat === 'exercices'){
    const exLabels = Object.keys(_prepaExercices);
    if(!exLabels.length){ showToast('Ajoute au moins un exercice', 'error'); return; }
    exercices = _prepaExercices;
    // Génère une description lisible à partir des exercices structurés,
    // pour que ça s'affiche proprement même côté joueur sans UI dédiée
    const lignes = exLabels.map(label => {
      const ex = _prepaExercices[label];
      const parts = [];
      if(ex.series) parts.push(`${ex.series} séries`);
      if(ex.reps) parts.push(`${ex.reps} reps`);
      if(ex.charge) parts.push(`charge: ${ex.charge}`);
      if(ex.recup) parts.push(`récup: ${ex.recup}`);
      return `• ${label}${parts.length ? ' — ' + parts.join(', ') : ''}`;
    });
    description = lignes.join('\n') + (description ? '\n\n' + description : '');
  }

  const row = {
    team_id: team.id, created_by: currentUser.id, type: 'muscu', titre, description, date,
    pdf_url, exercices, target_type: _prepaTargetType, target_ids: _prepaTargetSelection
  };
  const {data, error} = await sb.from('proposed_sessions').insert(row).select().single();
  if(error){ showToast('Erreur envoi séance : '+error.message, 'error'); return; }

  closeModal(); render();
  showToast('Séance envoyée !', 'success');
  // Notification push — uniquement aux joueurs concernés par la séance
  notifyProposedSessionTargets(team, _prepaTargetType, _prepaTargetSelection,
    '💪 ' + (team.name||'Rugby Perf'), 'Nouvelle séance du préparateur : ' + titre + ' — ' + fmtFull(date));
}

// Résout les destinataires d'une séance proposée (joueurs précis ou par poste)
// et leur envoie la notification. Sélection vide = toute l'équipe.
async function notifyProposedSessionTargets(team, targetType, targetIds, title, message){
  try {
    if(!targetIds?.length){ sendPushToTeam(team.id, title, message); return; }
    let ids = [];
    if(targetType === 'joueurs'){
      ids = targetIds;
    } else if(targetType === 'postes'){
      const {data: members} = await sb.from('team_members').select('user_id').eq('team_id', team.id).eq('role', 'joueur');
      const memberIds = (members||[]).map(m => m.user_id);
      if(memberIds.length){
        const {data: profiles} = await sb.from('profiles').select('id, poste').in('id', memberIds);
        ids = (profiles||[]).filter(p => targetIds.includes(p.poste)).map(p => p.id);
      }
    }
    ids = [...new Set(ids)].filter(id => id && id !== currentUser.id);
    if(ids.length) sendPushToTeam(team.id, title, message, ids);
  } catch(e){ console.log('Push notification failed:', e); }
}

// ── PROFIL ATHLÈTE ────────────────────────────────────────────────────────
function broncoFormat(secs){
  if(!secs) return '—';
  const m = Math.floor(secs/60);
  const s = secs%60;
  return `${m}'${String(s).padStart(2,'0')}"`;
}

function broncoLevel(secs){
  if(!secs) return null;
  if(secs <= 270) return {label:'Élite', color:'#7B2D8B'};
  if(secs <= 330) return {label:'Très bon', color:'#1A8C6E'};
  if(secs <= 360) return {label:'Bon', color:'#2E86AB'};
  if(secs <= 420) return {label:'Correct', color:'#D4841A'};
  return {label:'À travailler', color:'#C0392B'};
}

function renderAthlete(){
  // Fusionner tous les tests pour avoir la dernière valeur connue pour chaque champ
  // (le prépa peut saisir Bronco sans renseigner squat/bench — on garde les anciennes valeurs)
  const lastTest = {};
  const TEST_FIELDS = ['bronco_temps','squat_max','bench_max','deadlift_max'];
  TEST_FIELDS.forEach(field => {
    const testWithValue = athleteTests.find(t => t[field] != null && t[field] !== '');
    if(testWithValue) lastTest[field] = testWithValue[field];
    if(testWithValue) lastTest.date = lastTest.date || testWithValue.date;
  });
  const broncoLvl = broncoLevel(lastTest.bronco_temps);

  // Analyse de la difficulté perçue sur les dernières séances
  const recentDiffSessions = sessions
    .filter(s => s.difficulte && ['muscu','terrain'].includes(s.type))
    .sort((a,b)=>b.date.localeCompare(a.date))
    .slice(0,4);
  let diffAlert = null;
  if(recentDiffSessions.length >= 3){
    const tooEasy = recentDiffSessions.filter(s=>s.difficulte===1).length;
    const tooHard = recentDiffSessions.filter(s=>s.difficulte===3).length;
    if(tooEasy >= 3) diffAlert = {type:'easy', msg:'Tes dernières séances te semblent trop faciles — pense à augmenter tes charges de 5 à 10% lors des prochaines séances !', color:'#2E86AB', icon:'📈'};

const GOAL_LABELS = {
  bronco: {label:'Bronco', icon:'🏃', unit:'', format: broncoFormat, lower_is_better:true},
  squat: {label:'Squat', icon:'🏋️', unit:'kg', format: v=>v+'kg', lower_is_better:false},
  bench: {label:'Développé couché', icon:'💪', unit:'kg', format: v=>v+'kg', lower_is_better:false},
  deadlift: {label:'Soulevé de terre', icon:'⚡', unit:'kg', format: v=>v+'kg', lower_is_better:false}
};

const GOAL_TO_FIELD = {bronco:'bronco_temps', squat:'squat_max', bench:'bench_max', deadlift:'deadlift_max'};

// Taux de progression réalistes (par mois) et bornes physiologiques absolues
const REALISTIC_RATES = {
  squat:    { perMonth: 4,   absoluteMin: null, absoluteMax: null, label: 'kg/mois' },
  bench:    { perMonth: 2.5, absoluteMin: null, absoluteMax: null, label: 'kg/mois' },
  deadlift: { perMonth: 4,   absoluteMin: null, absoluteMax: null, label: 'kg/mois' },
  bronco:   { perMonth: 8,   absoluteMin: 248,  absoluteMax: null, label: 'sec/mois' } // record du monde ~4'10 = 250sec, donc 248s = borne dure
};

function assessGoalRealism(test_type, start, target, months){
  const rate = REALISTIC_RATES[test_type];
  const meta = GOAL_LABELS[test_type];
  const delta = meta.lower_is_better ? (start - target) : (target - start);

  // Borne physiologique absolue (le Bronco ne peut pas descendre sous le record du monde)
  if(rate.absoluteMin && target < rate.absoluteMin){
    return {realistic:false, severity:'impossible', requiredRate: null,
      message: `Objectif physiquement hors de portée — le record du monde du Bronco est d'environ 4'10" (250s). Vise un temps plus haut.`};
  }

  if(delta <= 0) return {realistic:true, severity:'ok', requiredRate: 0, message: null};

  const requiredRate = delta / Math.max(0.5, months);
  const ratio = requiredRate / rate.perMonth;

  if(ratio > 2.5){
    return {realistic:false, severity:'impossible',
      requiredRate: Math.round(requiredRate*10)/10,
      message: `Objectif quasi impossible dans ce délai — il faudrait progresser de ${Math.round(requiredRate*10)/10} ${rate.label}, alors qu'un rythme réaliste est plutôt de ${rate.perMonth} ${rate.label}.`};
  } else if(ratio > 1.4){
    return {realistic:false, severity:'ambitious',
      requiredRate: Math.round(requiredRate*10)/10,
      message: `Objectif très ambitieux — rythme nécessaire : ${Math.round(requiredRate*10)/10} ${rate.label} (rythme réaliste habituel : ${rate.perMonth} ${rate.label}). C'est jouable avec une grosse régularité, mais reste prudent.`};
  }
  return {realistic:true, severity:'ok', requiredRate: Math.round(requiredRate*10)/10, message: null};
}

function computeGoalProgress(goal){
  const field = GOAL_TO_FIELD[goal.test_type];
  const meta = GOAL_LABELS[goal.test_type];
  const history = athleteTests.filter(t => t[field]).sort((a,b)=>a.date.localeCompare(b.date));
  if(!history.length) return {progress:0, probability:0, current:null, trend:0, realism:null};

  const current = history[history.length-1][field];
  const start = history[0][field];
  const target = goal.target_value;

  // Progression en %
  let progress;
  if(meta.lower_is_better){
    progress = start === target ? 100 : Math.max(0, Math.min(100, ((start-current)/(start-target))*100));
  } else {
    progress = start === target ? 100 : Math.max(0, Math.min(100, ((current-start)/(target-start))*100));
  }

  let trend = 0;
  if(history.length >= 2){
    const last = history[history.length-1][field];
    const prev = history[history.length-2][field];
    trend = meta.lower_is_better ? (prev-last) : (last-prev);
  }

  const daysTotal = Math.max(1, (new Date(goal.deadline) - new Date(history[0].date)) / 86400000);
  const daysElapsed = Math.max(1, (new Date() - new Date(history[0].date)) / 86400000);
  const daysLeft = Math.max(0, (new Date(goal.deadline) - new Date()) / 86400000);
  const timeRatio = daysElapsed / daysTotal;
  const monthsTotal = daysTotal / 30;

  const recentSessions = sessions.filter(s => {
    const d = new Date(s.date);
    return (new Date() - d) <= 30*86400000 && d <= new Date();
  }).length;
  const regularityScore = Math.min(1, recentSessions / 8);

  // Évaluation du réalisme de l'objectif (basé sur point de départ initial, pas le current)
  const realism = assessGoalRealism(goal.test_type, start, target, monthsTotal);

  let probability;
  if(progress >= 100){
    probability = 100;
  } else if(!realism.realistic && realism.severity === 'impossible'){
    // Plafond dur : un objectif physiologiquement ou statistiquement hors d'atteinte ne dépasse jamais 20%
    probability = Math.min(20, Math.round(progress * 0.3));
  } else if(daysLeft <= 0){
    probability = progress >= 90 ? 60 : 15;
  } else {
    const expectedProgress = timeRatio * 100;
    const progressRatio = expectedProgress > 0 ? progress / expectedProgress : 1;
    let raw = (progressRatio * 50) + (regularityScore * 30) + (progress * 0.2);
    // Plafond modéré pour les objectifs "ambitieux" mais pas impossibles
    if(!realism.realistic && realism.severity === 'ambitious'){
      raw = Math.min(raw, 55);
    }
    probability = Math.round(Math.min(95, Math.max(5, raw)));
  }

  return {progress: Math.round(progress), probability: Math.round(probability), current, trend, realism};
}

function renderGoalCard(goal){
  const meta = GOAL_LABELS[goal.test_type];
  const {progress, probability, current, trend, realism} = computeGoalProgress(goal);
  const daysLeft = Math.ceil((new Date(goal.deadline) - new Date()) / 86400000);
  const probColor = probability >= 70 ? '#1A8C6E' : probability >= 40 ? '#D4841A' : '#C0392B';

  return `<div class="card" style="border-color:${probColor}33">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:14px;font-weight:800">${meta.icon} ${meta.label} → ${meta.format(goal.target_value)}</div>
      <button onclick="deleteGoal(${goal.id})" style="background:none;border:none;color:#9A7A70;font-size:16px">🗑️</button>
    </div>
    <div style="font-size:11px;color:#9A7A70;margin-bottom:10px">${daysLeft > 0 ? `Échéance dans ${daysLeft} jours (${fmt(goal.deadline)})` : 'Échéance dépassée'} ${current!==null?` · Actuel : ${meta.format(current)}`:''}</div>
    ${realism && !realism.realistic ? `<div style="background:${realism.severity==='impossible'?'#C0392B12':'#D4841A12'};border:1px solid ${realism.severity==='impossible'?'#C0392B33':'#D4841A33'};border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:11px;color:${realism.severity==='impossible'?'#C0392B':'#D4841A'};line-height:1.4">${realism.severity==='impossible'?'🚫':'⚠️'} ${realism.message}</div>` : ''}
    <div class="bar-track" style="margin-bottom:10px"><div class="bar-fill" style="width:${progress}%;background:${probColor}"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:12px;color:#9A7A70">Progression : <b style="color:#1A0A0A">${progress}%</b></div>
      <div style="font-size:13px;font-weight:800;color:${probColor}">${probability}% de réussite</div>
    </div>
  </div>`;
}

async function saveGoal(){
  const test_type = document.getElementById('g-type').value;
  let target_value;
  if(test_type === 'bronco'){
    const min = parseInt(document.getElementById('g-target-min').value) || 0;
    const sec = parseInt(document.getElementById('g-target-sec').value) || 0;
    target_value = (min || sec) ? (min*60+sec) : null;
  } else {
    target_value = parseFloat(document.getElementById('g-target-kg').value) || null;
  }
  const deadline = document.getElementById('g-deadline').value;

  if(!target_value || !deadline){ alert('Remplis tous les champs !'); return; }

  // Vérifier le réalisme avant sauvegarde
  const field = GOAL_TO_FIELD[test_type];
  const history = athleteTests.filter(t => t[field]).sort((a,b)=>a.date.localeCompare(b.date));
  const startVal = history.length ? history[0][field] : null;

  if(startVal !== null){
    const months = Math.max(0.5, (new Date(deadline) - new Date()) / 86400000 / 30);
    const realism = assessGoalRealism(test_type, startVal, target_value, months);
    if(!realism.realistic){
      const proceed = confirm((realism.severity==='impossible' ? '🚫 ' : '⚠️ ') + realism.message + '\n\nVeux-tu quand même créer cet objectif ?');
      if(!proceed) return;
    }
  }

  const row = {user_id: currentUser.id, test_type, target_value, deadline};
  const {data} = await sb.from('athlete_goals').insert(row).select().single();
  if(data){
    athleteGoals = [...athleteGoals, data].sort((a,b)=>a.deadline.localeCompare(b.deadline));
    closeModal();
    render();
  }
}

async function deleteGoal(id){
  if(confirm('Supprimer cet objectif ?')){
    await sb.from('athlete_goals').delete().eq('id', id);
    athleteGoals = athleteGoals.filter(g=>g.id!=id);
    render();
  }
}

function getTodayReminders(){
  const dismissed = getDismissedNotifs();
  const reminders = [];
  // Couvre aujourd'hui + les 2 jours précédents (3 jours max)
  const last3Days = [0,1,2].map(o => addDays(today(), -o));

  last3Days.forEach(dateStr => {
    const isToday = dateStr === today();
    const dayLabel = isToday ? "aujourd'hui" : diffDays(dateStr, today())===1 ? "hier" : "avant-hier";
    const formeKey = 'forme_' + dateStr;
    const seanceKey = 'seance_' + dateStr;

    // Forme du jour incomplète
    if(!dismissed.includes(formeKey)){
      const dayForme = (formeLog||[]).find(f => f.date === dateStr);
      const fields = ['sommeil','alimentation','courbatures','fatigue'];
      const missing = !dayForme || fields.filter(f => !dayForme[f]).length > 0;
      const eauMissing = !dayForme || !dayForme.eau;
      if(missing || eauMissing){
        reminders.push({
          key: formeKey,
          icon: '❤️',
          title: `Bilan forme ${isToday ? "du jour" : "du " + fmt(dateStr)}`,
          desc: eauMissing && missing ? `Rien renseigné ${dayLabel}` : 'Quelques infos à compléter',
          color: '#7B2D8B',
          targetDate: dateStr,
          type: 'forme'
        });
      }
    }

    // Séance du jour manquante
    if(!dismissed.includes(seanceKey)){
      const daySessions = sessions.filter(s => s.date === dateStr);
      if(!daySessions.length){
        reminders.push({
          key: seanceKey,
          icon: '🏉',
          title: `Pas de séance ${isToday ? "aujourd'hui" : "le " + fmt(dateStr)}`,
          desc: `Ajoute ta séance ${dayLabel} si tu as entraîné`,
          color: '#8B1A1A',
          targetDate: dateStr,
          type: 'seance'
        });
      }
    }
  });

  return reminders;
}

function openReminderTarget(type, dateStr){
  if(type === 'seance'){

async function loadIncomingProposedSessions(){
  if(!currentUser) return;
  const {data, error} = await sb.from('proposed_sessions').select('*').gte('date', addDays(today(),-7));
  if(error){ incomingProposedSessions = []; return; }
  // Filtrer celles déjà répondues (acceptées ou ignorées)
  const {data: responses} = await sb.from('proposed_session_responses').select('proposed_session_id, status').eq('user_id', currentUser.id);
  const respondedIds = (responses||[]).map(r => r.proposed_session_id);
  incomingProposedSessions = (data||[]).filter(s => !respondedIds.includes(s.id));
}

async function acceptProposedSession(id){
  const sess = incomingProposedSessions.find(s => s.id === id);
  if(!sess) return;
  // Convertir les exercices structurés du prépa (charge/reps/recup suggérées)
  // vers le format muscuSets attendu par le formulaire de modification du joueur,
  // pour que les charges soient directement éditables et pas juste du texte figé.
  let muscuSets = [];
  if(sess.exercices && typeof sess.exercices === 'object'){
    muscuSets = Object.entries(sess.exercices).map(([exLabel, ex]) => {
      const exObj = getAllExercises().find(e => e.label === exLabel);
      const nbSets = parseInt(ex.series) || 1;
      const sets = Array.from({length: nbSets}, () => ({kg: ex.charge || '', reps: ex.reps || ''}));
      return {exId: exObj?.id || exLabel, exLabel, sets};
    });
  }
  // Créer une vraie séance dans le suivi personnel du joueur
  const session = {
    id: Date.now(), type: sess.type, date: sess.date, heure: '', duree: sess.duree||0,
    ressenti: 2, source: 'club', notes: sess.description||'', focus: sess.titre,
    muscuSets: muscuSets.length ? muscuSets : undefined,
    pdf_url: sess.pdf_url || undefined
  };
  const newId = await saveSession(session);
  if(newId) session.id = newId;
  sessions = [...sessions, session];
  await sb.from('proposed_session_responses').insert({proposed_session_id: id, user_id: currentUser.id, status: 'accepted', linked_session_id: session.id, responded_at: new Date().toISOString()});
  incomingProposedSessions = incomingProposedSessions.filter(s => s.id !== id);
  render();
  showToast('Séance ajoutée à ton agenda !', 'success');
  // Prévenir le membre du staff qui a envoyé la séance
  if(sess.created_by && sess.created_by !== currentUser.id && sess.team_id){
    sendPushToTeam(sess.team_id, '✅ Séance acceptée', userName() + ' a accepté ta séance « ' + (sess.titre||'') + ' »', sess.created_by);
  }
}

async function ignoreProposedSession(id){
  await sb.from('proposed_session_responses').insert({proposed_session_id: id, user_id: currentUser.id, status: 'ignored', responded_at: new Date().toISOString()});
  incomingProposedSessions = incomingProposedSessions.filter(s => s.id !== id);
  render();
}

async function createTeam(){
  const name = document.getElementById('new-team-name')?.value.trim();
  if(!name){ showToast('Donne un nom à ton équipe !', 'error'); return; }
  const {data, error} = await sb.from('teams').insert({name, created_by: currentUser.id}).select().single();
  if(error){ showToast('Erreur création équipe : '+error.message, 'error'); return; }
  // Le créateur rejoint automatiquement comme manager
  await sb.from('team_members').insert({team_id: data.id, user_id: currentUser.id, role: 'manager'});
  myTeams = [...myTeams, {...data, myRole: 'manager'}];
  activeTeamId = data.id;
  // Générer les 4 liens d'invitation
  for(const role of Object.keys(TEAM_ROLES)){
    const code = generateInviteCode();
    await sb.from('team_invites').insert({team_id: data.id, role, invite_code: code});
  }
  render();
  showToast('Équipe créée !', 'success');
  loadTeamInvites(data.id);
}

function setActiveTeam(teamId){
  activeTeamId = teamId;
  render();
  const team = myTeams.find(t => t.id === teamId);
  if(team && (team.created_by === currentUser?.id || team.myRole === 'manager')){
    loadTeamInvites(teamId);
  }
}

async function loadTeamInvites(teamId){
  const {data, error} = await sb.from('team_invites').select('*').eq('team_id', teamId);
  const container = document.getElementById('team-invites-list');
  if(!container) return;
  if(error || !data?.length){
    container.innerHTML = '<div style="color:#C0392B;font-size:12px">Impossible de charger les invitations.</div>';
    return;
  }
  // Créer les invitations manquantes (ex: rôle Entraîneur ajouté après la création de l'équipe)
  for(const roleKey of Object.keys(TEAM_ROLES)){
    if(!data.find(i => i.role === roleKey)){
      const code = generateInviteCode();
      const {data: created} = await sb.from('team_invites').insert({team_id: teamId, role: roleKey, invite_code: code}).select().single();
      if(created) data.push(created);
    }
  }
  const baseUrl = window.location.origin + window.location.pathname;
  let html = '';
  Object.entries(TEAM_ROLES).forEach(([roleKey, roleInfo]) => {
    const invite = data.find(i => i.role === roleKey);
    if(!invite) return;
    const link = `${baseUrl}?join=${invite.invite_code}`;
    html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid #E8D8D0">
      <span style="font-size:18px">${roleInfo.icon}</span>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700;color:${roleInfo.color}">${roleInfo.label}</div>
      </div>
      <button onclick="copyInviteLink('${link}')" style="background:#F5EEE8;border:1px solid #E8D8D0;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;color:#1A0A0A">📋 Copier</button>
    </div>`;
  });
  container.innerHTML = html;
}

function copyInviteLink(link){
  navigator.clipboard?.writeText(link).then(()=>{
    showToast('Lien copié !', 'success');
  }).catch(()=>{
    showToast('Impossible de copier — copie le manuellement', 'error');
  });
}

function submitJoinCode(){
  const raw = document.getElementById('join-code-input')?.value.trim();
  if(!raw){ showToast('Colle un code ou un lien d\'invitation', 'error'); return; }
  // Accepte soit un code brut, soit un lien complet (?join=xxxxx) — on extrait
  // le code dans les deux cas pour ne pas obliger la personne à le faire elle-même
  let code = raw;
  try {
    const url = new URL(raw);
    const param = url.searchParams.get('join');
    if(param) code = param;
  } catch(e) {
    // Pas une URL valide, on garde "raw" tel quel — c'est probablement déjà juste le code
  }
  joinTeamViaCode(code);
}

async function joinTeamViaCode(code){
  const {data: invite, error} = await sb.from('team_invites').select('*, teams(name)').eq('invite_code', code).single();
  if(error || !invite){ showToast('Lien d\'invitation invalide ou expiré', 'error'); return; }
  // On vérifie si l'utilisateur a déjà PRÉCISÉMENT ce rôle dans cette équipe,
  // pas juste s'il en fait partie — un même compte peut cumuler plusieurs rôles
  const alreadyHasThisRole = myTeams.some(t => t.id === invite.team_id && t.myRole === invite.role);
  if(alreadyHasThisRole){ showToast(`Tu as déjà le rôle ${TEAM_ROLES[invite.role]?.label} sur cette équipe`, 'error'); return; }
  const {error: joinError} = await sb.from('team_members').insert({team_id: invite.team_id, user_id: currentUser.id, role: invite.role});
  if(joinError){ showToast('Erreur en rejoignant l\'équipe : '+joinError.message, 'error'); return; }
  const {data: teamData} = await sb.from('teams').select('*').eq('id', invite.team_id).single();
  if(teamData){
    myTeams = [...myTeams, {...teamData, myRole: invite.role}];
    activeTeamId = teamData.id;
  }
  showToast(`Tu as rejoint "${teamData?.name}" comme ${TEAM_ROLES[invite.role]?.label}`, 'success');
  // Taguer le joueur dans OneSignal avec l'ID de son équipe
  try {
    if(window.OneSignal) {
      await OneSignal.login(String(currentUser.id));
      await OneSignal.User.addTag('team_id', String(invite.team_id));
      await OneSignal.User.addTag('role', invite.role);
    }
  } catch(e) {}
  setView('equipe');
}

function collectReportStats(){
  const v = id => { const n = parseFloat(document.getElementById(id)?.value); return isNaN(n) ? null : n; };
  const melee = {nous_total:v('rpt-mel-nt'), nous_gagnees:v('rpt-mel-ng'), nous_refaites:v('rpt-mel-nr'), adv_total:v('rpt-mel-at'), adv_recup:v('rpt-mel-ar')};
  const touche = {off_total:v('rpt-tou-ot'), off_gagnees:v('rpt-tou-og'), def_total:v('rpt-tou-dt'), def_recup:v('rpt-tou-dr')};
  const hasMelee = Object.values(melee).some(x=>x!==null);
  const hasTouche = Object.values(touche).some(x=>x!==null);
  if(!hasMelee && !hasTouche) return null;
  const stats = {};
  if(hasMelee) stats.melee = melee;
  if(hasTouche) stats.touche = touche;
  return stats;
}

async function publishMatchReport(){
  const team = getReportTeam();
  if(!team) return;
  const title = document.getElementById('rpt-title')?.value.trim();
  const content = document.getElementById('rpt-content')?.value.trim();
  if(!title){ showToast('Donne un titre au rapport', 'error'); return; }
  if(!content && !collectReportStats()){ showToast('Écris une analyse ou remplis des stats', 'error'); return; }
  const report = {
    team_id: team.id,
    created_by: currentUser.id,
    author_name: userName(),
    title, content,
    stats: collectReportStats()
  };
  const {error} = await sb.from('match_reports').insert(report);
  if(error){ showToast('Erreur : '+error.message, 'error'); return; }
  showToast('Rapport publié à toute l\'équipe !', 'success');
  // Notification push aux joueurs
  sendPushToTeam(team.id, '📊 ' + (team.name||'Rugby Perf'), 'Nouveau rapport : ' + title);
  ['rpt-title','rpt-content','rpt-mel-nt','rpt-mel-ng','rpt-mel-nr','rpt-mel-at','rpt-mel-ar','rpt-tou-ot','rpt-tou-og','rpt-tou-dt','rpt-tou-dr'].forEach(id=>{
    const el = document.getElementById(id); if(el) el.value='';
  });
  loadTeamReports(team.id);
}

async function deleteMatchReport(id){

  const active = myInjuries.filter(i => i.statut !== 'gueri');
  const past = myInjuries.filter(i => i.statut === 'gueri');

  if(active.length){
    active.forEach(inj => { html += renderInjuryCard(inj); });
  } else {
    html += `<div class="card" style="text-align:center;padding:20px;color:#9A7A70;font-size:13px">Aucune blessure en cours, tant mieux ! 💪</div>`;
  }

  html += `<button onclick="openInjuryModal()" style="width:100%;background:#F5EEE8;border:2px dashed #C0185A44;border-radius:10px;padding:12px;color:#C0185A;font-weight:700;font-size:13px;margin-top:4px">➕ Déclarer une blessure</button>`;

  if(past.length){
    html += `<div class="sec-title" style="margin-top:16px">Historique</div>`;
    past.forEach(inj => { html += renderInjuryCard(inj); });
  }

  return html;
}

function renderInjuryCard(inj){
  const grav = GRAVITE_INFO[inj.gravite];
  const stat = STATUT_INFO[inj.statut];
  return `<div class="card" onclick="openInjuryModal(${inj.id})" style="cursor:pointer;border-color:${stat.color}33">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:14px;font-weight:800">${grav.icon} ${inj.type}</div>
      <span style="font-size:10px;font-weight:800;background:${stat.color}18;color:${stat.color};border-radius:20px;padding:3px 10px">${stat.label}</span>
    </div>
    <div style="font-size:11px;color:#9A7A70;margin-top:4px">Depuis le ${fmt(inj.date_debut)}${inj.duree_estimee_jours?` · ~${inj.duree_estimee_jours}j d'indispo estimée`:''}</div>
    ${inj.notes?`<div style="font-size:11px;color:#9A7A70;margin-top:4px;font-style:italic">${inj.notes}</div>`:''}
  </div>`;
}

// Silhouette cliquable (vue face + vue dos, convention miroir : gauche à l'écran = ton côté gauche)
function renderBodyMap(){
  const z = (shape, label, attrs) => {
    const common = 'class="bz" data-z="' + label + '" onclick="selectBodyZone(this)" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" style="cursor:pointer"';
    return shape === 'e'
      ? '<ellipse cx="'+attrs[0]+'" cy="'+attrs[1]+'" rx="'+attrs[2]+'" ry="'+attrs[3]+'" '+common+'/>'
      : '<rect x="'+attrs[0]+'" y="'+attrs[1]+'" width="'+attrs[2]+'" height="'+attrs[3]+'" rx="5" '+common+'/>';
  };
  // FACE (autour de x=75) puis DOS (autour de x=225)
  const zones =
    z('e','Tête',[75,24,12,13]) +
    z('e','Épaule gauche',[54,48,10,7]) + z('e','Épaule droite',[96,48,10,7]) +
    z('r','Pectoraux / Côtes',[59,54,32,26]) +
    z('r','Abdominaux',[61,82,28,22]) +
    z('e','Biceps gauche',[45,72,7,13]) + z('e','Biceps droit',[105,72,7,13]) +
    z('e','Avant-bras gauche',[40,100,6,13]) + z('e','Avant-bras droit',[110,100,6,13]) +
    z('e','Poignet / Main gauche',[37,124,6,9]) + z('e','Poignet / Main droite',[113,124,6,9]) +
    z('e','Hanche / Adducteur gauche',[65,112,9,8]) + z('e','Hanche / Adducteur droit',[85,112,9,8]) +
    z('e','Quadriceps gauche',[64,142,9,18]) + z('e','Quadriceps droit',[86,142,9,18]) +
    z('e','Genou gauche',[64,169,7,8]) + z('e','Genou droit',[86,169,7,8]) +
    z('e','Tibia gauche',[64,194,6,14]) + z('e','Tibia droit',[86,194,6,14]) +
    z('e','Cheville gauche',[64,217,6,6]) + z('e','Cheville droite',[86,217,6,6]) +
    z('e','Pied gauche',[62,230,8,5]) + z('e','Pied droit',[88,230,8,5]) +
    z('e','Tête (arrière)',[225,20,10,11]) +
    z('e','Nuque / Cervicales',[225,38,8,6]) +
    z('r','Dos / Trapèzes',[209,47,32,28]) +
    z('r','Lombaires',[211,77,28,18]) +
    z('r','Fessiers',[210,97,30,16]) +
    z('e','Ischio gauche',[214,135,9,17]) + z('e','Ischio droit',[236,135,9,17]) +
    z('e','Mollet gauche',[214,187,7,15]) + z('e','Mollet droit',[236,187,7,15]) +
    z('e','Tendon d\'Achille gauche',[214,214,5,7]) + z('e','Tendon d\'Achille droit',[236,214,5,7]);
  return '<div style="background:#22303C;border-radius:12px;padding:8px 4px;margin-bottom:10px">' +
    '<div style="font-size:10px;color:#9AB0C0;text-align:center;margin-bottom:4px">👆 Touche la zone douloureuse (comme dans un miroir)</div>' +
    '<svg width="100%" viewBox="0 0 300 242">' +
    '<text x="75" y="10" fill="#9AB0C0" font-size="9" text-anchor="middle" font-weight="bold">FACE</text>' +
    '<text x="225" y="10" fill="#9AB0C0" font-size="9" text-anchor="middle" font-weight="bold">DOS</text>' +
    zones +
    '</svg></div>';
}

function selectBodyZone(el){
  document.querySelectorAll('.bz').forEach(b => { b.setAttribute('fill','rgba(255,255,255,0.25)'); b.setAttribute('stroke','rgba(255,255,255,0.4)'); });
  el.setAttribute('fill','#FFD700');
  el.setAttribute('stroke','#FFD700');
  const input = document.getElementById('inj-type');
  if(input) input.value = el.getAttribute('data-z');
}

    <div class="auth-field"><label>Zone / type de blessure</label><input class="auth-input input" id="inj-type" placeholder="Touche la silhouette ou écris ici" value="${inj?.type||''}"/></div>
    <div class="auth-field"><label>Gravité</label>
      <select class="auth-input input" id="inj-gravite">
        ${Object.entries(GRAVITE_INFO).map(([k,v])=>`<option value="${k}" ${inj?.gravite===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
      </select>
    </div>
    <div class="auth-field"><label>Date de début</label><input class="auth-input input" type="date" id="inj-date" value="${inj?.date_debut||today()}"/></div>
    <div class="auth-field"><label>Durée d'indisponibilité estimée (jours)</label><input class="auth-input input" type="number" id="inj-duree" value="${inj?.duree_estimee_jours||''}"/></div>

      <select class="auth-input input" id="inj-statut">

      </select>
    </div>
    <div class="auth-field"><label>📷 Photo pour le staff médical (optionnel)</label><input class="auth-input input" type="file" id="inj-photo" accept="image/*"/></div>
    <div class="auth-field"><label>Notes</label><textarea class="auth-input input" id="inj-notes" rows="2">${inj?.notes||''}</textarea></div>
    <button class="btn-save" onclick="saveInjury(${id||'null'})" style="background:#C0185A;color:#fff">ENREGISTRER</button>
    ${inj?`<button onclick="deleteInjury(${id})" style="width:100%;background:none;border:none;color:#C0392B;font-size:13px;padding:10px;margin-top:4px">🗑️ Supprimer</button>`:''}`;

async function saveInjury(id){
  const type = document.getElementById('inj-type')?.value.trim();
  const gravite = document.getElementById('inj-gravite')?.value;
  const date_debut = document.getElementById('inj-date')?.value;
  const duree_estimee_jours = parseInt(document.getElementById('inj-duree')?.value) || null;
  const statut = document.getElementById('inj-statut')?.value;
  const notes = document.getElementById('inj-notes')?.value || '';

  if(!type || !date_debut){ showToast('Renseigne au moins le type et la date', 'error'); return; }

  const row = {user_id: currentUser.id, type, gravite, date_debut, duree_estimee_jours, statut, notes};
  if(statut === 'gueri') row.date_fin = today();

  const photoFile = document.getElementById('inj-photo')?.files?.[0];
  let injuryId = id;

  if(id){
    const {error} = await sb.from('injuries').update(row).eq('id', id);
    if(error){ showToast('Erreur : '+error.message, 'error'); return; }
    myInjuries = myInjuries.map(i => i.id===id ? {...i, ...row} : i);
  } else {
    const {data, error} = await sb.from('injuries').insert(row).select().single();
    if(error){ showToast('Erreur : '+error.message, 'error'); return; }
    myInjuries = [data, ...myInjuries];
    injuryId = data?.id;
    // Prévenir le staff médical (médical + manager) des équipes du joueur
    myTeams.filter(t => t.myRole === 'joueur').forEach(async t => {
      try {
        const {data: staff} = await sb.from('team_members').select('user_id').eq('team_id', t.id).in('role', ['kine','manager']);
        const ids = [...new Set((staff||[]).map(s => s.user_id))].filter(uid => uid !== currentUser.id);
        if(ids.length) sendPushToTeam(t.id, '🩹 ' + t.name, userName() + ' a déclaré une blessure : ' + type + (gravite ? ' (' + gravite + ')' : '') + (photoFile ? ' 📷 photo jointe' : ''), ids);
      } catch(e){}
    });
  }

  // Photo jointe → dossier médical partagé
  if(photoFile){
    try {
      const path = currentUser.id + '/' + Date.now() + '_' + photoFile.name;
      const {error: upErr} = await sb.storage.from('medical').upload(path, photoFile);
      if(upErr){ showToast('Blessure OK mais photo non envoyée : '+upErr.message, 'error'); }
      else {
        const teamId = myTeams.find(t => t.myRole === 'joueur')?.id || null;
        await sb.from('medical_files').insert({team_id: teamId, player_id: currentUser.id, sender_id: currentUser.id, injury_id: injuryId, file_path: path, file_type: 'photo', note: '📷 ' + type});
      }
    } catch(e){}
  }

  closeModal(); render();
  showToast('Blessure enregistrée', 'success');
}

// ── DOSSIER MÉDICAL PARTAGÉ (photos / PDF entre joueur et staff médical) ─────
async function openMedicalFile(path){
  const {data, error} = await sb.storage.from('medical').createSignedUrl(path, 3600);
  if(error || !data?.signedUrl){ showToast('Impossible d\'ouvrir le document : ' + (error?.message||''), 'error'); return; }
  window.open(data.signedUrl, '_blank');
}

function medicalFileRow(f, senderLabel){
  return `<div class="card" style="display:flex;align-items:center;gap:10px;padding:12px">
    <span style="font-size:20px">${f.file_type==='pdf'?'📄':'📷'}</span>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700">${escHtml(f.note||'Document')}</div>
      <div style="font-size:11px;color:#9A7A70">${escHtml(senderLabel)} · ${fmt(f.created_at.split('T')[0])}</div>
    </div>
    <button onclick="openMedicalFile('${f.file_path.replace(/'/g,"\\'")}')" style="background:#C0185A18;border:1px solid #C0185A44;border-radius:8px;padding:7px 14px;color:#C0185A;font-size:12px;font-weight:700">Voir</button>
  </div>`;
}

// Section côté joueur (onglet Médical) — réservée aux joueurs rattachés à une
// équipe : sans équipe, il n'y a aucun staff médical pour recevoir les documents
function renderMedicalDocsSection(){
  if(!myTeams.some(t => t.myRole === 'joueur')) return '';
  setTimeout(loadMyMedicalFiles, 0);
  return `<div class="sec-title">📁 Mes documents médicaux</div>
  <button onclick="openSendMedicalDoc()" style="width:100%;background:#C0185A18;border:1px dashed #C0185A66;border-radius:10px;padding:11px;color:#C0185A;font-weight:700;font-size:13px;margin-bottom:10px">📷 Envoyer une photo / un document au médical</button>
  <div id="medical-docs-list" style="margin-bottom:14px">Chargement...</div>`;
}

async function loadMyMedicalFiles(){
  const container = document.getElementById('medical-docs-list');
  if(!container) return;
  const {data, error} = await sb.from('medical_files').select('*').eq('player_id', currentUser.id).order('created_at', {ascending:false}).limit(20);
  if(error){ container.innerHTML = '<div style="font-size:12px;color:#9A7A70;text-align:center;padding:8px">Documents indisponibles (SQL "dossier médical" à exécuter).</div>'; return; }
  if(!data?.length){ container.innerHTML = '<div style="font-size:12px;color:#9A7A70;text-align:center;padding:8px">Aucun document échangé pour l\'instant.</div>'; return; }
  container.innerHTML = data.map(f => medicalFileRow(f, f.sender_id === currentUser.id ? 'Moi' : '🩺 Staff médical')).join('');
}

// Modal d'envoi (utilisée par le joueur ET par le staff médical)
function openSendMedicalDoc(playerId, playerName, teamId){
  const toPlayer = !!playerId;
  const target = toPlayer ? `'${playerId}','${(playerName||'').replace(/'/g,"\\'")}',${teamId}` : 'null,null,null';
  const html = `<div class="modal-title">📎 ENVOYER UN DOCUMENT${toPlayer?' — '+playerName.toUpperCase():''}</div>
  <div style="font-size:11px;color:#9A7A70;margin-bottom:12px;line-height:1.5">${toPlayer?'Le joueur recevra une notification et retrouvera le document dans son onglet Médical.':'Ton staff médical recevra une notification. Photo de blessure, ordonnance, compte-rendu...'}</div>
  <div class="field"><label>Photo ou PDF</label><input class="input" type="file" id="md-file" accept="image/*,application/pdf"/></div>
  <div class="field"><label>Note (optionnel)</label><input class="input" id="md-note" placeholder="Ex: Photo du genou, ordonnance IRM..."/></div>
  <div style="display:flex;gap:8px">
    <button class="btn-save" onclick="submitMedicalDoc(${target})" style="background:#C0185A;color:#fff">ENVOYER</button>
    <button class="btn-cancel" onclick="closeModal()">Annuler</button>
  </div>`;
  openModal(html);
}

async function submitMedicalDoc(playerId, playerName, teamId){
  const file = document.getElementById('md-file')?.files?.[0];
  const note = document.getElementById('md-note')?.value.trim() || '';
  if(!file){ showToast('Choisis un fichier', 'error'); return; }
  const isPdf = file.type === 'application/pdf';
  const targetPlayer = playerId || currentUser.id;
  const tId = teamId || myTeams.find(t => t.myRole === 'joueur')?.id || myTeams[0]?.id || null;
  const path = targetPlayer + '/' + Date.now() + '_' + file.name;
  const {error: upErr} = await sb.storage.from('medical').upload(path, file);
  if(upErr){ showToast('Erreur envoi : ' + upErr.message, 'error'); return; }
  const {error} = await sb.from('medical_files').insert({team_id: tId, player_id: targetPlayer, sender_id: currentUser.id, file_path: path, file_type: isPdf ? 'pdf' : 'photo', note});
  if(error){ showToast('Erreur : ' + error.message, 'error'); return; }
  closeModal();
  showToast('Document envoyé ✅', 'success');
  if(playerId){
    // Staff médical → joueur
    sendPushToTeam(teamId, '🩺 Suivi médical', 'Le staff médical t\'a envoyé un document' + (note ? ' : ' + note : ''), playerId);
    loadKinePlayerFiles(playerId);
  } else {
    // Joueur → staff médical de ses équipes
    myTeams.filter(t => t.myRole === 'joueur').forEach(async t => {
      try {
        const {data: staff} = await sb.from('team_members').select('user_id').eq('team_id', t.id).eq('role', 'kine');
        const ids = [...new Set((staff||[]).map(s => s.user_id))];
        if(ids.length) sendPushToTeam(t.id, '🩺 ' + t.name, userName() + ' t\'a envoyé un document médical' + (note ? ' : ' + note : ''), ids);
      } catch(e){}
    });
    loadMyMedicalFiles();
  }
}

// Liste des documents dans la fiche joueur côté staff médical
async function loadKinePlayerFiles(playerId){
  const container = document.getElementById('kine-player-files');
  if(!container) return;
  const {data, error} = await sb.from('medical_files').select('*').eq('player_id', playerId).order('created_at', {ascending:false}).limit(20);
  if(error){ container.innerHTML = '<div style="font-size:12px;color:#9A7A70;text-align:center;padding:8px">Documents indisponibles (SQL "dossier médical" à exécuter).</div>'; return; }
  if(!data?.length){ container.innerHTML = '<div style="font-size:12px;color:#9A7A70;text-align:center;padding:8px">Aucun document.</div>'; return; }
  container.innerHTML = data.map(f => medicalFileRow(f, f.sender_id === playerId ? '🏉 Joueur' : '🩺 Staff médical')).join('');
}

async function deleteInjury(id){
  if(!confirm('Supprimer cette blessure ?')) return;
  const {error} = await sb.from('injuries').delete().eq('id', id);
  if(error){ showToast('Erreur suppression', 'error'); return; }
  myInjuries = myInjuries.filter(i => i.id !== id);
  closeModal(); render();
  showToast('Blessure supprimée', 'success');
}

let kineTeamPlayers = []; // joueurs de l'équipe ayant consenti, avec leurs données santé

function renderKineHome(){
  const kineTeams = myTeams.filter(t => t.myRole === 'kine');
  if(!kineTeams.length) return `<div class="card" style="text-align:center;padding:30px;color:#9A7A70">Aucune équipe associée.</div>`;
  const team = kineTeams[0];

  let html = `<div class="card">
    <div style="display:flex;align-items:center;gap:12px">

      <div>
        <div style="font-size:16px;font-weight:800">Espace Médical</div>
        <div style="font-size:12px;color:#9A7A70">${team.name}</div>
      </div>
    </div>
  </div>
  <div id="kine-stats-overview">Chargement des statistiques...</div>`;

async function loadKineOverviewStats(teamId){
  const container = document.getElementById('kine-stats-overview');
  if(!container) return;
  const {data: consentedProfiles, error} = await sb.from('profiles').select('id, nom, nom_famille').eq('kine_consent_team_id', teamId);
  if(error){ container.innerHTML = '<div style="color:#C0392B;font-size:12px">Erreur de chargement.</div>'; return; }
  if(!consentedProfiles?.length){
    container.innerHTML = '<div class="card" style="text-align:center;padding:20px;color:#9A7A70;font-size:13px">Aucun joueur n\'a encore activé le partage avec toi.</div>';
    return;
  }

  let totalActive = 0, totalSevere = 0, allInjuries = [];
  let painAlerts = []; // joueurs avec douleurs répétées signalées dans Forme, sans blessure forcément déclarée
  const sevenDaysAgo = addDays(today(), -7);
  for(const p of consentedProfiles){
    const {data: inj} = await sb.from('injuries').select('*').eq('user_id', p.id);
    const active = (inj||[]).filter(i => i.statut !== 'gueri');
    totalActive += active.length;
    totalSevere += active.filter(i => i.gravite === 'severe').length;
    allInjuries = allInjuries.concat(active.map(i => ({...i, playerId: p.id, playerName: (p.nom||'')+' '+(p.nom_famille||'')})));

    // Détection des douleurs répétées : 2 jours ou plus avec courbatures "Fortes" (3) ou "Intenses" (4)
    // sur les 7 derniers jours, signalées via le bilan Forme quotidien — même sans blessure officiellement déclarée
    const {data: formeData} = await sb.from('forme').select('date, courbatures').eq('user_id', p.id).gte('date', sevenDaysAgo);
    const painDays = (formeData||[]).filter(f => f.courbatures >= 3);
    if(painDays.length >= 2){
      painAlerts.push({playerId: p.id, playerName: (p.nom||'')+' '+(p.nom_famille||''), count: painDays.length, lastDate: painDays.sort((a,b)=>b.date.localeCompare(a.date))[0]?.date});
    }
  }

  let html = `<div class="stat-row">
    <div class="stat-box"><div class="stat-val" style="color:#C0185A">${consentedProfiles.length}</div><div class="stat-lbl">Joueurs suivis</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#D4841A">${totalActive}</div><div class="stat-lbl">Blessures actives</div></div>
    <div class="stat-box"><div class="stat-val" style="color:#C0392B">${totalSevere}</div><div class="stat-lbl">Sévères</div></div>
  </div>`;

  if(painAlerts.length){
    html += `<div class="sec-title">🟡 Douleurs répétées signalées</div>
    <div class="card" style="background:#F39C1208;border-color:#F39C1244">
      <div style="font-size:11px;color:#9A7A70;line-height:1.5;margin-bottom:8px">Ces joueurs ont signalé des courbatures/douleurs fortes au moins 2 fois sur les 7 derniers jours dans leur bilan Forme, sans avoir déclaré de blessure — un point de vigilance avant que ça ne s'aggrave.</div>
    </div>`;
    painAlerts.forEach(alert => {
      html += `<div class="card" style="border-color:#F39C1244;cursor:pointer" onclick="openKinePlayerDetail('${alert.playerId}','${alert.playerName.replace(/'/g,"\\'")}',${teamId})">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:13px;font-weight:800">${alert.playerName}</div>
            <div style="font-size:11px;color:#9A7A70;margin-top:2px">${alert.count} jour(s) avec douleurs fortes · Dernier signalement le ${fmt(alert.lastDate)}</div>
          </div>
          <span style="color:#F39C12;font-size:18px">›</span>
        </div>
      </div>`;
    });
  }

  if(allInjuries.length){
    html += `<div class="sec-title">⚠️ Blessures actives</div>
    <div style="font-size:11px;color:#9A7A70;margin-bottom:8px">Touche un joueur pour ouvrir sa fiche — c'est là que tu le déclares apte ou non apte.</div>`;
    allInjuries.sort((a,b) => (a.gravite==='severe'?0:1) - (b.gravite==='severe'?0:1) || b.date_debut.localeCompare(a.date_debut)).forEach(inj => {
      const grav = GRAVITE_INFO[inj.gravite]; const stat = STATUT_INFO[inj.statut];
      html += `<div class="card" style="border-color:${inj.gravite==='severe'?'#C0392B66':stat.color+'33'};cursor:pointer" onclick="openKinePlayerDetail('${inj.playerId}','${inj.playerName.replace(/'/g,"\\'")}',${teamId})">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:13px;font-weight:800">${inj.playerName}</div>
          <div style="display:flex;align-items:center;gap:6px">

async function loadKineTeamData(teamId){
  const container = document.getElementById('kine-players-list');
  if(!container) return;
  const {data: members} = await sb.from('team_members').select('user_id').eq('team_id', teamId).eq('role', 'joueur');
  if(!members?.length){ container.innerHTML = '<div class="card" style="text-align:center;padding:20px;color:#9A7A70">Aucun joueur.</div>'; return; }
  const playerIds = members.map(m => m.user_id);
  const {data: profiles} = await sb.from('profiles').select('id, nom, nom_famille, poste').in('id', playerIds);
  const {data: injuries} = await sb.from('injuries').select('*').in('user_id', playerIds).neq('statut', 'gueri');
  const {data: aptData} = await sb.from('team_members').select('user_id, apte_au_jeu').eq('team_id', teamId);
  const injByPlayer = {};
  (injuries||[]).forEach(i => { if(!injByPlayer[i.user_id]) injByPlayer[i.user_id] = []; injByPlayer[i.user_id].push(i); });
  const aptByPlayer = {};
  (aptData||[]).forEach(a => { aptByPlayer[a.user_id] = a.apte_au_jeu; });
  let html = '';
  (profiles||[]).sort((a,b) => (a.poste||'').localeCompare(b.poste||'')).forEach(player => {
    const activeInj = injByPlayer[player.id] || [];
    const isApte = aptByPlayer[player.id] !== false;
    const hasBlessure = activeInj.length > 0;
    html += `<div onclick="openKinePlayerDetail('${player.id}','${(player.nom||'').replace(/'/g,"\\'")} ${(player.nom_famille||'').replace(/'/g,"\\'")}',${teamId})" class="card" style="display:flex;align-items:center;gap:12px;cursor:pointer;border-color:${hasBlessure?'#C0392B33':'#E8D8D0'}">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:800">${player.nom||''} ${player.nom_famille||''}</div>
        <div style="font-size:11px;color:#9A7A70">${player.poste||'Poste non renseigné'}</div>
        ${hasBlessure ? `<div style="font-size:11px;color:#C0392B;margin-top:3px">🩹 ${activeInj.length} blessure(s)</div>` : ''}
      </div>
      <span style="font-size:10px;font-weight:800;border-radius:20px;padding:3px 10px;background:${isApte?'#1A8C6E18':'#C0392B18'};color:${isApte?'#1A8C6E':'#C0392B'}">${isApte?'✓ Apte':'⚠️ Non apte'}</span>
    </div>`;
  });
  container.innerHTML = html || '<div style="color:#9A7A70;text-align:center;padding:20px">Aucun profil.</div>';
}

async function submitKineInjury(playerId, playerName, teamId){
  const type = document.getElementById('ki-type')?.value.trim();
  const gravite = document.getElementById('ki-gravite')?.value;
  const date_debut = document.getElementById('ki-date')?.value;
  const duree_estimee_jours = parseInt(document.getElementById('ki-duree')?.value) || null;
  const statut = document.getElementById('ki-statut')?.value || 'en_cours';
  const notes = document.getElementById('ki-notes')?.value || '';
  if(!type || !date_debut){ showToast('Type et date obligatoires', 'error'); return; }
  const row = {user_id: playerId, type, gravite, date_debut, duree_estimee_jours, statut, notes};
  if(statut === 'gueri') row.date_fin = today();
  const {error} = await sb.from('injuries').insert(row);
  if(error){ showToast('Erreur : '+error.message+' — exécute le SQL "pouvoirs kiné" si permission refusée', 'error'); return; }
  closeModal();
  showToast('Blessure déclarée pour '+playerName, 'success');
  // Prévenir le joueur
  const t = myTeams.find(x => x.id === teamId);
  sendPushToTeam(teamId, '🩺 ' + (t?.name||'Rugby Perf'), 'Le staff médical a ajouté une blessure à ton dossier : ' + type, playerId);
  loadKineTeamData(teamId);
}

async function submitKineSession(){
  const team = myTeams.find(t => t.myRole === 'kine');
  const titre = document.getElementById('ks-titre')?.value.trim();
  const date = document.getElementById('ks-date')?.value;
  const description = document.getElementById('ks-description')?.value || '';
  if(!titre || !date){ showToast('Titre et date obligatoires', 'error'); return; }

  let pdf_url = null;
  const ksFile = document.getElementById('ks-pdf')?.files?.[0];
  if(ksFile){
    const path = currentUser.id + '/' + Date.now() + '_' + ksFile.name;
    const {error: upErr} = await sb.storage.from('session_pdfs').upload(path, ksFile);
    if(upErr){ showToast('Erreur PDF : '+upErr.message, 'error'); return; }
    pdf_url = sb.storage.from('session_pdfs').getPublicUrl(path).data.publicUrl;
  }

  const row = {
    team_id: team.id, created_by: currentUser.id, type: 'kine', titre, description, date, pdf_url,
    target_type: 'joueurs', target_ids: [_kineSessionTargetId]
  };
  const {error} = await sb.from('proposed_sessions').insert(row);
  if(error){ showToast('Erreur envoi séance : '+error.message, 'error'); return; }
  closeModal();
  showToast(`Séance envoyée à ${_kineSessionTargetName}`, 'success');
  // Notification push au joueur concerné uniquement
  if(_kineSessionTargetId) sendPushToTeam(team.id, '🩺 ' + (team.name||'Rugby Perf'), 'Séance soin : ' + titre + ' — ' + fmtFull(date), _kineSessionTargetId);
}

async function saveForme(key, val){
  if(!currentUser) return;
  const today_str = today();
  const existing = formeLog.find(f => f.date === today_str);
  const newData = existing ? {...existing, [key]: val} : {date: today_str, user_id: currentUser.id, [key]: val};
  if(existing?.id){
    await sb.from('forme').update({[key]: val}).eq('id', existing.id);
    formeLog = formeLog.map(f => f.date === today_str ? {...f, [key]: val} : f);
  } else {
    const {data} = await sb.from('forme').insert(newData).select().single();
    if(data) formeLog = [data, ...formeLog];
  }
  // Confirmation visuelle que la sauvegarde a bien eu lieu
  showToast('Bilan de forme sauvegardé ✓', 'success');
  render();
}
